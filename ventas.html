<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Cirene · Ventas</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/cirene-theme.css">
<style>
main { padding: 18px 22px; max-width: 1100px; margin: 0 auto; }
@media (max-width: 720px) { main { padding: 12px 14px; } }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
@media (max-width: 720px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 16px 18px; box-shadow: var(--shadow-sm); }
.kpi .lbl { font-size: 11px; color: var(--tinta-2); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
.kpi .val { font-size: 28px; font-weight: 700; color: var(--azul); font-family: 'Raleway', sans-serif; margin-top: 6px; }
.kpi .sub { font-size: 11px; color: var(--tinta-3); margin-top: 4px; }

.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 18px 20px; margin-bottom: 18px; }
.chart-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chart-hdr h2 { font-size: 15px; font-weight: 700; }
.chart-svg { width: 100%; height: 300px; display: block; }

.charts-2up { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
@media (max-width: 820px) { .charts-2up { grid-template-columns: 1fr; } }

.vendor-tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 18px 20px; overflow-x: auto; }
.vendor-tbl-wrap h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.v-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.v-tbl th { text-align: left; padding: 9px 10px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em; color: var(--tinta-2);
  background: var(--surface-2); border-bottom: 1px solid var(--border); }
.v-tbl td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.v-tbl tr:hover td { background: var(--surface-2); cursor: pointer; }
.v-tbl tbody tr.selected td { background: var(--surface-3); }
.v-tbl td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
.v-tbl td.azul { color: var(--azul); }

.star { color: var(--azul); font-weight: 600; }
.muted { color: var(--tinta-3); }

.empty { padding: 40px 20px; text-align: center; color: var(--tinta-3); font-size: 14px; }

.loading-row { padding: 20px; text-align: center; color: var(--tinta-2); }

/* Fila de producto clickeable (drill-down a tarjetas) */
.v-tbl tr.prod-row td { cursor: pointer; }
.v-tbl tr.prod-row.open td { background: var(--surface-3); font-weight: 600; }
.prod-row .chev { color: var(--tinta-3); font-size: 11px; margin-right: 6px; transition: transform .15s; display: inline-block; }
.prod-row.open .chev { transform: rotate(90deg); color: var(--azul); }

/* Panel drill de tarjetas que contienen un producto */
.drill-wrap { margin-top: 12px; border: 1px solid var(--border); border-radius: var(--r-md, 8px);
  background: var(--surface-2); padding: 12px 14px; }
.drill-wrap h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.drill-wrap .empty { padding: 16px; }

/* Modal de info de tarjeta */
.card-modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 9000;
  display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.card-modal { background: var(--surface); border-radius: var(--r-lg); box-shadow: var(--shadow-lg, 0 20px 60px rgba(0,0,0,0.25));
  width: 100%; max-width: 560px; padding: 22px 24px; }
.card-modal-hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
.card-modal-hdr h2 { font-size: 18px; font-weight: 700; }
.card-modal .cm-close { background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer; color: var(--tinta-3); padding: 0 4px; }
.card-modal .cm-meta { font-size: 12px; color: var(--tinta-2); margin-bottom: 14px; }
.card-modal .cm-meta b { color: var(--tinta-1); }
.cm-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--surface-3); font-size: 11px; font-weight: 600; margin-right: 4px; }
.card-modal .cm-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
.cm-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--tinta-1); text-decoration: none; display: inline-flex; align-items: center; }
.cm-btn.primary { background: var(--azul); color: #fff; border-color: var(--azul); }
</style>
</head>
<body>

<div id="navbar-mount"></div>

<div class="cirene-page-hdr">
  <h1>Ventas</h1>
  <div class="cirene-subtabs" id="tabs">
    <button class="active" data-tab="mio">Mi panel</button>
    <button data-tab="todos" id="tabTodos" style="display:none">Consolidado</button>
  </div>
  <div class="hdr-actions">
    <select id="period" class="cirene-select" style="max-width: 200px;">
      <option value="1m" selected>Este mes</option>
      <option value="6m">Últimos 6 meses</option>
      <option value="12m">Últimos 12 meses</option>
      <option value="ytd">Año en curso (YTD)</option>
      <option value="all">Histórico completo</option>
    </select>
  </div>
</div>

<main id="app">
  <div class="loading-row"><span class="cirene-spinner"></span> Cargando datos…</div>
</main>

<script type="module">
import { renderNavbar } from './js/navbar.js';
import { requireAuth, isAdmin, getProfile, getCurrentUser } from './js/auth.js';
import { getSupa } from './js/supa.js';

const $ = id => document.getElementById(id);
const esc = s => (s || '').toString().replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const fmt = n => (Number(n) || 0).toLocaleString('es-UY', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

const NOW_MONTH = new Date().toISOString().slice(0, 7);

const state = {
  tab: 'mio',
  period: '1m',
  cards: [],
  vendors: [],     // [{name, totalAmount, totalQty, starProduct, ordersCount, monthly: {YYYY-MM: amount}}]
  consolidated: null, // {totalAmount, totalQty, starProduct, ordersCount, monthly}
  meVendor: '',
  isAdmin: false,
  loading: true,
  detailMonth: NOW_MONTH,
  detailSort: 'desc',      // orden del detalle del mes por total: 'desc' | 'asc'
  newClients: { byVendor: new Map(), total: 0 },  // (#18) clientes cuyo 1er pedido cae en el período
  selectedProduct: null,   // producto expandido en "productos más vendidos"
  vendorFilter: null,      // vendedor activo del panel (me.name en 'mio', null en consolidado)
};

// ─── INIT ────────────────────────────────────────────────
(async function init() {
  await requireAuth();
  renderNavbar('ventas');
  state.isAdmin = await isAdmin();
  if (state.isAdmin) $('tabTodos').style.display = '';
  const profile = await getProfile();
  state.meVendor = profile?.vendor_name || profile?.full_name || '';

  bindUI();
  await loadData();
  render();
})();

function bindUI() {
  document.querySelectorAll('#tabs button').forEach(b => {
    b.onclick = () => {
      if (b.style.display === 'none') return;
      state.tab = b.dataset.tab;
      document.querySelectorAll('#tabs button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    };
  });
  $('period').onchange = async (e) => {
    state.period = e.target.value;
    await loadData();
    render();
  };
  // Click delegado en el panel: fila de producto → drill; fila con data-card-id → modal.
  $('app').addEventListener('click', onAppClick);
}

function onAppClick(e) {
  const prodRow = e.target.closest('tr.prod-row');
  if (prodRow) { toggleProductDrill(prodRow.dataset.product); return; }
  const cardRow = e.target.closest('[data-card-id]');
  if (cardRow) { openCardModal(cardRow.dataset.cardId); return; }
}

// ─── DRILL: tarjetas que contienen un producto ───────────
function toggleProductDrill(name) {
  state.selectedProduct = (state.selectedProduct === name) ? null : name;
  document.querySelectorAll('tr.prod-row').forEach(r =>
    r.classList.toggle('open', r.dataset.product === state.selectedProduct));
  renderProductDrill();
}

function renderProductDrill() {
  const wrap = document.getElementById('product-drill');
  if (!wrap) return;
  const name = state.selectedProduct;
  if (!name) { wrap.innerHTML = ''; return; }
  const vf = state.vendorFilter;
  const cards = state.cards.filter(c => {
    if (!cardInPeriod(c)) return false;
    if (vf && (c.vendor || '').trim().toLowerCase() !== vf.toLowerCase()) return false;
    const lines = Array.isArray(c.product_lines) ? c.product_lines : [];
    return lines.some(l => (l.producto || 'Sin producto').trim() === name);
  }).map(c => {
    const lines = Array.isArray(c.product_lines) ? c.product_lines : [];
    const qty = lines.filter(l => (l.producto || 'Sin producto').trim() === name)
      .reduce((s, l) => s + (Number(l.cantidad) || 0), 0);
    return { c, qty, total: cardTotal(c) };
  }).sort((a, b) => b.total - a.total);

  const rows = cards.map(({ c, qty, total }) => `
    <tr data-card-id="${esc(c.id)}">
      <td><b>${esc(c.client_name || '—')}</b></td>
      ${vf ? '' : `<td style="font-size:12px">${esc(c.vendor || '—')}</td>`}
      <td class="num">${fmt(qty)}</td>
      <td class="num azul">${total ? fmt(total) : '—'}</td>
    </tr>`).join('');

  wrap.innerHTML = `
    <div class="drill-wrap">
      <h3>Tarjetas con “<span style="color:var(--azul)">${esc(name)}</span>” — ${cards.length}</h3>
      ${cards.length ? `
        <table class="v-tbl">
          <thead><tr><th>Cliente</th>${vf ? '' : '<th>Vendedor</th>'}<th style="text-align:right">Cant.</th><th style="text-align:right">Total tarjeta</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      ` : `<div class="empty">Sin tarjetas con este producto en el período.</div>`}
    </div>`;
}

// ─── MODAL: info de una tarjeta ──────────────────────────
let _cardModalEl = null;
function _escClose(e) { if (e.key === 'Escape') closeCardModal(); }
function closeCardModal() {
  if (_cardModalEl) { _cardModalEl.remove(); _cardModalEl = null; document.removeEventListener('keydown', _escClose); }
}
function openCardModal(id) {
  const c = state.cards.find(x => String(x.id) === String(id));
  if (!c) return;
  closeCardModal();
  const lines = Array.isArray(c.product_lines) ? c.product_lines : [];
  const linesRows = lines.map(l => {
    const qty = Number(l.cantidad) || 0, price = Number(l.precio || l.precio_unit) || 0;
    const sub = qty * price;
    return `<tr>
      <td>${esc(l.producto || '—')}</td>
      <td>${esc(l.color || '')}</td>
      <td>${esc(l.talle || '')}</td>
      <td class="num">${qty || ''}</td>
      <td class="num">${price ? fmt(price) : ''}</td>
      <td class="num azul">${sub ? fmt(sub) : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" class="empty">Sin líneas de producto</td></tr>`;
  const total = cardTotal(c);

  const bg = document.createElement('div');
  bg.className = 'card-modal-bg';
  bg.innerHTML = `
    <div class="card-modal">
      <div class="card-modal-hdr">
        <h2>${esc(c.client_name || '(sin cliente)')}</h2>
        <button class="cm-close" aria-label="Cerrar">×</button>
      </div>
      <div class="cm-meta">
        ${c.vendor ? `<span class="cm-tag">${esc(c.vendor)}</span>` : ''}
        ${c.stage_key ? `<span class="cm-tag">${esc(c.stage_key)}</span>` : ''}
        ${c.estado_stock ? `<span class="cm-tag">${esc(c.estado_stock)}</span>` : ''}
        ${c.descripcion_pedido ? `<div style="margin-top:10px;color:var(--tinta-1)">${esc(c.descripcion_pedido)}</div>` : ''}
        <div style="margin-top:10px">
          <b>Facturación:</b> ${esc(cardMonth(c) || '—')}
          · <b>Creada:</b> ${esc((c.created_at || '').slice(0, 10) || '—')}${c.due_date ? ` · <b>Entrega:</b> ${esc(c.due_date.slice(0, 10))}` : ''}
        </div>
      </div>
      <table class="v-tbl">
        <thead><tr><th>Producto</th><th>Color</th><th>Talle</th><th style="text-align:right">Cant.</th><th style="text-align:right">P.Unit</th><th style="text-align:right">Subtotal</th></tr></thead>
        <tbody>${linesRows}</tbody>
      </table>
      <div style="text-align:right;margin-top:10px;font-weight:700;font-size:15px">Total: <span style="color:var(--azul)">${fmt(total)} UYU</span></div>
      <div class="cm-foot">
        <a class="cm-btn primary" href="production.html?card=${encodeURIComponent(c.id)}">Abrir y editar en Producción →</a>
        <button class="cm-btn cm-close-btn">Cerrar</button>
      </div>
    </div>`;
  bg.addEventListener('click', e => { if (e.target === bg) closeCardModal(); });
  bg.querySelector('.cm-close').onclick = closeCardModal;
  bg.querySelector('.cm-close-btn').onclick = closeCardModal;
  document.addEventListener('keydown', _escClose);
  document.body.appendChild(bg);
  _cardModalEl = bg;
}

// ─── DATA ────────────────────────────────────────────────
function periodFilter() {
  const now = new Date();
  if (state.period === '1m') {
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
  }
  if (state.period === '6m') {
    const d = new Date(now); d.setMonth(d.getMonth() - 6);
    return d.toISOString().slice(0, 10);
  }
  if (state.period === '12m') {
    const d = new Date(now); d.setMonth(d.getMonth() - 12);
    return d.toISOString().slice(0, 10);
  }
  if (state.period === 'ytd') {
    return `${now.getFullYear()}-01-01`;
  }
  return '2000-01-01';
}

// (nuevo) Ventana del período por MES DE FACTURACIÓN (billing_month). La
// facturación/KPIs se calculan sobre estos meses, así el número de arriba a la
// izquierda se actualiza según el filtro de arriba a la derecha.
function periodBounds() {
  const now = new Date();
  const cm = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const monthsAgo = (n) => { const d = new Date(now); d.setMonth(d.getMonth() - n); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; };
  if (state.period === '1m')  return { min: cm, max: cm };
  if (state.period === '6m')  return { min: monthsAgo(5), max: null };   // 6 meses incl. el actual
  if (state.period === '12m') return { min: monthsAgo(11), max: null };
  if (state.period === 'ytd') return { min: `${now.getFullYear()}-01`, max: null };
  return { min: null, max: null };  // 'all'
}
function periodLabel() {
  return ({ '1m':'este mes', '6m':'últimos 6 meses', '12m':'últimos 12 meses', 'ytd':'año en curso', 'all':'histórico' })[state.period] || '';
}

// Mes de facturación de una tarjeta (billing_month con fallback a due_date/created_at).
function cardMonth(c) {
  return c.billing_month || (c.due_date || c.created_at || '').slice(0, 7);  // 'YYYY-MM'
}
// True si la tarjeta cae dentro del período elegido (filtro de KPIs/tablas).
function cardInPeriod(c) {
  const pb = periodBounds();
  const m = cardMonth(c);
  return (!pb.min || m >= pb.min) && (!pb.max || m <= pb.max);
}
// Total facturado de una tarjeta (Σ cantidad × precio de sus líneas).
function cardTotal(c) {
  const lines = Array.isArray(c.product_lines) ? c.product_lines : [];
  return lines.reduce((s, l) => s + (Number(l.cantidad) || 0) * (Number(l.precio || l.precio_unit) || 0), 0);
}

async function loadData() {
  state.loading = true;
  render();
  try {
    const supa = getSupa();
    // `since` (por created_at) se sigue usando para "nuevos clientes".
    const since = periodFilter();
    // La query se trae una ventana MÁS ANCHA por created_at (2 meses antes del
    // corte) para no perder tarjetas cuyo billing_month cae en el período pero
    // se crearon antes (ej: creada en abril, facturada en mayo). El recorte
    // fino por billing_month se hace en aggregate().
    const qd = new Date((since || '2000-01-01') + 'T00:00:00');
    qd.setMonth(qd.getMonth() - 2);
    let querySince = qd.toISOString().slice(0, 10);
    // El gráfico de evolución muestra SIEMPRE los últimos ~13 meses (independiente
    // del filtro de KPIs), así "este mes" no deja la curva con un solo punto.
    // Traemos esa ventana más ancha aunque el período elegido sea más corto.
    const chartStart = new Date(); chartStart.setMonth(chartStart.getMonth() - 13);
    const chartSince = chartStart.toISOString().slice(0, 10);
    if (chartSince < querySince) querySince = chartSince;
    const { data, error } = await supa.from('production_cards')
      .select('id, vendor, client_name, descripcion_pedido, product_lines, stage_key, estado_stock, created_at, completed_at, is_sample, billing_month, due_date')
      .gte('created_at', querySince + 'T00:00:00')
      .order('created_at', { ascending: false })
      .limit(5000);
    if (error) throw error;

    // (#8) Solo cuentan VENTAS REALES concretadas. Excluimos:
    //  - muestras (is_sample)
    //  - cotizaciones no concretadas (stage_key 'borrador')
    //  - pedidos cancelados (stage_key 'cancelado' o estado_stock 'Cancelado')
    //  - pedidos en pausa (estado_stock 'En Pausa')
    // Antes se contaban todos → inflaba la facturación (ej: Santiago/mayo 90k vs 70k real).
    // Filtro centralizado y fácil de tunear si cambia la definición de "venta real".
    const EXCLUDED_STAGES = new Set(['borrador', 'cancelado']);
    const EXCLUDED_ESTADO_STOCK = new Set(['Cancelado', 'En Pausa']);
    state.cards = (data || []).filter(c =>
      !c.is_sample &&
      !EXCLUDED_STAGES.has(c.stage_key) &&
      !EXCLUDED_ESTADO_STOCK.has(c.estado_stock));
    aggregate();

    // (#18) "Nuevos clientes generados": un cliente es nuevo cuando su PRIMER
    // pedido histórico (mín. created_at) cae dentro del período elegido. Hay que
    // mirar TODO el historial (sin filtro de período) para saber el primer-visto.
    try {
      const { data: allRows } = await supa.from('production_cards')
        .select('client_name, odoo_partner_id, vendor, created_at, is_sample')
        .limit(20000);
      state.newClients = computeNewClients(allRows || [], since);
    } catch (e2) {
      console.warn('No se pudo calcular nuevos clientes:', e2.message);
      state.newClients = { byVendor: new Map(), total: 0 };
    }
  } catch (e) {
    console.error('No se pudieron cargar tarjetas:', e.message);
    state.cards = [];
  }
  state.loading = false;
}

// Cliente identificado por odoo_partner_id (preferido) o client_name normalizado.
// "Generado por" = vendedor del primer pedido histórico de ese cliente.
function computeNewClients(rows, sinceISO) {
  const firstByClient = new Map();  // key → { vendor, created_at }
  for (const r of rows) {
    if (r.is_sample) continue;
    const key = r.odoo_partner_id
      ? 'p:' + r.odoo_partner_id
      : 'n:' + (r.client_name || '').trim().toLowerCase();
    if (key === 'n:') continue;  // sin cliente
    const prev = firstByClient.get(key);
    if (!prev || (r.created_at || '') < (prev.created_at || '')) {
      firstByClient.set(key, { vendor: (r.vendor || 'Sin vendedor').trim(), created_at: r.created_at || '' });
    }
  }
  const byVendor = new Map();
  let total = 0;
  for (const { vendor, created_at } of firstByClient.values()) {
    if (created_at && created_at.slice(0, 10) >= sinceISO) {
      byVendor.set(vendor, (byVendor.get(vendor) || 0) + 1);
      total++;
    }
  }
  return { byVendor, total };
}

// Agrega cards por vendedor y arma estructuras para render.
//
// IMPORTANTE: dos ventanas distintas conviven acá:
//  - KPIs/tablas (totalAmount, totalQty, products, ordersCount) → SOLO período elegido.
//  - `monthly` (serie del gráfico de evolución) → TODA la ventana cargada (~13 meses),
//    así "este mes" no deja la curva con un único punto. El gráfico no depende del filtro.
function aggregate() {
  const byVendor = new Map();
  const consolidated = { totalAmount: 0, totalQty: 0, products: new Map(), monthly: new Map(), ordersCount: 0 };

  const ensureVendor = (v) => {
    if (!byVendor.has(v)) byVendor.set(v, {
      name: v, totalAmount: 0, totalQty: 0, products: new Map(), monthly: new Map(), ordersCount: 0,
    });
    return byVendor.get(v);
  };

  for (const c of state.cards) {
    const month = cardMonth(c);
    const within = cardInPeriod(c);
    const v = (c.vendor || 'Sin vendedor').trim();
    const vd = ensureVendor(v);
    if (within) { vd.ordersCount += 1; consolidated.ordersCount += 1; }

    const lines = Array.isArray(c.product_lines) ? c.product_lines : [];
    for (const l of lines) {
      const qty = Number(l.cantidad) || 0;
      const price = Number(l.precio || l.precio_unit || 0);
      const amount = qty * price;
      // KPIs/tablas: solo dentro del período.
      if (within) {
        vd.totalAmount += amount;
        vd.totalQty += qty;
        consolidated.totalAmount += amount;
        consolidated.totalQty += qty;
        const pname = (l.producto || 'Sin producto').trim();
        vd.products.set(pname, (vd.products.get(pname) || 0) + qty);
        consolidated.products.set(pname, (consolidated.products.get(pname) || 0) + qty);
      }
      // Serie del gráfico: SIEMPRE (toda la ventana cargada).
      if (month) {
        vd.monthly.set(month, (vd.monthly.get(month) || 0) + amount);
        consolidated.monthly.set(month, (consolidated.monthly.get(month) || 0) + amount);
      }
    }
  }

  // Reducir products map → star product
  function starProduct(map) {
    let best = '—', bestQty = 0;
    for (const [n, q] of map.entries()) {
      if (q > bestQty) { best = n; bestQty = q; }
    }
    return { name: best, qty: bestQty };
  }

  // El ranking solo lista vendedores con actividad EN EL PERÍODO (los que solo
  // tienen meses fuera de rango existen para la serie del gráfico, pero no en la tabla).
  state.vendors = [...byVendor.values()]
    .filter(v => v.ordersCount > 0 || v.totalAmount > 0)
    .map(v => ({ ...v, star: starProduct(v.products) }))
    .sort((a, b) => b.totalAmount - a.totalAmount);

  state.consolidated = { ...consolidated, star: starProduct(consolidated.products) };
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  // Cada render completo colapsa el drill de productos (evita estado viejo al
  // cambiar de período/tab). El detalle mensual re-renderiza aparte sin tocar esto.
  state.selectedProduct = null;
  const app = $('app');
  if (state.loading) {
    app.innerHTML = `<div class="loading-row"><span class="cirene-spinner"></span> Cargando datos…</div>`;
    return;
  }
  if (state.tab === 'mio') renderMine(app);
  else renderConsolidated(app);
}

function renderDetailTable(containerId, vendorFilter) {

  const sortDir = state.detailSort === 'asc' ? 1 : -1;
  const enriched = cards.map(c => {
    const lines = Array.isArray(c.product_lines) ? c.product_lines : [];
    const qty = lines.reduce((s, l) => s + (Number(l.cantidad) || 0), 0);
    return { c, total: cardTotal(c), qty };
  }).sort((a, b) => (a.total - b.total) * sortDir);

  // (#4) Solo cliente + descripción del pedido + cantidad + total. La fila es

      ${vendor}
      <td class="num">${fmt(qty)}</td>
      <td class="num azul">${total ? fmt(total) : '—'}</td>
    </tr>`;
  }).join('');

  const vendorHeader = vendorFilter ? '' : '<th>Vendedor</th>';
  const sortLabel = state.detailSort === 'asc' ? 'Total: menor → mayor' : 'Total: mayor → menor';

  el.innerHTML = `
    <div class="vendor-tbl-wrap" style="margin-top:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <h2>Detalle del mes — <b>${grandTotal ? fmt(grandTotal) + ' UYU' : 'sin ventas'}</b></h2>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button id="detail-sort-btn" class="cm-btn" style="padding:6px 12px;font-size:12px">${sortLabel}</button>

            <th>Cliente</th>
            <th>Descripción del pedido</th>

}

// Enumera meses 'YYYY-MM' inclusive entre first y last (para rellenar huecos).
function enumerateMonths(first, last) {
  const out = [];
  let [y, m] = first.split('-').map(Number);
  const [ly, lm] = last.split('-').map(Number);
  while (y < ly || (y === ly && m <= lm)) {
    out.push(`${y}-${String(m).padStart(2, '0')}`);
    m++; if (m > 12) { m = 1; y++; }
  }
  return out;
}

// ─── CHART SVG (línea de evolución) ──────────────────────
// Dibuja un line chart en el <svg id=...> usando un Map de YYYY-MM → amount.
// FIX: usa el ancho REAL en píxeles como sistema de coordenadas (antes el viewBox
// 800×300 con preserveAspectRatio="none" se estiraba al ancho del contenedor y la
// curva se veía "achatada/estirada"). Además rellena los meses sin ventas con 0
// para que la línea sea continua en el tiempo, y centra el caso de un solo punto.
function drawChart(svgId, monthlyMap) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const W = Math.max(320, Math.round(svg.getBoundingClientRect().width) || 800);
  const H = 300, PAD_L = 56, PAD_R = 20, PAD_T = 24, PAD_B = 40;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;

  let months = [...monthlyMap.keys()].sort();
  if (!months.length) {
    svg.innerHTML = `<text x="${W / 2}" y="${H / 2}" text-anchor="middle" fill="#9CA3AF" font-size="13">Sin datos para graficar</text>`;
    return;
  }
  // Recortar meses cero al INICIO (la curva no arranca pegada al piso).
  const _firstNZ = months.findIndex(m => (monthlyMap.get(m) || 0) > 0);
  if (_firstNZ > 0) months = months.slice(_firstNZ);
  // Rellenar huecos intermedios con 0 → timeline continuo.
  if (months.length > 1) months = enumerateMonths(months[0], months[months.length - 1]);

  const values = months.map(m => monthlyMap.get(m) || 0);
  const maxVal = Math.max(...values, 1) * 1.15;  // headroom 15%
  const single = months.length === 1;
  const stepX = single ? 0 : innerW / (months.length - 1);

  const points = months.map((m, i) => ({
    x: single ? PAD_L + innerW / 2 : PAD_L + i * stepX,
    y: PAD_T + innerH - (values[i] / maxVal) * innerH,
    m, v: values[i],
  }));

  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(r => {
    const y = PAD_T + innerH * (1 - r);
    return `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#E5E7EB" stroke-width="1"/>
      <text x="${PAD_L - 8}" y="${y + 3}" text-anchor="end" fill="#6B7280" font-size="10">${fmt(maxVal * r)}</text>`;
  }).join('');

  const xStep = Math.max(1, Math.ceil(months.length / 8));
  const xLabels = months.map((m, i) => {
    if (!single && i % xStep !== 0 && i !== months.length - 1) return '';
    return `<text x="${points[i].x}" y="${H - PAD_B + 16}" text-anchor="middle" fill="#6B7280" font-size="10">${m.slice(2)}</text>`;
  }).join('');

  // Etiquetas de valor sobre los puntos cuando son pocos (≤14 meses).
  const valLabels = months.length <= 14 ? points.map(p =>
    p.v > 0 ? `<text x="${p.x}" y="${p.y - 9}" text-anchor="middle" fill="#0A0A0A" font-size="9.5" font-weight="600">${fmt(p.v)}</text>` : '').join('') : '';

  const dots = points.map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#0A0A0A" stroke="#fff" stroke-width="2"><title>${p.m}: ${fmt(p.v)} UYU</title></circle>`).join('');

  if (single) {
    svg.innerHTML = `${gridLines}${dots}${valLabels}${xLabels}`;
    return;
  }

  const linePath = points.map((p, i) => (i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`)).join(' ');
  const areaPath = linePath + ` L${points[points.length - 1].x},${PAD_T + innerH} L${points[0].x},${PAD_T + innerH} Z`;
  svg.innerHTML = `
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#grad)"/>
    <path d="${linePath}" stroke="#0A0A0A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${valLabels}${xLabels}
  `;
}

// ─── CHART: torta de % de productos vendidos (#6) ────────
// productsMap: Map nombre → unidades. Muestra top-8 + "Otros".
const PIE_COLORS = ['#0A0A0A','#2E86DE','#54A0FF','#10AC84','#F6B93B','#E58E26','#EB4D4B','#8854D0','#A5B1C2'];
function drawPie(svgId, legendId, productsMap) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const entries = [...productsMap.entries()].filter(([, q]) => q > 0).sort((a, b) => b[1] - a[1]);
  const legend = legendId ? document.getElementById(legendId) : null;
  if (!entries.length) {
    svg.innerHTML = `<text x="110" y="110" text-anchor="middle" fill="#9CA3AF" font-size="13">Sin productos</text>`;
    if (legend) legend.innerHTML = '';
    return;
  }
  // Top 8 + agrupar el resto en "Otros".
  const TOP = 8;
  let slices = entries.slice(0, TOP).map(([name, q]) => ({ name, q }));
  const restQty = entries.slice(TOP).reduce((s, [, q]) => s + q, 0);
  if (restQty > 0) slices.push({ name: 'Otros', q: restQty });
  const total = slices.reduce((s, x) => s + x.q, 0);

  const CX = 110, CY = 110, R = 96;
  let angle = -Math.PI / 2;  // arranca arriba
  const arcs = slices.map((s, i) => {
    const frac = s.q / total;
    const a0 = angle, a1 = angle + frac * Math.PI * 2;
    angle = a1;
    const large = (a1 - a0) > Math.PI ? 1 : 0;
    const x0 = CX + R * Math.cos(a0), y0 = CY + R * Math.sin(a0);
    const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
    const color = PIE_COLORS[i % PIE_COLORS.length];
    const title = `<title>${esc(s.name)}: ${fmt(s.q)} (${(frac * 100).toFixed(1)}%)</title>`;
    // Caso un solo producto (frac=1): círculo completo.
    const shape = (frac >= 0.999)
      ? `<circle cx="${CX}" cy="${CY}" r="${R}" fill="${color}">${title}</circle>`
      : `<path d="M${CX},${CY} L${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z" fill="${color}">${title}</path>`;
    return { shape, color, name: s.name, q: s.q, pct: frac * 100 };
  });

  svg.setAttribute('viewBox', '0 0 220 220');
  svg.innerHTML = arcs.map(a => a.shape).join('');
  if (legend) {
    legend.innerHTML = arcs.map(a => `
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:5px">
        <span style="width:11px;height:11px;border-radius:3px;background:${a.color};flex:none"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.name)}</span>
        <b style="font-variant-numeric:tabular-nums">${a.pct.toFixed(1)}%</b>
      </div>`).join('');
  }
}

// ─── CHART: Pareto de ingresos por tarjeta (#7) ──────────
// cards: array de tarjetas (ya filtradas por período/vendedor). Barras = total de
// cada tarjeta ordenadas de mayor a menor; línea = % acumulado de facturación.
// Sirve para ver si la facturación viene de pocas tarjetas grandes o de muchas chicas.
function drawPareto(svgId, cards) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const W = Math.max(320, Math.round(svg.getBoundingClientRect().width) || 800);
  const H = 300, PAD_L = 56, PAD_R = 44, PAD_T = 24, PAD_B = 52;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;

  const items = cards.map(c => ({ id: c.id, label: c.client_name || '—', total: cardTotal(c) }))
    .filter(x => x.total > 0).sort((a, b) => b.total - a.total);
  if (!items.length) {
    svg.innerHTML = `<text x="${W / 2}" y="${H / 2}" text-anchor="middle" fill="#9CA3AF" font-size="13">Sin facturación para graficar</text>`;
    return;
  }
  const grand = items.reduce((s, x) => s + x.total, 0);
  const maxVal = items[0].total * 1.05;
  const n = items.length;
  const gap = n > 1 ? innerW / n * 0.18 : 0;
  const bw = (innerW / n) - gap;

  // % acumulado
  let acc = 0;
  const cum = items.map(x => { acc += x.total; return acc / grand; });

  const bars = items.map((x, i) => {
    const bx = PAD_L + i * (innerW / n) + gap / 2;
    const bh = (x.total / maxVal) * innerH;
    const by = PAD_T + innerH - bh;
    return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${Math.max(1, bw).toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="#54A0FF"><title>${esc(x.label)}: ${fmt(x.total)} UYU</title></rect>`;
  }).join('');

  // grid + eje izq (UYU)
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(r => {
    const y = PAD_T + innerH * (1 - r);
    return `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#E5E7EB" stroke-width="1"/>
      <text x="${PAD_L - 8}" y="${y + 3}" text-anchor="end" fill="#6B7280" font-size="10">${fmt(maxVal * r)}</text>
      <text x="${W - PAD_R + 6}" y="${y + 3}" text-anchor="start" fill="#10AC84" font-size="10">${Math.round(r * 100)}%</text>`;
  }).join('');

  // línea de % acumulado (eje derecho 0–100%)
  const lpts = cum.map((c, i) => {
    const x = PAD_L + i * (innerW / n) + (innerW / n) / 2;
    const y = PAD_T + innerH - c * innerH;
    return { x, y, c };
  });
  const linePath = lpts.map((p, i) => (i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
  const dots = lpts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#10AC84"><title>${(p.c * 100).toFixed(1)}% acumulado</title></circle>`).join('');

  // marca del 80%
  const y80 = PAD_T + innerH - 0.8 * innerH;
  const ref80 = `<line x1="${PAD_L}" y1="${y80}" x2="${W - PAD_R}" y2="${y80}" stroke="#EB4D4B" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="${PAD_L + 4}" y="${y80 - 4}" fill="#EB4D4B" font-size="9.5" font-weight="600">80%</text>`;

  const xCaption = `<text x="${PAD_L + innerW / 2}" y="${H - 10}" text-anchor="middle" fill="#6B7280" font-size="10">${n} tarjeta${n !== 1 ? 's' : ''} · ordenadas de mayor a menor</text>`;

  svg.innerHTML = `${gridLines}${ref80}${bars}<path d="${linePath}" stroke="#10AC84" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>${dots}${xCaption}`;
}
</script>
</body>
</html>
