<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>De Cirene · Ventas</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/cirene-theme.css">
<style>
  .wrap { max-width: 1180px; margin: 0 auto; padding: 18px 20px 80px; }
  .hd { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .seg { display: inline-flex; gap: 3px; background: var(--surface-3); padding: 3px; border-radius: 9px; }
  .seg button { border: none; background: transparent; padding: 6px 12px; border-radius: 6px; font: inherit; font-size: 12px; font-weight: 600; color: var(--tinta-2); cursor: pointer; }
  .seg button.active { background: #0A0A0A; color: #fff; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .kpi span { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--tinta-2); }
  .kpi b { font-size: 23px; font-family: 'Raleway'; }
  .kpi.dark { background: #0A0A0A; color: #fff; } .kpi.dark span { color: rgba(255,255,255,.7); }
  .grid2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 860px) { .grid2 { grid-template-columns: 1fr; } }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; }
  .card h2 { font-size: 14px; margin-bottom: 12px; }
  table.grid { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.grid th { text-align: left; padding: 6px 8px; font-size: 11px; text-transform: uppercase; color: var(--tinta-2); border-bottom: 1px solid var(--border); }
  table.grid td { padding: 6px 8px; border-bottom: 1px solid var(--surface-3); }
  td.num, th.num { text-align: right; }
  .bar { height: 9px; background: #0A0A0A; border-radius: 5px; }
  .muted { color: var(--tinta-3); font-size: 12px; }
</style>
</head>
<body>
<div id="navbar-mount"></div>
<div class="wrap">
  <div class="hd">
    <h1 style="font-family:'Raleway'">Ventas</h1>
    <div class="seg" id="period">
      <button data-p="1m" class="active">Este mes</button>
      <button data-p="3m">3 meses</button>
      <button data-p="6m">6 meses</button>
      <button data-p="ytd">Año</button>
      <button data-p="all">Todo</button>
    </div>
  </div>
  <div id="dash"><div class="card">Cargando…</div></div>
</div>

<script type="module">
import { renderNavbar } from './js/navbar.js?v=3';
import { requireAuth } from './js/auth.js?v=3';
import * as data from './js/cirene-data.js?v=3';
import { money, pct, n } from './js/quote-engine.js?v=3';

const $ = s => document.querySelector(s);
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

let cards = [], quotes = [], payments = [], leads = [], stages = [];
let period = '1m';

await requireAuth();
renderNavbar('ventas');
document.querySelectorAll('#period button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#period button').forEach(x => x.classList.toggle('active', x === b));
  period = b.dataset.p; render();
});
try {
  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('La carga está demorando demasiado (timeout).')), 15000));
  [cards, quotes, payments, leads, stages] = await Promise.race([Promise.all([
    data.listProductionCards().catch(() => []), data.listQuotes().catch(() => []), data.listPayments().catch(() => []),
    data.listIntakeCards().catch(() => []), data.listStages('comercial').catch(() => [])
  ]), timeout]);
} catch (e) {
  $('#dash').innerHTML = `<div class="card" style="color:#A33A3A;padding:18px">No se pudo cargar Ventas.<br>${esc(e.message || e)}<br><button onclick="location.reload()" style="margin-top:8px;padding:7px 12px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer">Reintentar</button></div>`;
  throw e;
}
render();

function lastMonths(k) { const arr = []; const d = new Date(); for (let i = k - 1; i >= 0; i--) { const dd = new Date(d.getFullYear(), d.getMonth() - i, 1); arr.push(dd.toISOString().slice(0, 7)); } return arr; }
function periodMonths(p) {
  const now = new Date(); const cur = now.toISOString().slice(0, 7);
  if (p === '1m') return [cur];
  if (p === '3m') return lastMonths(3);
  if (p === '6m') return lastMonths(6);
  if (p === 'ytd') { const y = now.getFullYear(), arr = []; for (let m = 0; m <= now.getMonth(); m++) arr.push(`${y}-${String(m + 1).padStart(2, '0')}`); return arr; }
  return null; // all
}
const cardMonth = c => c.billing_month || (c.created_at || '').slice(0, 7);
const monthOf = d => (d || '').slice(0, 7);

function render() {
 try {
  const months = periodMonths(period);
  const inP = m => months === null || months.includes(m);
  const pcards = cards.filter(c => inP(cardMonth(c)));
  const facturado = pcards.reduce((s, c) => s + n(c.total_venta), 0);
  const cobrado = payments.filter(p => inP(monthOf(p.fecha))).reduce((s, p) => s + n(p.monto), 0);
  const pquotes = quotes.filter(q => inP(monthOf(q.created_at)));
  const aceptadas = pquotes.filter(q => q.estado === 'aceptado').length;
  const conv = pquotes.length ? aceptadas / pquotes.length : 0;

  // evolución 12 meses (independiente del filtro)
  const m12 = lastMonths(12);
  const serie = m12.map(m => cards.filter(c => cardMonth(c) === m).reduce((s, c) => s + n(c.total_venta), 0));

  // por vendedor (período)
  const vend = {}; pcards.forEach(c => { const v = c.vendor || '—'; vend[v] = (vend[v] || 0) + n(c.total_venta); });
  const vendArr = Object.entries(vend).sort((a, b) => b[1] - a[1]);

  // productos más vendidos (período, por unidades)
  const prod = {}; pcards.forEach(c => (c.product_lines || []).forEach(l => { if (!l.producto) return; prod[l.producto] = (prod[l.producto] || 0) + (n(l.cantidad) || 1); }));
  const prodArr = Object.entries(prod).sort((a, b) => b[1] - a[1]).slice(0, 10);

  // pipeline (leads activos por etapa)
  const pipe = stages.map(st => ({ label: st.label, count: leads.filter(l => l.status !== 'aceptada' && (l.stage_key || 'mensaje_entrante') === st.key).length }));

  $('#dash').innerHTML = `
    <div class="kpis">
      <div class="kpi dark"><span>Facturado</span><b>${money(facturado)}</b></div>
      <div class="kpi"><span>Cobrado</span><b>${money(cobrado)}</b></div>
      <div class="kpi"><span>Por cobrar</span><b>${money(Math.max(0, facturado - cobrado))}</b></div>
      <div class="kpi"><span>Trabajos</span><b>${pcards.length}</b></div>
      <div class="kpi"><span>Cotizaciones</span><b>${pquotes.length}</b></div>
      <div class="kpi"><span>Conversión</span><b>${pct(conv)}</b></div>
    </div>
    <div class="grid2">
      <div>
        <div class="card"><h2>Evolución de ventas (12 meses)</h2>${lineChart(m12, serie)}</div>
        <div class="card"><h2>Ventas por vendedor</h2>${barList(vendArr, money)}</div>
      </div>
      <div>
        <div class="card"><h2>Pipeline comercial</h2>
          <table class="grid"><tbody>${pipe.map(p => `<tr><td>${esc(p.label)}</td><td class="num">${p.count}</td></tr>`).join('')}</tbody></table></div>
        <div class="card"><h2>Productos más vendidos</h2>
          <table class="grid"><thead><tr><th>Producto</th><th class="num">Unid.</th></tr></thead>
          <tbody>${prodArr.map(([p, q]) => `<tr><td>${esc(p)}</td><td class="num">${q}</td></tr>`).join('') || '<tr><td class="muted">Sin datos.</td></tr>'}</tbody></table></div>
      </div>
    </div>`;
 } catch (e) { $('#dash').innerHTML = `<div class="card" style="color:#A33A3A;padding:18px">Error al mostrar Ventas: ${esc(e.message || e)}</div>`; console.error(e); }
}

function lineChart(labels, vals) {
  const W = 560, H = 180, pad = 28; const max = Math.max(1, ...vals);
  const x = i => pad + i * (W - 2 * pad) / (labels.length - 1);
  const y = v => H - pad - v / max * (H - 2 * pad);
  const pts = vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const dots = vals.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="#0A0A0A"/>`).join('');
  const xlabels = labels.map((m, i) => i % 2 === 0 ? `<text x="${x(i).toFixed(1)}" y="${H - 8}" font-size="9" text-anchor="middle" fill="#9AA0A6">${m.slice(5)}</text>` : '').join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
    <line x1="${pad}" y1="${H - pad}" x2="${W - pad}" y2="${H - pad}" stroke="#E2E2E0"/>
    <polyline points="${pts}" fill="none" stroke="#0A0A0A" stroke-width="2"/>${dots}${xlabels}
    <text x="${pad}" y="16" font-size="10" fill="#9AA0A6">máx ${money(max)}</text></svg>`;
}
function barList(arr, fmt) {
  if (!arr.length) return '<p class="muted">Sin datos en el período.</p>';
  const max = Math.max(...arr.map(a => a[1]));
  return arr.map(([k, v]) => `<div style="margin-bottom:9px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${esc(k)}</span><b>${fmt(v)}</b></div>
    <div class="bar" style="width:${Math.max(4, v / max * 100)}%"></div></div>`).join('');
}
</script>
</body>
</html>
