<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>De Cirene · Cotizador</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/cirene-theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  .wrap { max-width: 1280px; margin: 0 auto; padding: 16px 18px 80px; }
  .cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; align-items: start; }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
  .card h2 { font-size: 15px; margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; }
  .fg label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--tinta-2); margin-bottom: 4px; }
  .fg input, .fg select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font: inherit; }
  table.grid { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.grid th { text-align: left; padding: 6px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; color: var(--tinta-2); border-bottom: 1px solid var(--border); }
  table.grid td { padding: 3px 4px; border-bottom: 1px solid var(--surface-3); }
  table.grid input, table.grid select { width: 100%; border: 1px solid transparent; background: transparent; padding: 5px 5px; border-radius: 6px; font: inherit; font-size: 13px; }
  table.grid input:focus, table.grid select:focus { outline: none; border-color: #0A0A0A; background: #fff; }
  td.num, th.num { text-align: right; } td.num input { text-align: right; }
  .row-actions button { background: none; border: none; cursor: pointer; color: var(--tinta-3); font-size: 14px; }
  .row-actions button:hover { color: #A33A3A; }
  .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-2); background: #fff; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
  .btn.primary { background: #0A0A0A; color: #fff; border-color: #0A0A0A; }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: default; }
  .sub { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--tinta-2); margin: 14px 0 4px; }
  .costbox { display: flex; gap: 16px; flex-wrap: wrap; background: #0A0A0A; color: #fff; border-radius: 10px; padding: 10px 14px; margin-top: 12px; }
  .costbox div span { display: block; font-size: 10px; opacity: .7; text-transform: uppercase; }
  .costbox div b { font-size: 16px; }
  .lineas .li { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid var(--surface-3); }
  .lineas .li .ln { font-weight: 600; } .lineas .li .lm { font-size: 11px; color: var(--tinta-3); }
  .totbox { margin-top: 12px; font-size: 13px; }
  .totbox .t { display: flex; justify-content: space-between; padding: 3px 0; }
  .totbox .grand { font-size: 20px; font-weight: 800; border-top: 2px solid #0A0A0A; margin-top: 6px; padding-top: 8px; }
  .muted { color: var(--tinta-3); font-size: 12px; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0A0A0A; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="navbar-mount"></div>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <h1 style="font-family:'Raleway'">Cotizador</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="loadQuote" class="btn" style="font-weight:500"><option value="">Cargar cotización…</option></select>
      <button class="btn" id="btnNueva">Nueva</button>
    </div>
  </div>
  <div class="cols">
    <!-- Builder -->
    <div class="card">
      <h2>Producto</h2>
      <div class="row">
        <div class="fg"><label>Nombre del producto</label><input id="b-nombre" placeholder="Ej: Leñero"></div>
        <div class="fg"><label>Cargar plantilla</label><select id="b-tpl"><option value="">— en blanco —</option></select></div>
        <div class="fg"><label>Cantidad</label><input id="b-cant" type="number" min="1" step="1" value="1"></div>
        <div class="fg"><label>Multiplicador</label><input id="b-mult" type="number" step="0.05" value="1.5"></div>
      </div>
      <div class="row" style="margin-top:8px">
        <div class="fg"><label>Tamaño / dimensiones</label><input id="b-tam" placeholder="a medida / estándar"></div>
        <div class="fg" style="display:flex;align-items:flex-end;gap:6px"><label style="margin:0"><input type="checkbox" id="b-pintado"> Pintado</label></div>
      </div>

      <div class="sub">Materiales</div>
      <table class="grid"><thead><tr><th style="width:38%">Material</th><th>Dimensión</th><th class="num">Cant.</th><th class="num">Costo/u</th><th class="num">Subtotal</th><th></th></tr></thead><tbody id="mtBody"></tbody></table>
      <button class="btn sm" id="addMat" style="margin-top:6px">+ Material</button>

      <div class="sub">Mano de obra</div>
      <table class="grid"><thead><tr><th style="width:38%">Rol</th><th class="num">Costo/h</th><th class="num">Horas</th><th class="num">Subtotal</th><th></th></tr></thead><tbody id="lbBody"></tbody></table>
      <button class="btn sm" id="addLab" style="margin-top:6px">+ Mano de obra</button>

      <div class="costbox" id="bCost"></div>
      <div style="margin-top:14px"><button class="btn primary" id="addLine">Agregar a la cotización</button></div>
    </div>

    <!-- Cotización -->
    <div class="card">
      <h2>Cotización</h2>
      <div class="row">
        <div class="fg"><label>Cliente</label><input id="c-nombre" placeholder="Nombre o empresa"></div>
        <div class="fg"><label>Contacto / teléfono</label><input id="c-contacto" placeholder="097…"></div>
      </div>
      <div class="fg" style="margin-top:8px"><label>Dirección</label><input id="c-direccion" placeholder="(opcional)"></div>

      <div class="sub">Ítems</div>
      <div class="lineas" id="lineas"><p class="muted">Agregá productos desde la izquierda.</p></div>

      <div class="totbox" id="totales"></div>

      <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" id="btnGuardar">Guardar</button>
        <button class="btn" id="btnPDF">Generar PDF</button>
      </div>
      <div class="muted" id="quoteMeta" style="margin-top:8px"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { renderNavbar } from './js/navbar.js?v=2';
import { requireAuth } from './js/auth.js?v=2';
import * as data from './js/cirene-data.js?v=2';
import { calcLine, calcQuoteTotals, money, pct, n } from './js/quote-engine.js?v=2';

const $ = s => document.querySelector(s);
const toast = m => { const t = $('#toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1900); };
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

let materials = [], laborRates = [], templates = [], vendor = 'Visitante';
const state = { id: null, numero: null, cliente: {}, lineas: [] };
let builder = newBuilder();
function newBuilder() { return { nombre: '', templateId: null, pintado: false, cantidad: 1, tamano: '', multiplicador: 1.5, materiales: [], manoObra: [], editIndex: null }; }

await requireAuth();
renderNavbar('cot');
[materials, laborRates, templates, vendor] = await Promise.all([data.listMaterials(), data.listLaborRates(), data.listTemplates(), data.currentVendorName()]);

// Selects
$('#b-tpl').innerHTML = '<option value="">— en blanco —</option>' + templates.map(t => `<option value="${t.id}">${esc(t.nombre)}</option>`).join('');
refreshLoadQuotes();

// Contexto desde el CRM: ?intake=<id> precarga cliente; ?quote=<id> carga la cotización
const _params = new URLSearchParams(location.search);
const _quoteParam = _params.get('quote');
if (_quoteParam) { try { await cargarCotizacion(_quoteParam); } catch {} }
const _intakeId = _params.get('intake');
if (_intakeId) {
  state.intakeId = _intakeId;
  try {
    const lead = await data.getIntakeCard(_intakeId);
    if (lead && !_quoteParam) {
      state.cliente = { nombre: lead.client_query || '', contacto: lead.client_phone_e164 || '', direccion: '' };
      $('#c-nombre').value = state.cliente.nombre; $('#c-contacto').value = state.cliente.contacto;
      $('#quoteMeta').textContent = 'Cotizando para: ' + (lead.client_query || '');
    }
  } catch {}
}

// Builder field bindings
$('#b-nombre').oninput = e => builder.nombre = e.target.value;
$('#b-cant').oninput = e => builder.cantidad = n(e.target.value) || 1;
$('#b-mult').oninput = e => { builder.multiplicador = n(e.target.value) || 1.5; drawCost(); };
$('#b-tam').oninput = e => builder.tamano = e.target.value;
$('#b-pintado').onchange = e => builder.pintado = e.target.checked;
$('#b-tpl').onchange = async e => { if (e.target.value) await loadTemplate(e.target.value); };
$('#addMat').onclick = () => { const m0 = materials[0] || {}; builder.materiales.push({ material_id: m0.id || null, descripcion: m0.nombre || '', dimension: '', costoUnit: m0.precio_unit || 0, cantidad: 1 }); drawMat(); drawCost(); };
$('#addLab').onclick = () => { const r0 = laborRates.find(r => !r.es_transporte) || laborRates[0] || {}; builder.manoObra.push({ labor_rate_id: r0.id || null, rol: r0.rol || '', costoHora: r0.costo_hora || 0, horas: 1 }); drawLab(); drawCost(); };
$('#addLine').onclick = addLineToQuote;
$('#btnNueva').onclick = () => { if (confirm('¿Empezar una cotización nueva?')) resetAll(); };
$('#btnGuardar').onclick = guardar;
$('#btnPDF').onclick = generarPDF;
['c-nombre', 'c-contacto', 'c-direccion'].forEach(id => $('#' + id).oninput = () => { state.cliente = { nombre: $('#c-nombre').value, contacto: $('#c-contacto').value, direccion: $('#c-direccion').value }; });
$('#loadQuote').onchange = e => { if (e.target.value) cargarCotizacion(e.target.value); };

drawMat(); drawLab(); drawCost(); drawLineas();

async function loadTemplate(id) {
  const t = await data.getTemplate(id);
  builder.nombre = t.tpl.nombre; builder.templateId = id; builder.multiplicador = n(t.tpl.multiplicador) || 1.5;
  builder.tamano = t.tpl.dimensiones || ''; builder.materiales = t.materiales.map(m => ({ material_id: m.material_id, descripcion: m.descripcion, dimension: m.dimension, costoUnit: n(m.costo_unit), cantidad: n(m.cantidad) }));
  builder.manoObra = t.manoObra.map(l => ({ labor_rate_id: l.labor_rate_id, rol: l.rol, costoHora: n(l.costo_hora), horas: n(l.horas) }));
  $('#b-nombre').value = builder.nombre; $('#b-mult').value = builder.multiplicador; $('#b-tam').value = builder.tamano;
  drawMat(); drawLab(); drawCost();
}

const matOpts = sel => materials.map(m => `<option value="${m.id}" ${m.id === sel ? 'selected' : ''}>${esc(m.nombre)} (${esc(m.unidad)})</option>`).join('');
const labOpts = sel => laborRates.map(r => `<option value="${r.id}" ${r.id === sel ? 'selected' : ''}>${esc(r.rol)}</option>`).join('');

function drawMat() {
  $('#mtBody').innerHTML = builder.materiales.map((m, i) => `<tr data-i="${i}">
    <td><select data-f="material_id">${matOpts(m.material_id)}</select></td>
    <td><input data-f="dimension" value="${esc(m.dimension)}"></td>
    <td class="num"><input data-f="cantidad" type="number" step="0.01" value="${n(m.cantidad)}"></td>
    <td class="num"><input data-f="costoUnit" type="number" step="0.01" value="${n(m.costoUnit)}"></td>
    <td class="num">${money(n(m.costoUnit) * n(m.cantidad))}</td>
    <td class="row-actions"><button data-del>✕</button></td></tr>`).join('');
  $('#mtBody').querySelectorAll('tr').forEach(tr => {
    const i = +tr.dataset.i;
    tr.querySelectorAll('[data-f]').forEach(el => el.onchange = () => {
      const f = el.dataset.f;
      if (f === 'material_id') { builder.materiales[i].material_id = el.value; const mm = materials.find(x => x.id === el.value); if (mm) { builder.materiales[i].costoUnit = n(mm.precio_unit); builder.materiales[i].descripcion = mm.nombre; } }
      else builder.materiales[i][f] = (f === 'dimension') ? el.value : n(el.value);
      drawMat(); drawCost();
    });
    tr.querySelector('[data-del]').onclick = () => { builder.materiales.splice(i, 1); drawMat(); drawCost(); };
  });
}
function drawLab() {
  $('#lbBody').innerHTML = builder.manoObra.map((l, i) => `<tr data-i="${i}">
    <td><select data-f="labor_rate_id">${labOpts(l.labor_rate_id)}</select></td>
    <td class="num"><input data-f="costoHora" type="number" step="1" value="${n(l.costoHora)}"></td>
    <td class="num"><input data-f="horas" type="number" step="0.5" value="${n(l.horas)}"></td>
    <td class="num">${money(n(l.costoHora) * n(l.horas))}</td>
    <td class="row-actions"><button data-del>✕</button></td></tr>`).join('');
  $('#lbBody').querySelectorAll('tr').forEach(tr => {
    const i = +tr.dataset.i;
    tr.querySelectorAll('[data-f]').forEach(el => el.onchange = () => {
      const f = el.dataset.f;
      if (f === 'labor_rate_id') { builder.manoObra[i].labor_rate_id = el.value; const rr = laborRates.find(x => x.id === el.value); if (rr) { builder.manoObra[i].costoHora = n(rr.costo_hora); builder.manoObra[i].rol = rr.rol; } }
      else builder.manoObra[i][f] = n(el.value);
      drawLab(); drawCost();
    });
    tr.querySelector('[data-del]').onclick = () => { builder.manoObra.splice(i, 1); drawLab(); drawCost(); };
  });
}
function drawCost() {
  const l = calcLine({ materiales: builder.materiales, manoObra: builder.manoObra, multiplicador: builder.multiplicador });
  $('#bCost').innerHTML = `
    <div><span>Materiales</span><b>${money(l.costoMateriales)}</b></div>
    <div><span>Mano de obra</span><b>${money(l.costoMO)}</b></div>
    <div><span>Costo directo</span><b>${money(l.costoDirecto)}</b></div>
    <div><span>Precio ×${l.multiplicador}</span><b>${money(l.precioVenta)}</b></div>
    <div><span>Margen</span><b>${pct(l.margen)}</b></div>`;
  $('#addLine').textContent = builder.editIndex == null ? 'Agregar a la cotización' : 'Actualizar ítem';
}

function addLineToQuote() {
  if (!builder.nombre.trim()) { toast('Ponele nombre al producto'); return; }
  const line = {
    producto: builder.nombre, templateId: builder.templateId, es_estandar: !!builder.templateId,
    pintado: builder.pintado, tamano: builder.tamano, cantidad: n(builder.cantidad) || 1,
    materiales: builder.materiales.map(m => ({ ...m })), manoObra: builder.manoObra.map(l => ({ ...l })),
    multiplicador: builder.multiplicador,
  };
  calcLine(line);
  if (builder.editIndex == null) state.lineas.push(line);
  else state.lineas[builder.editIndex] = line;
  builder = newBuilder(); resetBuilderUI();
  drawLineas();
  toast('Ítem agregado');
}
function resetBuilderUI() {
  $('#b-nombre').value = ''; $('#b-tpl').value = ''; $('#b-cant').value = 1; $('#b-mult').value = 1.5; $('#b-tam').value = ''; $('#b-pintado').checked = false;
  drawMat(); drawLab(); drawCost();
}
function drawLineas() {
  if (!state.lineas.length) { $('#lineas').innerHTML = '<p class="muted">Agregá productos desde la izquierda.</p>'; drawTotales(); return; }
  $('#lineas').innerHTML = state.lineas.map((l, i) => `<div class="li" data-i="${i}">
    <div><div class="ln">${esc(l.producto)} ${l.cantidad > 1 ? '×' + l.cantidad : ''}</div>
      <div class="lm">${esc(l.tamano || '')}${l.pintado ? ' · pintado' : ''} · costo ${money(l.costoDirecto)} · margen ${pct(l.margen)}</div></div>
    <div style="display:flex;gap:10px;align-items:center">
      <b>${money(l.precioVenta * (l.cantidad || 1))}</b>
      <span class="row-actions"><button data-edit title="Editar">✎</button><button data-del title="Quitar">✕</button></span>
    </div></div>`).join('');
  $('#lineas').querySelectorAll('.li').forEach(el => {
    const i = +el.dataset.i;
    el.querySelector('[data-del]').onclick = () => { state.lineas.splice(i, 1); drawLineas(); };
    el.querySelector('[data-edit]').onclick = () => editLine(i);
  });
  drawTotales();
}
function editLine(i) {
  const l = state.lineas[i];
  builder = { nombre: l.producto, templateId: l.templateId, pintado: l.pintado, cantidad: l.cantidad, tamano: l.tamano, multiplicador: l.multiplicador, materiales: l.materiales.map(m => ({ ...m })), manoObra: l.manoObra.map(x => ({ ...x })), editIndex: i };
  $('#b-nombre').value = l.producto; $('#b-cant').value = l.cantidad; $('#b-mult').value = l.multiplicador; $('#b-tam').value = l.tamano || ''; $('#b-pintado').checked = !!l.pintado;
  drawMat(); drawLab(); drawCost();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function drawTotales() {
  const t = calcQuoteTotals(state);
  $('#totales').innerHTML = `
    <div class="t"><span>Materiales</span><span>${money(t.subtotalMateriales)}</span></div>
    <div class="t"><span>Mano de obra</span><span>${money(t.subtotalMO)}</span></div>
    <div class="t"><span>Costo directo</span><span>${money(t.costoDirecto)}</span></div>
    <div class="t"><span>Ganancia (margen ${pct(t.margen)})</span><span>${money(t.ganancia)}</span></div>
    <div class="t grand"><span>TOTAL</span><span>${money(t.precioVenta)}</span></div>`;
}

async function guardar() {
  if (!state.lineas.length) { toast('La cotización está vacía'); return; }
  $('#btnGuardar').disabled = true;
  try {
    const t = calcQuoteTotals(state);
    if (!state.numero) { state.numero = await data.nextQuoteNumber(); state.id = data.quoteId(state.numero); }
    const { data: { user } } = await (await import('./js/supa.js?v=2')).getSupa().auth.getUser();
    const quote = {
      id: state.id, numero: state.numero, estado: 'presupuestado',
      cliente_nombre: state.cliente.nombre || null, cliente_contacto: state.cliente.contacto || null,
      cliente_telefono: state.cliente.contacto || null, cliente_direccion: state.cliente.direccion || null,
      vendedor: vendor, vendedor_user_id: user?.id || null, intake_card_id: state.intakeId || null,
      subtotal_materiales: t.subtotalMateriales, subtotal_mo: t.subtotalMO, costo_directo: t.costoDirecto,
      multiplicador: 1.5, precio_venta: t.precioVenta, ganancia: t.ganancia, margen: t.margen,
    };
    await data.saveQuote(quote, state.lineas);
    refreshLoadQuotes();
    $('#quoteMeta').textContent = `Guardada como ${state.id} · ${vendor}`;
    toast('Cotización guardada: ' + state.id);
  } catch (e) { toast('Error: ' + (e.message || e)); }
  finally { $('#btnGuardar').disabled = false; }
}

async function refreshLoadQuotes() {
  try {
    const qs = await data.listQuotes();
    $('#loadQuote').innerHTML = '<option value="">Cargar cotización…</option>' + qs.map(q => `<option value="${q.id}">${q.id} · ${esc(q.cliente_nombre || 's/cliente')} · ${money(q.precio_venta)}</option>`).join('');
  } catch {}
}
async function cargarCotizacion(id) {
  const { quote, lines } = await data.getQuote(id);
  if (!quote) return;
  state.id = quote.id; state.numero = quote.numero;
  state.cliente = { nombre: quote.cliente_nombre || '', contacto: quote.cliente_contacto || '', direccion: quote.cliente_direccion || '' };
  $('#c-nombre').value = state.cliente.nombre; $('#c-contacto').value = state.cliente.contacto; $('#c-direccion').value = state.cliente.direccion;
  state.lineas = lines.map(l => { const o = { producto: l.producto, templateId: l.template_id, es_estandar: l.es_estandar, pintado: l.pintado, tamano: l.tamano, cantidad: n(l.cantidad) || 1, materiales: l.materiales || [], manoObra: l.mano_obra || [], multiplicador: n(l.multiplicador) || 1.5 }; calcLine(o); return o; });
  drawLineas();
  $('#quoteMeta').textContent = `Editando ${state.id}`;
  toast('Cargada ' + id);
}
function resetAll() {
  state.id = null; state.numero = null; state.cliente = {}; state.lineas = [];
  $('#c-nombre').value = ''; $('#c-contacto').value = ''; $('#c-direccion').value = '';
  $('#quoteMeta').textContent = ''; builder = newBuilder(); resetBuilderUI(); $('#loadQuote').value = '';
  drawLineas();
}

/* ───────── PDF molde De Cirene ───────── */
function generarPDF() {
  if (!state.lineas.length) { toast('Nada para exportar'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, M = 18; let y = 18;
  const t = calcQuoteTotals(state);
  const fecha = new Date().toLocaleDateString('es-UY');
  // Encabezado
  doc.setFillColor(10, 10, 10); doc.rect(0, 0, W, 30, 'F');
  doc.setTextColor(255); doc.setFont('helvetica', 'bold'); doc.setFontSize(18);
  doc.text('EMPRENDIMIENTOS DE CIRENE', M, 14);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
  doc.text('Herrería · Tel 097 225 165 · @de_cirene_', M, 21);
  doc.setFontSize(13); doc.setFont('helvetica', 'bold');
  doc.text('PRESUPUESTO', W - M, 18, { align: 'right' });
  y = 40; doc.setTextColor(20);
  // Cliente
  doc.setFontSize(10); doc.setFont('helvetica', 'normal');
  doc.text(`Cliente: ${state.cliente.nombre || '-'}`, M, y);
  doc.text(`Fecha: ${fecha}`, W - M, y, { align: 'right' }); y += 5;
  if (state.cliente.contacto) { doc.text(`Contacto: ${state.cliente.contacto}`, M, y); y += 5; }
  if (state.cliente.direccion) { doc.text(`Dirección: ${state.cliente.direccion}`, M, y); y += 5; }
  if (state.id) { doc.text(`N° ${state.id}`, M, y); y += 5; }
  y += 3;
  // Tabla de ítems
  doc.setFillColor(245); doc.rect(M, y, W - 2 * M, 8, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
  doc.text('Concepto', M + 2, y + 5.5); doc.text('Cant.', W - M - 42, y + 5.5, { align: 'right' }); doc.text('Importe', W - M - 2, y + 5.5, { align: 'right' });
  y += 11; doc.setFont('helvetica', 'normal');
  for (const l of state.lineas) {
    const desc = l.producto + (l.tamano ? ` (${l.tamano})` : '') + (l.pintado ? ' · pintado' : '');
    doc.text(doc.splitTextToSize(desc, 110), M + 2, y);
    doc.text(String(l.cantidad || 1), W - M - 42, y, { align: 'right' });
    doc.text(money(l.precioVenta * (l.cantidad || 1)), W - M - 2, y, { align: 'right' });
    y += 8;
    if (y > 250) { doc.addPage(); y = 24; }
  }
  // Total
  doc.setDrawColor(10); doc.line(M, y, W - M, y); y += 7;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
  doc.text('TOTAL', W - M - 50, y, { align: 'right' });
  doc.text(money(t.precioVenta), W - M - 2, y, { align: 'right' });
  y += 14;
  // Términos
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(80);
  const terminos = [
    'Validez del presupuesto: 15 días.',
    'Forma de pago: 50% de adelanto (materiales e inicio) y 50% al finalizar.',
    'Plazo estimado: fabricación ~2 semanas + instalación, a coordinar.',
    'Flete / instalación: a cotizar según lugar.',
  ];
  doc.text('Condiciones', M, y); y += 5; doc.setTextColor(110);
  terminos.forEach(tx => { doc.text('• ' + tx, M, y); y += 5; });
  y += 4; doc.setTextColor(10); doc.setFont('helvetica', 'italic');
  doc.text('¡Gracias por pensar en Emprendimientos De Cirene para tu producto!', M, y);
  const fname = (state.id || 'presupuesto') + '_' + (state.cliente.nombre || 'cliente').replace(/\s+/g, '_') + '.pdf';
  doc.save(fname);
  toast('PDF generado');
}
</script>
</body>
</html>
