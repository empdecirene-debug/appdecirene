<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>De Cirene · Producción</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/cirene-theme.css">
<link rel="stylesheet" href="/css/save-pill.css">
<!-- jsPDF UMD para generar PDFs de OC y Ficha de Producción -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
/* Paleta y reset vienen de css/cirene-theme.css. Acá solo lo específico de Producción. */

/* Page header: el resto viene de .cirene-page-hdr. Solo overrides del view-toggle y filtros. */
.view-toggle { display: inline-flex; background: var(--surface-3); border-radius: var(--r-md); padding: 3px; }
.view-toggle button { padding: 6px 14px; border: none; background: transparent; font-family: inherit;
  font-size: 13px; font-weight: 600; color: var(--tinta-2); border-radius: 7px; cursor: pointer; transition: all .15s; }
.view-toggle button.sel { background: var(--azul); color: #fff; }
.view-toggle button:not(.sel):hover { color: var(--tinta); background: rgba(0, 0, 0,0.06); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-pill { padding: 5px 11px; border: 1px solid var(--border); border-radius: 999px;
  background: var(--surface); font-size: 12px; font-weight: 600; color: var(--tinta-2); cursor: pointer; transition: all .15s; }
.filter-pill:hover { border-color: var(--azul-l); color: var(--tinta); }
.filter-pill.sel { background: var(--azul); color: #fff; border-color: var(--azul); }

.btn-new-task { padding: 8px 14px; border: none; border-radius: var(--r); background: var(--azul); color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0, 0, 0,.22); }
.btn-new-task:hover { background: var(--azul-d); }

@keyframes spin { to { transform: rotate(360deg); } }

.kanban-wrap {
  padding: 8px 16px 48px;
  overflow-x: auto;
  /* Escondo el scrollbar nativo porque renderizamos uno custom sticky-bottom abajo */
  scrollbar-width: none;
}
.kanban-wrap::-webkit-scrollbar { display: none; }
.kanban { display: inline-flex; gap: 12px; min-height: calc(100vh - 175px); padding-bottom: 12px; }

/* Scrollbar custom sticky abajo de la viewport — bien gordo y azul para que sea
   imposible no verlo y fácil de agarrar a dedo o con el cursor. */
.kanban-sb {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 34px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 40;
  padding: 6px 10px;
  display: none;     /* JS lo muestra solo si hay overflow horizontal */
  box-shadow: 0 -2px 12px rgba(0, 0, 0,0.10);
}
.kanban-sb-track {
  position: relative;
  width: 100%;
  height: 100%;
  background: var(--surface-2);
  border-radius: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
}
.kanban-sb-thumb {
  position: absolute;
  top: 0;
  bottom: 0;
  background: var(--azul);
  border-radius: 11px;
  cursor: grab;
  min-width: 100px;
  transition: background .12s;
}
.kanban-sb-thumb:hover { background: var(--azul-d); }
.kanban-sb-thumb:active { cursor: grabbing; background: var(--azul-d); }

.col { width: 280px; flex-shrink: 0; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 12px; display: flex; flex-direction: column; max-height: calc(100vh - 130px); }
.col.drop-target { background: #DCEFFC; border-color: var(--azul); }
.col-hdr { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center;
  gap: 8px; font-weight: 600; font-size: 13px; }
.col-hdr .dot { width: 10px; height: 10px; border-radius: 50%; }
.col-hdr .count { margin-left: auto; font-size: 11px; color: var(--tinta-2); font-weight: 700;
  background: var(--surface); padding: 1px 8px; border-radius: 999px; border: 1px solid var(--border); }
.col-body { padding: 8px; overflow-y: auto; flex: 1; min-height: 60px; }

.card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 11px; margin-bottom: 7px; cursor: grab; transition: box-shadow .1s, transform .1s; }
.card:hover { box-shadow: 0 3px 10px rgba(0, 0, 0,0.08); }
.card.dragging { opacity: 0.4; }
.card .cli { font-weight: 600; font-size: 13px; color: var(--tinta); padding-right: 56px; }
@keyframes gln-spin { to { transform: rotate(360deg); } }
.card .pedido { font-size: 12px; color: var(--azul); font-weight: 600; margin-top: 2px;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.card .desc { font-size: 11px; color: var(--tinta-2); margin-top: 3px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card .brdr-miss { font-size: 10px; color: var(--warn-text); background: var(--warn-bg);
  margin-top: 6px; padding: 4px 6px; border-radius: 4px; border-left: 2px solid #BA7517; line-height: 1.3; }
.card .brdr-ok { font-size: 10px; color: var(--ok-text); background: var(--ok-bg);
  margin-top: 6px; padding: 4px 6px; border-radius: 4px; border-left: 2px solid #0F6E56; font-weight: 600; }
.card .badges { display: flex; gap: 4px; margin-top: 7px; flex-wrap: wrap; }
/* Acciones rápidas (urgente + entregar) en la esquina superior derecha de cada card */
.card-quick { position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; }
.card-quick button { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border);
  background: #fff; cursor: pointer; font-size: 13px; line-height: 1; padding: 0;
  display: inline-flex; align-items: center; justify-content: center; color: var(--tinta-2);
  transition: all .12s; font-family: inherit; }
.card-quick button:hover { transform: translateY(-1px); }
.card-quick .qa-urge { color: #B85800; }
.card-quick .qa-urge.on { background: #FCEBEB; color: var(--err-text); border-color: #F0A0A0; }
.card-quick .qa-urge:hover { background: #FCEBEB; color: var(--err-text); border-color: #F0A0A0; }
.card-quick .qa-done { color: var(--verde); }
.card-quick .qa-done:hover { background: var(--ok-bg); border-color: var(--verde); color: var(--ok-text); }

.badge { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 9px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.01em; }
.b-urge { background: #FCEBEB; color: var(--err-text); }
.b-alta { background: #FFEFE0; color: #B85800; }
.b-sample { background: #F3E8FF; color: #6B21A8; }
.b-repose { background: #FEF3C7; color: #92400E; font-weight: 700; }
.b-comment { background: #FEF3C7; color: #92400E; font-weight: 700; border: 1px solid #F59E0B; animation: pulse-comment 1.5s ease-in-out infinite; }
.b-cmtread { background: #F1F5FB; color: #5A5F66; border: 1px solid #C8D8E8; cursor: help; }
@keyframes pulse-comment { 0%,100% { opacity: 1 } 50% { opacity: .6 } }
.b-tec { background: #EFEFEF; color: #222222; }
.b-asg { background: #F4F4F4; color: #444; }
.b-due { background: #FFF3DD; color: #8A5800; }
.b-due.overdue { background: #FCEBEB; color: var(--err-text); }
/* Estado del stock / insumo — visibles en la card */
.b-stock        { background: #FFF3DD; color: #8A5800; }              /* Comprar/Registrar */
.b-stock.ready  { background: #DCFCE7; color: #166534; }              /* En oficina */
.b-stock.deliv  { background: #E0F2FE; color: #075985; }              /* Entrega* */
.b-stock.done   { background: #DCFCE7; color: #166534; font-weight:700; } /* Entregado */
.b-stock.pause  { background: #F4F4F4; color: #6B7280; }              /* En Pausa / Cancelado */
.b-insumo       { background: #FEF3C7; color: #78350F; }              /* default — DTF/edición */
.b-insumo.ready { background: #DCFCE7; color: #166534; }              /* Esta el DTF */
.b-insumo.terc  { background: #FFEDD5; color: #9A3412; }              /* tercerizado/bordador */
.b-insumo.laser { background: #F3E8FF; color: #6B21A8; }              /* LASER */
.b-insumo.cost  { background: #CFFAFE; color: #155E75; }              /* Modista/Jornalero */
.b-insumo.muest { background: #F3E8FF; color: #6B21A8; }              /* Enviar muestra / Neutralizar */

.alert { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin: 12px 18px; }
.alert.err { background: var(--err-bg); color: var(--err-text); border-left: 3px solid #A32D2D; }
.alert.warn { background: #FFF3DD; color: #663C00; border-left: 3px solid #BA7517; }
.alert.ok { background: var(--ok-bg); color: var(--ok-text); border-left: 3px solid #0F6E56; }

/* Modal de detalle */
.modal-bg { position: fixed; inset: 0; background: rgba(0, 0, 0,0.45); z-index: 200;
  display: flex; align-items: flex-start; justify-content: center; padding: 30px 16px; overflow-y: auto; }
.modal { background: #fff; border-radius: 14px; max-width: 720px; width: 100%; padding: 22px;
  box-shadow: 0 20px 60px rgba(0, 0, 0,0.25); }
.modal h2 { font-size: 18px; margin-bottom: 4px; }
.modal .subtitle { font-size: 12px; color: var(--tinta-2); }
.modal .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; margin: 16px 0; font-size: 13px; }
.modal .grid .k { font-size: 11px; font-weight: 600; color: var(--tinta-2); text-transform: uppercase;
  letter-spacing: 0.04em; margin-bottom: 2px; }
.modal .grid .v { color: var(--tinta); }
.modal h3 { font-size: 14px; margin: 16px 0 8px; }
.modal .stories { background: var(--surface-2); border-radius: 8px; padding: 10px; font-size: 12px;
  max-height: 260px; overflow-y: auto; }
.modal .stories .ev { padding: 4px 0; border-bottom: 1px dashed var(--border); }
.modal .stories .ev:last-child { border-bottom: none; }
.modal .stories .when { color: var(--tinta-3); font-size: 11px; }
.modal .stage-select { display: flex; gap: 6px; flex-wrap: wrap; }
.modal .stage-select button { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: #fff; font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 600; color: var(--tinta-2); }
.modal .stage-select button:hover { background: var(--surface-2); border-color: var(--tinta-3); }
.modal .stage-select button.sel { background: var(--azul); color: #fff; border-color: var(--azul); }
.modal .stage-select button:disabled { opacity: 0.4; cursor: not-allowed; }
.modal .state-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0 4px; }
@media (max-width: 600px) { .modal .state-row { grid-template-columns: 1fr; } }
.modal .state-row label { font-size: 11px; font-weight: 600; color: var(--tinta-2); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
.modal .state-row select { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; color: var(--tinta); background: #fff; }
.modal .state-row select:focus { outline: none; border-color: var(--azul); box-shadow: 0 0 0 3px rgba(0, 0, 0,0.12); }
.modal .auto-rule-hint { font-size: 11px; color: var(--tinta-3); margin-top: -2px; }
.modal-close { float: right; background: transparent; border: none; font-size: 22px; cursor: pointer; color: var(--tinta-2); }

/* Form de edición dentro del modal */
.modal .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; margin: 12px 0 8px; }
@media (max-width: 600px) { .modal .edit-grid { grid-template-columns: 1fr; } }
.modal .edit-grid .fg { display: flex; flex-direction: column; }
.modal .edit-grid .fg.wide { grid-column: 1 / -1; }
.modal .edit-grid label { font-size: 11px; font-weight: 600; color: var(--tinta-2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.modal .edit-grid input, .modal .edit-grid select, .modal .edit-grid textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 13px; font-family: inherit; color: var(--tinta); background: #fff;
}
.modal .edit-grid input:focus, .modal .edit-grid select:focus, .modal .edit-grid textarea:focus {
  outline: none; border-color: var(--azul); box-shadow: 0 0 0 3px rgba(0, 0, 0,0.10);
}
.modal .edit-grid textarea { resize: vertical; min-height: 60px; }
.modal .edit-actions { display: flex; gap: 8px; margin: 6px 0 14px; }
.modal .edit-actions button { padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.modal .btn-edit  { background: #fff; border: 1px solid var(--border); color: var(--tinta); }
.modal .btn-edit:hover { background: var(--surface-2); }
.modal .btn-save  { background: var(--azul); border: 1px solid var(--azul); color: #fff; }
.modal .btn-save:hover { background: var(--azul-d); }
.modal .btn-cancel { background: #fff; border: 1px solid var(--border); color: var(--tinta-2); }

/* Adjuntos */
.modal .attachments { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 14px; }
.modal .att { width: 88px; text-align: center; font-size: 11px; color: var(--tinta-2); text-decoration: none; }
.modal .att .thumb { width: 88px; height: 88px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2);
  background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--tinta-3); margin-bottom: 4px; }
.modal .att .name { display: block; word-break: break-all; line-height: 1.2; }
.modal .att:hover .thumb { border-color: var(--azul); }

/* Tabla de líneas en el modal */
.modal .lines-tbl { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 12px; }
.modal .lines-tbl th { background: var(--surface-2); padding: 6px 8px; text-align: left; font-weight: 600; color: var(--tinta-2); border-bottom: 1px solid var(--border); }
.modal .lines-tbl td { padding: 6px 8px; border-bottom: 1px solid #E8F1F6; color: var(--tinta); }
.modal .lines-tbl tr:last-child td { border-bottom: none; }
/* Editor de líneas (modo edición) */
.modal .lines-edit-tbl { width:100%; border-collapse:collapse; margin:6px 0 6px; font-size:12px; }
.modal .lines-edit-tbl th { background:var(--surface-2); padding:5px 6px; text-align:left; font-weight:600; color:var(--tinta-2); border-bottom:1px solid var(--border); }
.modal .lines-edit-tbl td { padding:3px 4px; border-bottom:1px solid #E8F1F6; vertical-align:middle; }
.modal .lines-edit-tbl input { width:100%; min-width:40px; border:1px solid var(--border); border-radius:4px; padding:4px 6px; font-size:12px; font-family:inherit; background:var(--surface); color:var(--tinta); box-sizing:border-box; }
.modal .lines-edit-tbl input:focus { outline:none; border-color:var(--azul); }
.modal .lines-edit-tbl .col-del { width:28px; text-align:center; }
.modal .lines-edit-tbl .col-del button { background:none; border:none; cursor:pointer; color:var(--tinta-3); font-size:16px; line-height:1; padding:0 4px; }
.modal .lines-edit-tbl .col-del button:hover { color:#c0392b; }
@media (max-width: 600px) { .modal .grid { grid-template-columns: 1fr; } }

.empty-msg { padding: 60px 20px; text-align: center; color: var(--tinta-3); }

/* ============ Modal grande: Crear OC + Ficha de Producción ============ */
.bigmodal-bg { position: fixed; inset: 0; background: rgba(0, 0, 0,0.45); z-index: 250;
  display: flex; align-items: flex-start; justify-content: center; padding: 20px 16px; overflow-y: auto; }
.bigmodal { background: #fff; border-radius: 14px; max-width: 1000px; width: 100%; padding: 22px;
  box-shadow: 0 20px 60px rgba(0, 0, 0,0.25); }
.bigmodal h2 { font-size: 18px; margin-bottom: 4px; }
.bigmodal .bm-close { float: right; background: transparent; border: none; font-size: 22px; cursor: pointer; color: var(--tinta-2); }
.bigmodal .bm-subtitle { font-size: 12px; color: var(--tinta-2); margin-bottom: 14px; }
.bigmodal h3 { font-size: 14px; margin: 16px 0 8px; color: var(--tinta); }

/* OC: lista de tareas con checkboxes */
.po-tasks { max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
.po-task { padding: 8px 12px; border-bottom: 1px solid var(--border-2); display: flex; align-items: center; gap: 10px; cursor: pointer; }
.po-task:last-child { border-bottom: none; }
.po-task:hover { background: var(--surface-2); }
.po-task input[type=checkbox] { flex-shrink: 0; width: 16px; height: 16px; cursor: pointer; }
.po-task .pt-cli { font-weight: 600; font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.po-task .pt-id { font-size: 11px; color: var(--tinta-3); }
.po-task .pt-lines { font-size: 11px; color: var(--tinta-2); }

/* OC: agrupado por proveedor */
.po-groups { display: flex; flex-direction: column; gap: 12px; }
.po-group { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: var(--surface-2); }
.po-group h4 { font-size: 14px; font-weight: 700; color: var(--azul); margin-bottom: 8px; }
.po-line { display: grid; grid-template-columns: 2fr 1fr 0.8fr 0.8fr 1.2fr 30px; gap: 6px; align-items: center; padding: 4px 0; font-size: 12px; }
.po-line input, .po-line select { padding: 5px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: #fff; font-family: inherit; }
.po-line .pl-prod { font-weight: 600; color: var(--tinta); }
.po-line .pl-card { font-size: 10px; color: var(--tinta-3); }
.po-line .pl-rm { width: 24px; height: 24px; border: none; background: transparent; color: var(--tinta-3); cursor: pointer; border-radius: 4px; }
.po-line .pl-rm:hover { background: var(--err-bg); color: var(--err-text); }
.po-empty { padding: 30px 12px; text-align: center; color: var(--tinta-3); font-size: 13px; }
.po-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.po-actions .btn { padding: 8px 14px; }

/* Ficha de Producción */
.sheet-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; margin-top: 10px; }
.sheet-form .fg.wide { grid-column: 1 / -1; }
.sheet-form .fg label { font-size: 11px; font-weight: 600; color: var(--tinta-2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; display: block; }
.sheet-form input, .sheet-form select, .sheet-form textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit; }
.sheet-form textarea { resize: vertical; min-height: 60px; }
.sheet-design-preview { margin-top: 6px; max-width: 100%; max-height: 180px; border: 1px solid var(--border); border-radius: 6px; }
@media (max-width: 600px) { .sheet-form { grid-template-columns: 1fr; } }

/* ============ Vista Calendario ============ */
.cal-wrap { padding: 8px 16px 40px; }
.cal-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 0 4px; flex-wrap: wrap; }
.cal-title { font-size: 18px; font-weight: 700; color: var(--tinta); text-transform: capitalize; min-width: 200px; }
.cal-nav, .cal-today { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: #fff;
  cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--tinta); }
.cal-nav { width: 36px; padding: 6px 0; font-size: 16px; }
.cal-nav:hover, .cal-today:hover { background: var(--surface-2); }
.cal-today { margin-left: auto; background: var(--azul); color: #fff; border-color: var(--azul); }
.cal-today:hover { background: var(--azul-d); }
.cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
.cal-dow { padding: 8px 10px; font-size: 11px; font-weight: 700; color: var(--tinta-2); text-transform: uppercase;
  letter-spacing: 0.06em; text-align: center; background: var(--surface-2); border-radius: 6px; }
.cal-cell { min-height: 110px; padding: 6px; background: #fff; border: 1px solid var(--border); border-radius: 8px;
  display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
.cal-cell.out { background: var(--surface-2); opacity: 0.55; }
.cal-cell.today { border: 2px solid var(--azul); padding: 5px; }
.cal-day { font-size: 12px; font-weight: 700; color: var(--tinta-2); margin-bottom: 2px; flex-shrink: 0; }
.cal-cell.today .cal-day { color: var(--azul); }
.cal-cards-list { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; min-height: 0; }
.cal-card { padding: 3px 7px; background: var(--celeste); color: #14161A; border-radius: 5px; font-size: 11px;
  cursor: pointer; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-weight: 600; transition: background .12s, color .12s; }
.cal-card:hover { background: var(--azul); color: #fff; }
.cal-card.urge { background: #FCEBEB; color: var(--err-text); }
.cal-card.urge:hover { background: var(--err-text); color: #fff; }
.cal-card.done  { background: var(--ok-bg); color: var(--ok-text); text-decoration: line-through; }
.cal-card.cancel { background: #F3F4F6; color: #9CA3AF; text-decoration: line-through; opacity: 0.75; }
.cal-card.cancel:hover { background: #E5E7EB; color: #6B7280; }
@media (max-width: 720px) {
  .cal-cell { min-height: 70px; }
  .cal-dow { padding: 4px 2px; font-size: 9px; }

<script type="module">
import { renderNavbar } from './js/navbar.js';
import { requireAuth, isAdmin } from './js/auth.js';
import { loadStages, loadCards, loadCard, loadStories, moveCardToStage, setCardStateFields, updateCardFields, missingFieldsForBorradorExit, deleteCard, createSaleOrderManual, setCardArchived, duplicateCard, addComment, markCommentsRead, loadUnreadCommentCounts, loadUnreadCommentsMap, loadRecentCommentsMap, createInvoiceForCard } from './js/production.js';
import { STOCK_STATES_GROUPED, INSUMO_STATES_GROUPED, stockWeight, insumoWeight, weightToBg,
         loadStageRules, listStageRules, saveStageRule, deleteStageRule, computeTargetStage } from './js/stage-rules.js';
import { getSupa } from './js/supa.js';
import { SUPPLIER_LIST, inferSupplierFromProductName } from './js/suppliers.js';
import { bootstrapCatalogFromSupabase, productThumb, loadCatalog } from './js/catalog-store.js';
import { saveGuard } from './js/save-guard.js';
import { listStockItems, upsertStockItem, deleteStockItem, importStockCsv, listStockBrands, findStockForLine, applyStockConsumption, nextStockSku } from './js/stock.js';
import { listDtfOrders, createDtfOrder, updateDtfOrder, deleteDtfOrder, nextOrdenN } from './js/dtf-orders.js';
import { listPurchaseOrders } from './js/purchase-orders.js';
import { loadMetrics, rowsToCsv } from './js/production-metrics.js';
import { downloadGanttPdf, ESTAMPE_PALETTE } from './js/gantt-pdf.js';
import { icon } from './js/icons.js';

// Inyecta los iconos SVG en cualquier elemento [data-icon] (botones, tabs).
// Se llama una vez al boot — los elementos son estáticos en el HTML.
function _hydrateIcons() {
  document.querySelectorAll('[data-icon]').forEach(el => {
    if (el.dataset.iconDone) return;
    el.dataset.iconDone = '1';
    const svg = icon(el.dataset.icon, { size: 15, stroke: 2 });
    el.insertAdjacentHTML('afterbegin', svg + ' ');
    el.style.display = 'inline-flex';
    el.style.alignItems = 'center';
    el.style.gap = '5px';
  });
}

const $ = id => document.getElementById(id);
const esc = s => (s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const state = {
  stages: [],
  cards: [],
  filter: 'all',
  canMove: false,
  selectedCardId: null,
  selectedCard: null,
  selectedStories: [],
  editing: false,
  editBuffer: null, // copia del card mientras se edita
  users: [],        // lista de personas activas para selects de Vendedor/Asignado
  unreadComments: {},  // (#T7) map { cardId → count } de comments no leídos
  // (#12) Hash deep-link al cargar: #oc / #dtf / #stock / #metrics / #gantt / #list / #calendar
  view: (() => {
    const h = (location.hash || '').replace('#', '').toLowerCase();
    const valid = ['kanban','list','calendar','oc','dtf','stock','metrics','gantt'];
    return valid.includes(h) ? h : 'kanban';
  })(),

  calMonth: (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })(),
  searchQuery: '', // (#9) input #searchProd, normalizado lowercase sin tildes
};

// (#9) Normaliza string para búsqueda: lowercase + quita diacríticos.
function _normSearch(s) {
  return String(s == null ? '' : s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}
// True si la tarjeta hace match con el query. Busca en cliente, vendor, phone,
// channel, descripcion_pedido y todos los nombres de producto en product_lines.
function cardMatchesSearch(c, q) {
  if (!q) return true;
  const haystack = _normSearch([
    c.client_name,
    c.vendor,
    c.client_phone_e164,
    c.channel_venta,
    c.descripcion_pedido,
    c.description,
    c.id,
    ...((c.product_lines || []).flatMap(l => [l.producto, l.color, l.talle])),
  ].filter(Boolean).join(' | '));
  return haystack.includes(q);
}

const DELIVERY_OPTS = ['DAC','Phonetec','Bolivia','Cadetería','Personal','A definir','Bordador entrega'];

// type:
//   text|tel|date|number|textarea  → input
//   select                          → <select> con `options`
//   select_dynamic                  → <select> con `optionsKey` (lee de state.<key>)
//   select_grouped                  → <select> con optgroups, `groups` STOCK_STATES_GROUPED-style
const EDITABLE_FIELDS = [
  { key: 'client_name',        label: 'Cliente',                 type: 'text' },
  { key: 'descripcion_pedido', label: 'Descripción del pedido',  type: 'text' },
  { key: 'client_phone_e164',  label: 'Teléfono',                type: 'tel' },
  { key: 'vendor',             label: 'Vendedor',                type: 'select_dynamic', optionsKey: 'users' },
  { key: 'due_date',           label: 'Fecha de entrega',        type: 'date' },
  { key: 'production_date',    label: 'Fecha de producción',     type: 'date' },
  { key: 'billing_month',      label: 'Mes de facturación',      type: 'month' },
  { key: 'priority',          label: 'Prioridad',         type: 'select', options: ['baja','normal','urgente'] },
  { key: 'channel_venta',     label: 'Canal de venta',    type: 'select', options: ['','WhatsApp','Instagram','Email','Referido','Web','Llamada','Otro'] },
  { key: 'modo_pago',         label: 'Modo de pago',      type: 'select', options: ['','Efectivo','Transferencia','Tarjeta','Mercado Pago','Otro'] },
  { key: 'metodo_pago',       label: 'Método de pago',    type: 'text' },
  // (#T3) Forma de cobro — distinta de modo_pago y metodo_pago.
  // Valores enum: sena | total | credito. UI con labels en español.
  { key: 'forma_cobro',       label: 'Forma de cobro',    type: 'select',
    options: ['', 'sena', 'total', 'credito'],
    optionLabels: { '': '—', 'sena': 'Seña', 'total': 'Total', 'credito': 'Crédito' } },
  { key: 'monto_sena',        label: 'Monto de seña',     type: 'number' },
  { key: 'metodo_entrega',    label: 'Método de entrega', type: 'select', options: ['', ...DELIVERY_OPTS] },
  { key: 'rastreo',           label: 'Tracking',          type: 'text' },
  { key: 'estado_stock',      label: 'Estado del stock',  type: 'select_grouped', groups: STOCK_STATES_GROUPED },
  { key: 'estado_insumo',     label: 'Estado del insumo', type: 'select_grouped', groups: INSUMO_STATES_GROUPED },
  { key: 'description',       label: 'Descripción',       type: 'textarea', wide: true },
];

async function loadActiveUsers() {
  try {
    const supa = getSupa();
    const { data, error } = await supa.from('user_profiles')
      .select('full_name, vendor_name, active').eq('active', true);
    if (error) throw error;
    const list = (data || [])
      .map(p => p.vendor_name || p.full_name)
      .filter(Boolean)
      .sort((a, b) => a.localeCompare(b, 'es'));
    // (#8) Visibilidad ante el bug "Lucía / Manuel no pueden cambiar vendor".
    // Si el listado viene vacío o muy chico, el problema podría ser un RLS
    // que recorta la vista de user_profiles para ciertos usuarios.
    if (list.length < 2) {
      console.warn('[vendor-debug] loadActiveUsers retornó', list.length, 'usuarios. Si esperabas más, revisá RLS de user_profiles para tu sesión.');
    } else {
      console.info('[vendor-debug] vendors activos:', list);
    }
    return list;
  } catch (e) {
    console.error('[vendor-debug] loadActiveUsers falló:', e.code || '-', e.message, e.details || '', e.hint || '');
    return [];
  }
}

const CAT_VISIBLE_ORDER = ['compra','produccion','muestra','entrega','finalizado'];

// Cache de stages en sessionStorage (TTL 1h). Las stages cambian rarísimo y
// son ~25 filas — leerlas de BD en cada page load es desperdicio.
const STAGES_CACHE_KEY = 'cirene_stages_cache_v1';
const STAGES_CACHE_TTL = 60 * 60 * 1000;
function _readStagesCache() {
  try {
    const raw = sessionStorage.getItem(STAGES_CACHE_KEY);
    if (!raw) return null;
    const { at, data } = JSON.parse(raw);
    if (Date.now() - at > STAGES_CACHE_TTL) return null;
    return data;
  } catch { return null; }
}
function _writeStagesCache(data) {
  try { sessionStorage.setItem(STAGES_CACHE_KEY, JSON.stringify({ at: Date.now(), data })); } catch {}
}

async function load() {
  try {
    // Paralelizar: stages (cacheable) y cards no dependen entre sí.
    const cached = _readStagesCache();
    const stagesPromise = cached ? Promise.resolve(cached) : loadStages().then(s => { _writeStagesCache(s); return s; });
    // Filtro 'archived' trae las archivadas; el resto, las activas.
    const isArchivedView = state.filter === 'archived';
    const [allStages, cards] = await Promise.all([
      stagesPromise,
      loadCards({
        includeFinished: state.filter === 'all_incl' || isArchivedView,
        archived: isArchivedView,
      }),
    ]);
    // La columna 'muestras' se ocultó por pedido del negocio (12-may-2026).
    state.stages = allStages.filter(s => s.key !== 'muestras');
    state.cards = cards;
    // (#T7 / #5) Comentarios: no leídos (badge amarillo + count) y recientes
    // (tooltip al hover en cualquier tarjeta con comentarios).
    try {
      const ids = cards.map(c => c.id);
      const [unreadMap, recentMap] = await Promise.all([
        loadUnreadCommentsMap(ids),
        loadRecentCommentsMap(ids),
      ]);
      state.unreadCommentItems = unreadMap;
      state.recentCommentItems = recentMap;
      const counts = {};
      for (const [k, v] of Object.entries(unreadMap)) counts[k] = v.length;
      state.unreadComments = counts;
    } catch (e) {
      console.warn('[unreadComments]', e?.message);
      state.unreadComments = {};
      state.unreadCommentItems = {};
      state.recentCommentItems = {};
    }
  } catch (e) {
    showError('Error al cargar: ' + e.message);
  }
  render();
}

function showError(text) {
  $('msg').innerHTML = `<div class="alert err">${esc(text)}</div>`;
}
function showOk(text) {
  $('msg').innerHTML = `<div class="alert ok">${esc(text)}</div>`;
  setTimeout(() => { $('msg').innerHTML = ''; }, 3000);
}
// Helper: marca un botón como "cargando" mientras corre una operación async.
// Deshabilita + cambia el texto a "⏳ …". Restaura al volver a false.
function withLoading(btn, isLoading) {
  if (!btn) return;
  if (isLoading) {
    if (!btn.dataset.origText) btn.dataset.origText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span style="display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:gln-spin .6s linear infinite;vertical-align:-1px;margin-right:5px"></span>Procesando…';
  } else {
    btn.disabled = false;
    if (btn.dataset.origText) btn.innerHTML = btn.dataset.origText;
    delete btn.dataset.origText;
  }
}
// Overlay global de loading sobre toda la página (para operaciones largas como creación de tarea).
function showOverlay(text = 'Procesando…') {
  let o = document.getElementById('gln-overlay');
  if (!o) {
    o = document.createElement('div');
    o.id = 'gln-overlay';
    o.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,.85);backdrop-filter:blur(2px);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:inherit';
    document.body.appendChild(o);
  }
  o.innerHTML = `
    <div style="width:42px;height:42px;border:4px solid var(--azul);border-top-color:transparent;border-radius:50%;animation:gln-spin .8s linear infinite"></div>
    <div style="font-size:14px;color:var(--tinta);font-weight:600">${esc(text)}</div>
  `;
}
function hideOverlay() {
  const o = document.getElementById('gln-overlay');
  if (o) o.remove();
}

function applyFilter(cards) {
  // (#9) Aplicar primero el filter-pill, después el buscador. Búsqueda vacía
  // pasa todo.
  const byFilter = (() => {
    switch (state.filter) {
      case 'urgent':   return cards.filter(c => c.priority === 'urgente');
      case 'overdue':  return cards.filter(c => c.due_date && c.due_date < todayISO() && !['entregado','cancelado'].includes(c.stage_key));
      case 'due_week': return cards.filter(c => c.due_date && c.due_date >= todayISO() && c.due_date <= weekAheadISO());
      default: return cards;
    }
  })();
  const q = state.searchQuery;
  if (!q) return byFilter;
  return byFilter.filter(c => cardMatchesSearch(c, q));
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function weekAheadISO() {
  const d = new Date(); d.setDate(d.getDate() + 7);
  return d.toISOString().slice(0, 10);
}

function stockBadgeClass(s) {
  if (!s) return '';
  return 'b-stock';
}
function insumoBadgeClass(s) {
  if (!s) return '';
  return 'b-insumo';
}
// (#10) Estilo inline para chips de estado: gradiente rojo→amarillo→verde
// según peso de criticidad (stockWeight / insumoWeight en stage-rules.js).
// Texto en #2a2a2a (oscuro) para que el contraste sea legible sobre el background pastel.
function stockBadgeStyle(s) {
  if (!s) return '';
  return `background:${weightToBg(stockWeight(s))};color:#2a2a2a;border-color:transparent`;
}
function insumoBadgeStyle(s) {
  if (!s) return '';
  return `background:${weightToBg(insumoWeight(s))};color:#2a2a2a;border-color:transparent`;
}

// ── Catálogo de productos ──────────────────────────────────────────────────
const CATALOG_KEY     = 'cirene_catalog_v3';
const PROD_USAGE_KEY  = 'cirene_prod_usage_v1';
const TECNICA_LABEL   = 'Sin producto / Solo técnica';

function getCatalogProductNames() {
  try {
    const raw = localStorage.getItem(CATALOG_KEY);
    if (!raw) return [];
    const cat = JSON.parse(raw);
    return (cat.productos || []).map(p => p.n).filter(Boolean);
  } catch { return []; }
}
function getProdUsage() {
  try { return JSON.parse(localStorage.getItem(PROD_USAGE_KEY) || '{}'); } catch { return {}; }
}
function trackProdUsage(lines) {
  if (!Array.isArray(lines)) return;
  const usage = getProdUsage();
  for (const l of lines) {
    const name = (l.producto || '').trim();
    if (name && name !== TECNICA_LABEL) usage[name] = (usage[name] || 0) + 1;
  }
  try { localStorage.setItem(PROD_USAGE_KEY, JSON.stringify(usage)); } catch {}
}
function buildCatalogDatalist() {
  const dl = document.getElementById('catalog-dl');
  if (!dl) return;
  const products = getCatalogProductNames();
  const usage = getProdUsage();
  const sorted = [...products].sort((a, b) => (usage[b] || 0) - (usage[a] || 0));
  const opts = [TECNICA_LABEL, ...sorted];
  dl.innerHTML = opts.map(n => `<option value="${esc(n)}"></option>`).join('');
}
// ──────────────────────────────────────────────────────────────────────────

function cardHtml(c) {
  const badges = [];
  if (c.priority === 'urgente') badges.push('<span class="badge b-urge">URGENTE</span>');
  else if (c.priority === 'alta') badges.push('<span class="badge b-alta">Alta</span>');
  if (c.is_sample) badges.push('<span class="badge b-sample">MUESTRA</span>');
  if (c.is_reposicion) badges.push('<span class="badge b-repose">REPOSICIÓN</span>');
  // (#T7) Comentarios no leídos por el usuario actual (pintado bien notorio).
  // (#5) data-unread-card-id habilita el tooltip al hover (ver _wireCommentTooltips).
  const unread = state.unreadComments?.[c.id] || 0;
  if (unread) badges.push(`<span class="badge b-comment" data-unread-card-id="${esc(c.id)}" tabindex="0" title="Hover para leer">(${unread}) sin leer</span>`);
  else if (state.recentCommentItems?.[c.id]?.length) badges.push(`<span class="badge b-cmtread" data-unread-card-id="${esc(c.id)}" tabindex="0" title="Hover para ver comentarios">💬 ${state.recentCommentItems[c.id].length}</span>`);
  if (c.estado_stock)  badges.push(`<span class="badge ${stockBadgeClass(c.estado_stock)}" style="${stockBadgeStyle(c.estado_stock)}" title="Estado del stock">📦 ${esc(c.estado_stock)}</span>`);
  if (c.estado_insumo) badges.push(`<span class="badge ${insumoBadgeClass(c.estado_insumo)}" style="${insumoBadgeStyle(c.estado_insumo)}" title="Estado del insumo">🎨 ${esc(c.estado_insumo)}</span>`);
  if (c.attachments?.length) badges.push(`<span class="badge b-asg" title="Adjuntos">📎 ${c.attachments.length}</span>`);
  if (c.due_date) {
    const overdue = c.due_date < todayISO() && !['entregado'].includes(c.stage_key);
    badges.push(`<span class="badge b-due ${overdue?'overdue':''}">📅 ${c.due_date}</span>`);
  }
  const isDelivered = c.stage_key === 'entregado';
  const isUrgent = c.priority === 'urgente';
  // Tick + rayo: solo cuando el usuario tiene permiso de mover y la tarjeta no está ya entregada.
  // El tick dispara el flujo de entrega (estado_stock='Entregado' aplica reglas y crea factura).
  const quickActions = state.canMove ? `
    <div class="card-quick">
      <button class="qa-urge ${isUrgent ? 'on' : ''}" data-quick="urgent" data-card-id="${esc(c.id)}" title="${isUrgent ? 'Quitar urgente' : 'Marcar urgente'}">⚡</button>
      ${!isDelivered ? `<button class="qa-done" data-quick="deliver" data-card-id="${esc(c.id)}" title="Marcar como entregada">✓</button>` : ''}
    </div>
  ` : '';
  let borradorHint = '';
  {
    const missing = missingFieldsForBorradorExit(c);
    if (c.stage_key === 'borrador') {
      borradorHint = missing.length
        ? `<div class="brdr-miss" title="Completá estos campos para mover">⚠ Falta: ${esc(missing.slice(0, 3).join(', '))}${missing.length > 3 ? ` +${missing.length - 3}` : ''}</div>`
        : `<div class="brdr-ok">✓ Lista para Pedir Insumos</div>`;
    } else if (missing.length) {
      borradorHint = `<div class="brdr-miss" title="${esc('Faltan: ' + missing.join(', '))}">⚠ DATOS INCOMPLETOS</div>`;
    }
  }
  return `
    <div class="card" draggable="${state.canMove}" data-card-id="${esc(c.id)}">
      ${quickActions}
      <div class="cli">${esc(c.client_name) || '<span style="color:var(--tinta-3)">Sin cliente</span>'}</div>
      ${c.descripcion_pedido ? `<div class="pedido">${esc(c.descripcion_pedido)}</div>` : ''}
      ${c.description ? `<div class="desc">${esc(c.description)}</div>` : ''}
      ${borradorHint}
      ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
    </div>
  `;
}

// ── Vista calendario ───────────────────────────────────────────────────
// Construye una matriz 6×7 que cubre todo el mes mostrado (semana arranca lunes).
function getCalendarDays(year, month) {
  const firstOfMonth = new Date(year, month, 1);
  // getDay(): 0=domingo, 1=lunes, …, 6=sábado. Convertimos a "lunes = 0".
  let offset = firstOfMonth.getDay() - 1;
  if (offset < 0) offset = 6; // domingo cae al final de la semana
  const start = new Date(year, month, 1 - offset);
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    days.push(d);
  }
  return days;
}

function renderCalendar() {
  const calWrap = $('calWrap');
  const filtered = applyFilter(state.cards);
  const year = state.calMonth.getFullYear();
  const month = state.calMonth.getMonth();
  const days = getCalendarDays(year, month);
  const todayStr = todayISO();

  // (#T6) Toggle calendario Entrega vs Producción.
  // Default 'due' (entrega). 'prod' lee production_date.
  if (!state.calMode) state.calMode = 'due';
  const dateField = state.calMode === 'prod' ? 'production_date' : 'due_date';

  // Indexar cards por la fecha del modo activo (YYYY-MM-DD)
  const cardsByDate = {};
  for (const c of filtered) {
    const v = c[dateField];
    if (!v) continue;
    (cardsByDate[v] ||= []).push(c);
  }

  const monthLabel = state.calMonth.toLocaleDateString('es-UY', { month: 'long', year: 'numeric' });
  const modeLabel = state.calMode === 'prod' ? 'producción' : 'entrega';
  const dows = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  calWrap.innerHTML = `
    <div class="cal-hdr">
      <button class="cal-nav" data-cal="prev" title="Mes anterior">‹</button>
      <h2 class="cal-title">${esc(monthLabel)} <span style="font-weight:400;font-size:13px;color:var(--tinta-3)">· ${modeLabel}</span></h2>
      <button class="cal-nav" data-cal="next" title="Mes siguiente">›</button>
      <button class="cal-today" data-cal="today">Hoy</button>
      <div class="cal-mode-toggle" style="margin-left:14px;display:inline-flex;background:var(--surface-3);border-radius:8px;padding:3px;gap:0">
        <button data-cal-mode="due"  class="${state.calMode === 'due' ? 'sel' : ''}" style="padding:5px 12px;border:none;background:${state.calMode === 'due' ? 'var(--azul)' : 'transparent'};color:${state.calMode === 'due' ? '#fff' : 'var(--tinta-2)'};font-size:12px;font-weight:600;border-radius:6px;cursor:pointer">Entrega</button>
        <button data-cal-mode="prod" class="${state.calMode === 'prod' ? 'sel' : ''}" style="padding:5px 12px;border:none;background:${state.calMode === 'prod' ? 'var(--azul)' : 'transparent'};color:${state.calMode === 'prod' ? '#fff' : 'var(--tinta-2)'};font-size:12px;font-weight:600;border-radius:6px;cursor:pointer">Producción</button>
      </div>
    </div>
    <div class="cal-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${days.map(d => {
        const iso = d.toISOString().slice(0, 10);
        const inMonth = d.getMonth() === month;
        const isToday = iso === todayStr;
        const cards = cardsByDate[iso] || [];
        return `
          <div class="cal-cell ${inMonth ? 'in' : 'out'} ${isToday ? 'today' : ''}">
            <div class="cal-day">${d.getDate()}</div>
            <div class="cal-cards-list">
              ${cards.map(c => {
                // (#T5) Tachado para entregadas + canceladas, urgente prioriza
                const cls = c.priority === 'urgente' ? 'urge'
                          : c.stage_key === 'entregado' ? 'done'
                          : c.stage_key === 'cancelado' ? 'cancel'
                          : '';
                // (#5) Indicador de comments sin leer en calendario — punto rojo
                // pegado al título con el data attribute que activa el tooltip
                // al hover (mismo helper que en kanban / lista).
                const unread = state.unreadComments?.[c.id] || 0;
                const hasAny = !unread && state.recentCommentItems?.[c.id]?.length;
                const unreadMark = unread
                  ? `<span data-unread-card-id="${esc(c.id)}" tabindex="0" title="${unread} sin leer · hover" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#C62828;margin-right:4px;vertical-align:middle;cursor:help;animation:pulse-comment 1.4s ease-in-out infinite"></span>`
                  : hasAny
                  ? `<span data-unread-card-id="${esc(c.id)}" tabindex="0" title="Comentarios · hover" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#5A5F66;margin-right:4px;vertical-align:middle;cursor:help"></span>`
                  : '';
                return `<div class="cal-card ${cls}" data-card-id="${esc(c.id)}" title="${esc(c.client_name || '')}">${unreadMark}${esc(c.client_name || '(sin cliente)')}</div>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // Handlers de navegación
  calWrap.querySelectorAll('[data-cal]').forEach(b => {
    b.onclick = () => {
      const action = b.dataset.cal;
      const d = new Date(state.calMonth);
      if (action === 'prev')  d.setMonth(d.getMonth() - 1);
      if (action === 'next')  d.setMonth(d.getMonth() + 1);
      if (action === 'today') { const t = new Date(); t.setDate(1); t.setHours(0,0,0,0); state.calMonth = t; render(); return; }
      state.calMonth = d;
      render();
    };
  });

  // Click en una mini-card → abrir el modal de detalle (mismo flow que el kanban)
  calWrap.querySelectorAll('.cal-card').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.cardId));
  });
  // (#5) Tooltip de comments sin leer en calendario.
  _wireCommentTooltips(calWrap);

  // (#T6) Toggle Entrega ↔ Producción
  calWrap.querySelectorAll('[data-cal-mode]').forEach(b => {
    b.onclick = () => {
      state.calMode = b.dataset.calMode;
      render();
    };
  });
}

// Vista Lista: las mismas tarjetas del kanban (con el filtro activo) pero
// apiladas en secciones verticales, en el mismo orden de columnas
// (Borrador → … → Entregado). Reusa applyFilter/openDetail.
// (#16) Columnas configurables de la vista Lista (orden persistido y
// reordenable arrastrando los encabezados).
const LIST_COLS_KEY = 'cirene_list_cols_v1';
const LIST_COL_DEFS = {
  // (#5) Si la tarjeta tiene comments no leídos por el usuario actual, mostramos
  // un chip junto al cliente; el chip lleva data-unread-card-id para que el
  // tooltip al hover muestre el contenido sin abrir el modal.
  cliente:  { label: 'Cliente / Pedido', cell: c => {
    const unread = state.unreadComments?.[c.id] || 0;
    const unreadChip = unread
      ? ` <span class="badge b-comment" data-unread-card-id="${esc(c.id)}" tabindex="0" style="font-size:10px;padding:1px 7px;vertical-align:middle" title="Hover para leer">(${unread}) sin leer</span>`
      : state.recentCommentItems?.[c.id]?.length
        ? ` <span class="badge b-cmtread" data-unread-card-id="${esc(c.id)}" tabindex="0" style="font-size:10px;padding:1px 7px;vertical-align:middle" title="Hover para ver comentarios">💬 ${state.recentCommentItems[c.id].length}</span>`
        : '';
    return `<div class="li-cli">${esc(c.client_name || '(sin cliente)')}${c.priority === 'urgente' ? ' <span class="li-urge">URGENTE</span>' : ''}${unreadChip}</div>${c.descripcion_pedido ? `<div class="li-desc">${esc(c.descripcion_pedido)}</div>` : ''}`;
  } },
  vendor:   { label: 'Vendedor',      cell: c => esc(c.vendor || '—') },
  phone:    { label: 'Teléfono',      cell: c => esc(c.client_phone_e164 || '—') },
  channel:  { label: 'Canal',         cell: c => esc(c.channel_venta || '—') },
  due:      { label: 'Fecha',         cell: c => { const o = c.due_date && c.due_date < todayISO() && !['entregado','cancelado'].includes(c.stage_key); return `<span style="${o ? 'color:var(--err-text);font-weight:700' : ''}">${esc(c.due_date || '—')}</span>`; } },
  billing:  { label: 'Mes fact.',     cell: c => esc(c.billing_month || '—') },
  priority: { label: 'Prioridad',     cell: c => esc(c.priority || 'normal') },
  // (#2) Selects editables inline: el usuario puede cambiar estado_stock/insumo
  // desde la vista Lista sin entrar al modal. El onchange dispara setCardStateFields
  // que aplica las reglas de stage (la tarjeta puede saltar de columna automáticamente).
  stock:    { label: 'Estado stock',  cell: c => `<select class="li-state-sel" data-list-state="estado_stock" data-card-id="${esc(c.id)}" data-prev="${esc(c.estado_stock || '')}" style="background:${weightToBg(stockWeight(c.estado_stock || ''))};color:#2a2a2a;border:1px solid transparent;border-radius:10px;padding:3px 22px 3px 10px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;max-width:170px;-webkit-appearance:none;-moz-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,#2a2a2a 50%),linear-gradient(135deg,#2a2a2a 50%,transparent 50%);background-position:calc(100% - 12px) 50%,calc(100% - 8px) 50%;background-size:4px 4px,4px 4px;background-repeat:no-repeat,no-repeat;background-color:${weightToBg(stockWeight(c.estado_stock || ''))};">${buildStateOptions(STOCK_STATES_GROUPED, c.estado_stock)}</select>` },
  insumo:   { label: 'Estado insumo', cell: c => `<select class="li-state-sel" data-list-state="estado_insumo" data-card-id="${esc(c.id)}" data-prev="${esc(c.estado_insumo || '')}" style="background:${weightToBg(insumoWeight(c.estado_insumo || ''))};color:#2a2a2a;border:1px solid transparent;border-radius:10px;padding:3px 22px 3px 10px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;max-width:170px;-webkit-appearance:none;-moz-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,#2a2a2a 50%),linear-gradient(135deg,#2a2a2a 50%,transparent 50%);background-position:calc(100% - 12px) 50%,calc(100% - 8px) 50%;background-size:4px 4px,4px 4px;background-repeat:no-repeat,no-repeat;background-color:${weightToBg(insumoWeight(c.estado_insumo || ''))};">${buildStateOptions(INSUMO_STATES_GROUPED, c.estado_insumo)}</select>` },
};
const DEFAULT_LIST_ORDER = ['cliente','vendor','phone','channel','due','billing','priority','stock','insumo'];
function getListOrder() {
  try {
    const s = JSON.parse(localStorage.getItem(LIST_COLS_KEY));
    if (Array.isArray(s) && s.length) {
      const valid = s.filter(k => LIST_COL_DEFS[k]);
      for (const k of DEFAULT_LIST_ORDER) if (!valid.includes(k)) valid.push(k);
      return valid;
    }
  } catch (e) {}
  return DEFAULT_LIST_ORDER.slice();
}
function setListOrder(order) {
  try { localStorage.setItem(LIST_COLS_KEY, JSON.stringify(order)); } catch (e) {}
}

function renderListView() {
  const listWrap = $('listWrap');
  const filtered = applyFilter(state.cards);

  const ordered = state.stages.slice().sort((a, b) => {
    const ca = CAT_VISIBLE_ORDER.indexOf(a.category);
    const cb = CAT_VISIBLE_ORDER.indexOf(b.category);
    return ca === cb ? a.display_order - b.display_order : ca - cb;
  });

  const byStage = {};
  for (const s of ordered) byStage[s.key] = [];
  for (const c of filtered) {
    if (!byStage[c.stage_key]) byStage[c.stage_key] = [];
    byStage[c.stage_key].push(c);
  }

  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('sel', p.dataset.f === state.filter));

  if (!ordered.length) {
    listWrap.innerHTML = '<div class="empty-msg">No hay columnas configuradas.</div>';
    return;
  }

  const colOrder = getListOrder();
  const headCells = colOrder.map(k =>
    `<th draggable="true" data-col="${k}">${esc(LIST_COL_DEFS[k].label)}</th>`).join('')
    + '<th class="col-fixed">Acciones</th>';
  const colCount = colOrder.length + 1;

  listWrap.innerHTML = `<div class="list-hint">Arrastrá los encabezados para reordenar las columnas · ⚡ marca urgente · ✓ marca entregada (sin abrir la tarjeta)</div>`
    + ordered.map(s => {
    const cards = byStage[s.key] || [];
    const rows = cards.length ? cards.map(c => {
      const isUrgent = c.priority === 'urgente';
      const isDelivered = c.stage_key === 'entregado';
      const cells = colOrder.map(k => `<td>${LIST_COL_DEFS[k].cell(c)}</td>`).join('');
      const act = `<td class="li-act">
        <button data-quick="urgent" data-card-id="${esc(c.id)}" class="${isUrgent ? 'on' : ''}" title="${isUrgent ? 'Quitar urgente' : 'Marcar urgente'}">⚡</button>
        ${!isDelivered ? `<button data-quick="deliver" data-card-id="${esc(c.id)}" title="Marcar entregada">✓</button>` : ''}
      </td>`;
      // (#1) data-row-drag distingue arrastre de fila del arrastre de header (data-col)
      return `<tr data-card-id="${esc(c.id)}" data-row-drag="1" draggable="${state.canMove}">${cells}${act}</tr>`;
    }).join('') : `<tr><td colspan="${colCount}" class="li-empty">Sin tarjetas en esta etapa</td></tr>`;

    return `
      <div class="list-section" data-stage="${esc(s.key)}">
        <div class="list-sec-hdr">
          <span class="dot" style="background:${s.color}"></span>
          <span>${esc(s.label)}</span>
          <span class="count">${cards.length}</span>
        </div>
        <div class="list-scroll">
          <table class="list-tbl">
            <thead><tr>${headCells}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  // Row click → detalle (salvo click en una acción rápida o en un select inline).
  listWrap.querySelectorAll('tr[data-card-id]').forEach(tr => {
    tr.addEventListener('click', e => {
      if (e.target.closest('[data-quick]')) return;
      if (e.target.closest('.li-state-sel')) return;  // (#2) click en select no abre modal
      if (e.target.closest('[data-unread-card-id]')) return;  // (#5) hover badge no abre modal
      openDetail(tr.dataset.cardId);
    });
  });
  wireQuickActions(listWrap);
  // (#5) Tooltip de comments sin leer en vista lista.
  _wireCommentTooltips(listWrap);

  // (#2) Selects inline de estado_stock / estado_insumo. Reusa setCardStateFields
  // que ya audita y aplica reglas (la tarjeta puede saltar de columna). Tras
  // guardar, re-renderiza la lista entera para reflejar el cambio de stage_key
  // y colores. Bloquea propagación de click/mousedown para que abrir el dropdown
  // nativo no abra el modal de la tarjeta.
  listWrap.querySelectorAll('.li-state-sel').forEach(sel => {
    sel.addEventListener('click', e => e.stopPropagation());
    sel.addEventListener('mousedown', e => e.stopPropagation());
    sel.addEventListener('change', async (e) => {
      e.stopPropagation();
      const cardId = sel.dataset.cardId;
      const field  = sel.dataset.listState;
      const prev   = sel.dataset.prev;
      const next   = sel.value;
      if (next === prev) return;
      const card = state.cards.find(c => c.id === cardId);
      if (!card) { showError('Tarjeta no encontrada'); return; }
      sel.disabled = true;
      const _origOpacity = sel.style.opacity;
      sel.style.opacity = '0.5';
      try {
        const updated = await setCardStateFields(card, { [field]: next });
        // Persistir en state.cards y re-render
        const idx = state.cards.findIndex(x => x.id === cardId);
        if (idx >= 0) Object.assign(state.cards[idx], updated);
        const moved = updated.stage_key !== card.stage_key;
        showOk(moved
          ? `${field === 'estado_stock' ? 'Stock' : 'Insumo'} actualizado · Movida a ${state.stages.find(s => s.key === updated.stage_key)?.label || updated.stage_key}`
          : `${field === 'estado_stock' ? 'Stock' : 'Insumo'} actualizado`);
        render();
      } catch (err) {
        console.error('[list-state]', err);
        showError('No se pudo actualizar: ' + err.message);
        sel.value = prev;  // revertir UI
        sel.disabled = false;
        sel.style.opacity = _origOpacity;
      }
    });
  });

  // Reordenamiento de columnas por drag&drop de los <th>.
  let dragCol = null;
  listWrap.querySelectorAll('th[draggable=true]').forEach(th => {
    th.addEventListener('dragstart', e => { dragCol = th.dataset.col; e.stopPropagation(); });
    th.addEventListener('dragover', e => { e.preventDefault(); th.classList.add('col-drop'); });
    th.addEventListener('dragleave', () => th.classList.remove('col-drop'));
    th.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      th.classList.remove('col-drop');
      const target = th.dataset.col;
      if (!dragCol || dragCol === target) return;
      const order = getListOrder();
      const from = order.indexOf(dragCol), to = order.indexOf(target);
      if (from < 0 || to < 0) return;
      order.splice(to, 0, order.splice(from, 1)[0]);
      setListOrder(order);
      renderListView();
    });
  });

  // (#1) D&D de filas entre secciones (mismo flujo que kanban → moveCardToStage).
  // Usamos data-row-drag para distinguir del drag de columnas. Sin esto, soltar
  // un <th> sobre una sección dispararía moveCardToStage por error.
  if (state.canMove) {
    let _dragRowCard = null;
    listWrap.querySelectorAll('tr[data-row-drag]').forEach(tr => {
      tr.addEventListener('dragstart', e => {
        _dragRowCard = state.cards.find(c => c.id === tr.dataset.cardId) || null;
        tr.classList.add('row-dragging');
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', tr.dataset.cardId);
        }
      });
      tr.addEventListener('dragend', () => {
        tr.classList.remove('row-dragging');
        listWrap.querySelectorAll('.list-section.section-drop-target')
          .forEach(el => el.classList.remove('section-drop-target'));
        _dragRowCard = null;
      });
    });
    listWrap.querySelectorAll('.list-section[data-stage]').forEach(sec => {
      sec.addEventListener('dragover', e => {
        if (!_dragRowCard) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
        sec.classList.add('section-drop-target');
      });
      sec.addEventListener('dragleave', () => sec.classList.remove('section-drop-target'));
      sec.addEventListener('drop', async e => {
        if (!_dragRowCard) return;
        e.preventDefault();
        sec.classList.remove('section-drop-target');
        const newStageKey = sec.dataset.stage;
        const card = _dragRowCard;
        _dragRowCard = null;
        if (!newStageKey || newStageKey === card.stage_key) return;
        try {
          await moveCardToStage(card, newStageKey);
          card.stage_key = newStageKey;
          render();
        } catch (err) {
          console.error('[list-dnd] moveCardToStage falló:', err);
          if (typeof showError === 'function') showError('No se pudo mover: ' + err.message);
        }
      });
    });
  }
}

// ── (#4) Estado compartido por las pestañas nuevas ─────────────────────────
const _paneState = {
  ocMonth:    new Date().toISOString().slice(0, 7),
  dtfMonth:   new Date().toISOString().slice(0, 7),
  stockSearch: '',
  stockBrand:  '',

// Orden natural de talles (XS,S,M,L,XL,2XL… luego numéricos).
const _TALLE_ORDER = ['xs','s','m','l','xl','2xl','xxl','3xl','xxxl','4xl','xxxxl'];
function _talleRank(t) {
  const k = String(t || '').trim().toLowerCase();
  const i = _TALLE_ORDER.indexOf(k);
  if (i >= 0) return i;
  const n = parseFloat(k.replace(',', '.'));
  return Number.isFinite(n) ? 100 + n : 200;
}
const _swatchHex = (c) => { const m = {negro:'#1a1a1a',blanco:'#f5f5f5',gris:'#9aa0a6',azul:'#2356b3','azul marino':'#1c2a4a','azul francia':'#1f6fd0',celeste:'#7fc4e8',verde:'#2e8b57',rojo:'#c0392b',bordo:'#5e1f2b','bordó':'#5e1f2b',beige:'#d8c3a5',marron:'#6b4423',amarillo:'#f1c40f',naranja:'#e67e22',rosa:'#e8a0b8',fucsia:'#c2185b',violeta:'#7d3c98',negro2:'#000'}; return m[String(c||'').trim().toLowerCase()] || '#cdd7e0'; };

async function renderStockPane() {
  const pane = $('paneStock');
  _ensureStockStyles();
  let brands = [];
  try { brands = await listStockBrands(); } catch (e) { console.warn('[stockBrands]', e?.message); }
  const brandOpts = ['<option value="">— todas las marcas —</option>']
    .concat(brands.map(b => `<option value="${esc(b)}" ${b === _paneState.stockBrand ? 'selected' : ''}>${esc(b)}</option>`))
    .join('');
  pane.innerHTML = `
    <div class="stk-head">
      <h2>Stock</h2>
      <div class="stk-stats" id="stkStats"></div>
    </div>
    <p style="font-size:12px;color:var(--tinta-3);margin:0 0 12px">Agrupado por <b>producto · color</b>. Tocá un grupo para ver y editar sus <b>talles</b>. Se guarda solo. Los grupos en ámbar no están vinculados al catálogo — usá <b>Vincular</b> para elegir el producto.</p>
    <datalist id="stockBrands">${brands.map(b => `<option value="${esc(b)}"></option>`).join('')}</datalist>
    <div class="stk-toolbar">
      <input id="stockSearch" type="search" placeholder="🔍 Buscar SKU, nombre, marca o color…" value="${esc(_paneState.stockSearch)}" />
      <select id="stockBrandFilter">${brandOpts}</select>
      <button class="stk-btn ${_paneState.stockShowAll ? 'on' : ''}" id="stockShowAll" title="Mostrar también los productos del catálogo sin stock cargado">${_paneState.stockShowAll ? '✓ ' : ''}Ver todo el catálogo</button>
      <button class="stk-btn" id="stockExpand">Expandir todo</button>
      <button class="stk-btn" id="stockCollapse">Colapsar</button>
      <span class="stk-gspacer"></span>
      <button class="stk-btn primary" id="stockNewBtn">+ Nuevo SKU</button>
      <button class="stk-btn" id="stockExportBtn">⬇ Exportar CSV</button>
      <button class="stk-btn" id="stockImportBtn">⬆ Importar CSV</button>
      <input type="file" id="stockCsvFile" accept=".csv" style="display:none" />
    </div>
    <div class="stk-scroll" id="stockTableMount"><div class="empty-msg" style="padding:24px">Cargando…</div></div>
  `;
  $('stockSearch').oninput = (e) => { _paneState.stockSearch = e.target.value; clearTimeout(renderStockPane._t); renderStockPane._t = setTimeout(renderStockPane, 250); };
  $('stockBrandFilter').onchange = (e) => { _paneState.stockBrand = e.target.value; renderStockPane(); };
  $('stockShowAll').onclick = () => { _paneState.stockShowAll = !_paneState.stockShowAll; renderStockPane(); };
  $('stockNewBtn').onclick = async () => {
    const sku = prompt('SKU nuevo (ej. 1300 o AE-249-NEG-L):');
    if (!sku) return;
    try { await upsertStockItem({ sku, qty_on_hand: 0, qty_reserved: 0 }); renderStockPane(); }
    catch (e) { showError(e.message); }
  };
  $('stockImportBtn').onclick = () => $('stockCsvFile').click();
  $('stockCsvFile').onchange = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    const txt = await f.text();
    try {
      const { ok, errors } = await importStockCsv(txt);
      showOk(`Importadas ${ok} filas` + (errors.length ? ` (${errors.length} errores)` : ''));
      renderStockPane();
    } catch (e) { showError(e.message); }
  };

  try {
    let items = await listStockItems({ search: _paneState.stockSearch, brand: _paneState.stockBrand });
    // Por defecto ocultar placeholders del catálogo sin stock (ruido). Toggle "Ver todo".
    if (!_paneState.stockShowAll) {
      items = items.filter(i => i.marca || i.color || i.talle || i.qty_on_hand > 0 || i.qty_reserved > 0);
    }

    // Agrupar por producto (nombre) + color.
    const groupMap = new Map();
    for (const it of items) {
      const key = `${(it.name || '').trim().toLowerCase()}|${(it.color || '').trim().toLowerCase()}`;
      let g = groupMap.get(key);
      if (!g) { g = { key, name: it.name || '(sin nombre)', color: it.color || '', marca: it.marca || '', catId: it.catalog_product_id || '', items: [] }; groupMap.set(key, g); }
      g.items.push(it);
      if (!g.catId && it.catalog_product_id) g.catId = it.catalog_product_id;
      if (!g.marca && it.marca) g.marca = it.marca;
    }
    const groups = [...groupMap.values()].sort((a, b) =>
      String(a.name).localeCompare(String(b.name), 'es') || String(a.color).localeCompare(String(b.color), 'es'));
    groups.forEach(g => g.items.sort((x, y) => _talleRank(x.talle) - _talleRank(y.talle) || String(x.sku).localeCompare(String(y.sku), undefined, { numeric: true })));

    // Si hay búsqueda activa, abrir todos para ver coincidencias.
    if (_paneState.stockSearch.trim()) groups.forEach(g => _paneState.stockGroupsOpen.add(g.key));

    const conStock = items.filter(i => i.qty_available > 0).length;
    const sinVincGroups = groups.filter(g => !g.catId).length;
    $('stkStats').innerHTML = `
      <span class="stk-chip"><b>${groups.length}</b> productos·color</span>
      <span class="stk-chip"><b>${items.length}</b> variantes</span>
      <span class="stk-chip ok"><b>${conStock}</b> con stock</span>
      ${sinVincGroups ? `<span class="stk-chip warn"><b>${sinVincGroups}</b> sin vincular</span>` : ''}`;

    $('stockExportBtn').onclick = () => {
      const cols = ['sku','name','marca','color','talle','qty_on_hand','qty_reserved','qty_available','unit_price','location','catalog_product_id'];
      const cell = v => { const s = String(v ?? ''); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
      const csv = [cols.join(',')].concat(items.map(it => cols.map(c => cell(it[c])).join(','))).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `stock_cirene_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(a.href);
    };
    $('stockExpand').onclick = () => { groups.forEach(g => _paneState.stockGroupsOpen.add(g.key)); renderStockPane(); };
    $('stockCollapse').onclick = () => { _paneState.stockGroupsOpen.clear(); renderStockPane(); };

    const dispCls = d => d > 0 ? 'pos' : d < 0 ? 'neg' : 'zero';
    const sumHand = g => g.items.reduce((a, i) => a + (Number(i.qty_on_hand) || 0), 0);

    $('stockTableMount').innerHTML = groups.length ? `<div class="stk-groups">${groups.map((g, gi) => {
      const open = _paneState.stockGroupsOpen.has(g.key);
      const tot = sumHand(g);
      return `
      <div class="stk-group ${open ? 'open' : ''} ${g.catId ? '' : 'unlinked'}" data-gi="${gi}">
        <div class="stk-ghead" data-gtoggle="${gi}">
          <span class="stk-caret">▶</span>
          <span class="stk-gname">${esc(g.name)}</span>
          ${g.color ? `<span class="stk-colorchip"><span class="stk-dot" style="background:${_swatchHex(g.color)}"></span>${esc(g.color)}</span>` : ''}
          ${g.marca ? `<span class="stk-mk">${esc(g.marca)}</span>` : ''}

            <label>Color<input class="stk-fin" data-gfield="color" data-gi="${gi}" value="${esc(g.color)}" style="width:120px" /></label>

                <td class="num"><input class="stk-in num" type="number" step="1" data-stock-f="qty_reserved" value="${esc(it.qty_reserved)}" style="width:58px" /></td>

    }).join('')}</div>` : `<div class="empty-msg" style="padding:24px;color:var(--tinta-3)">Sin variantes para el filtro actual.</div>`;

    // Toggle de grupo (DOM puro, sin re-render).
    $('stockTableMount').querySelectorAll('[data-gtoggle]').forEach(h => {
      h.onclick = (e) => {
        if (e.target.closest('[data-glink]')) return;   // el botón Vincular no togglea
        const gi = +h.dataset.gtoggle, g = groups[gi];
        const box = h.closest('.stk-group');
        if (_paneState.stockGroupsOpen.has(g.key)) { _paneState.stockGroupsOpen.delete(g.key); box.classList.remove('open'); }
        else { _paneState.stockGroupsOpen.add(g.key); box.classList.add('open'); }
      };
    });

    // Vincular grupo al catálogo (picker compartido) → setea catalog_product_id + nombre en TODOS sus talles.
    $('stockTableMount').querySelectorAll('[data-glink]').forEach(btn => {

        e.stopPropagation();
        const g = groups[+btn.dataset.glink];
        import('./js/catalog-picker.js').then(({ openCatalogPicker }) => {
          openCatalogPicker({
            initialQuery: g.name && g.name !== '(sin nombre)' ? g.name : (g.marca || ''),
            title: `Vincular "${g.name}"${g.color ? ' · ' + g.color : ''} al catálogo`,
            onPick: async ({ id, n }) => {
              try {
                saveGuard.markPending('stock-link:' + g.key);
                for (const it of g.items) {
                  it.catalog_product_id = id; it.name = n;
                  await upsertStockItem(it);
                }
                saveGuard.markDone('stock-link:' + g.key);
                showOk(`Vinculado a ${id} — se actualizará con el catálogo`);
                renderStockPane();
              } catch (err) { saveGuard.markError('stock-link:' + g.key, err); showError('No se pudo vincular: ' + err.message); }
            },
          });
        });
      };
    });

    // Agregar un talle nuevo al grupo: hereda producto/color/marca/vínculo, SKU auto.
    $('stockTableMount').querySelectorAll('[data-gaddtalle]').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const g = groups[+btn.dataset.gaddtalle];
        const talle = prompt(`Talle nuevo para "${g.name}"${g.color ? ' · ' + g.color : ''} (ej. M, XL, 2XL):`);
        if (talle == null || !talle.trim()) return;
        try {
          const sku = await nextStockSku();
          await upsertStockItem({
            sku,
            name:               g.name === '(sin nombre)' ? null : g.name,
            color:              g.color || null,
            marca:              g.marca || null,
            catalog_product_id: g.catId || null,
            talle:              talle.trim(),
            qty_on_hand:        0,
            qty_reserved:       0,
          });
          _paneState.stockGroupsOpen.add(g.key);   // dejar el grupo abierto tras re-render
          showOk(`Talle ${talle.trim()} agregado (SKU ${sku})`);
          renderStockPane();
        } catch (err) { showError('No se pudo agregar el talle: ' + err.message); }
      };
    });

    // Edición de campos compartidos del grupo (nombre/color/marca) → a todos los talles.
    $('stockTableMount').querySelectorAll('[data-gfield]').forEach(field => {
      let _t = null;
      field.onchange = () => {
        const g = groups[+field.dataset.gi], f = field.dataset.gfield, v = field.value || null;
        g.items.forEach(it => { it[f] = v; });
        saveGuard.markPending('stock-grp:' + g.key);
        if (_t) clearTimeout(_t);
        _t = setTimeout(async () => {
          try { for (const it of g.items) await upsertStockItem(it); saveGuard.markDone('stock-grp:' + g.key); }
          catch (e) { saveGuard.markError('stock-grp:' + g.key, e); showError('No se pudo guardar: ' + e.message); }
        }, 700);
      };
    });

    // Edición inline de talles SIN re-render. Actualiza item + Disp + total del grupo.
    $('stockTableMount').querySelectorAll('tr[data-stock-id]').forEach(tr => {
      const gi = +tr.closest('.stk-group').dataset.gi;
      const g = groups[gi];
      const item = g.items.find(x => x.id === tr.dataset.stockId);
      if (!item) return;
      let _t = null;
      tr.querySelectorAll('[data-stock-f]').forEach(field => {
        field.onchange = () => {
          item[field.dataset.stockF] = field.value;
          item.qty_available = (Number(item.qty_on_hand) || 0) - (Number(item.qty_reserved) || 0);
          const dispEl = tr.querySelector('.stk-disp');
          if (dispEl) { dispEl.textContent = item.qty_available; dispEl.className = 'stk-disp ' + dispCls(item.qty_available); }
          const totEl = $('stockTableMount').querySelector(`[data-gtot="${gi}"]`);
          if (totEl) totEl.innerHTML = `<b>${sumHand(g)}</b> u.`;
          saveGuard.markPending('stock-row:' + item.id);
          if (_t) clearTimeout(_t);
          _t = setTimeout(async () => {
            try { await upsertStockItem(item); saveGuard.markDone('stock-row:' + item.id); }
            catch (e) { saveGuard.markError('stock-row:' + item.id, e); showError('No se pudo guardar: ' + e.message); }
          }, 600);
        };
      });
    });
    $('stockTableMount').querySelectorAll('[data-stock-del]').forEach(b => b.onclick = async (e) => {
      e.stopPropagation();
      if (!confirm('¿Eliminar este talle del stock? (No borra el producto del catálogo)')) return;
      try { await deleteStockItem(b.dataset.stockDel); renderStockPane(); }
      catch (e) { showError(e.message); }
    });
  } catch (e) {
    $('stockTableMount').innerHTML = `<div class="empty-msg" style="color:var(--err-text);padding:18px">Error: ${esc(e.message)}</div>`;
  }
}

// ── #paneGantt: (#14) Plan diario de producción ────────────────────────────
//
// Modelo:
//   - operarios:    lista propia (NO los vendedores). Editable acá mismo,
//                   persiste en localStorage.
//   - tiposEstampe: config general [{nombre, min}]. min = minutos por estampe.
//                   Persiste en localStorage.
//   - tasks:        [{id, label, operario, tipoIdx, estampes, startMin}]
//                   duración = estampes × tiposEstampe[tipoIdx].min
const GANTT_OPS_KEY   = 'cirene_gantt_operarios_v1';
const GANTT_TIPOS_KEY = 'cirene_gantt_tipos_estampe_v1';
const GANTT_TIPOS_DEFAULT = [
  { nombre: 'DTF',         min: 3 },
  { nombre: 'Bordado',     min: 8 },
  { nombre: 'Serigrafía',  min: 5 },
  { nombre: 'Vinilo textil', min: 4 },
];
const _ganttState = {
  fecha: new Date().toISOString().slice(0, 10),
  startHour: 8,
  endHour: 18,
  operarios: [],
  tiposEstampe: [],
  tasks: [],
  // (#T8.b) layout: 'flat' = una franja por operario con tiempos manuales;
  // 'byOp' = una columna por operario, las tareas se encadenan automáticamente
  // (startMin = suma de duraciones previas en esa columna).
  layoutMode: 'flat',
  // (#T8.c) 1 o 2 jornadas consecutivas. Día 2 arranca a startHour del día siguiente.
  dias: 1,
};
function _ganttLoad() {
  try {
    const ops = JSON.parse(localStorage.getItem(GANTT_OPS_KEY) || '[]');
    _ganttState.operarios = Array.isArray(ops) ? ops : [];
  } catch { _ganttState.operarios = []; }
  try {
    const tp = JSON.parse(localStorage.getItem(GANTT_TIPOS_KEY) || 'null');
    _ganttState.tiposEstampe = (Array.isArray(tp) && tp.length) ? tp : GANTT_TIPOS_DEFAULT.slice();
  } catch { _ganttState.tiposEstampe = GANTT_TIPOS_DEFAULT.slice(); }
}
function _ganttSaveOps()   { try { localStorage.setItem(GANTT_OPS_KEY, JSON.stringify(_ganttState.operarios)); } catch {} }
function _ganttSaveTipos() { try { localStorage.setItem(GANTT_TIPOS_KEY, JSON.stringify(_ganttState.tiposEstampe)); } catch {} }
function _ganttTipoColor(idx) { return ESTAMPE_PALETTE[idx % ESTAMPE_PALETTE.length]; }
function _ganttDuration(t) {
  const tipo = _ganttState.tiposEstampe[t.tipoIdx];
  return Math.max(1, (Number(t.estampes) || 0) * ((tipo && tipo.min) || 1));
}
function _ganttTasksForPdf(filterOp) {
  return _ganttState.tasks
    .filter(t => !filterOp || (t.operario || 'Sin asignar') === filterOp)
    .map(t => ({
      id: t.id,
      label: t.label || 'Tarea',
      operario: t.operario || 'Sin asignar',
      startMin: Number(t.startMin) || 0,
      durationMin: _ganttDuration(t),
      tipo: (_ganttState.tiposEstampe[t.tipoIdx] || {}).nombre || '',
      color: _ganttTipoColor(t.tipoIdx || 0),
    }));
}
function _ganttLegend() {
  return _ganttState.tiposEstampe.map((tp, i) => ({ nombre: tp.nombre, color: _ganttTipoColor(i) }));
}

// (#T8.c) Devuelve la fecha del día 2 (un día después de _ganttState.fecha).
function _ganttFecha2() {
  if (_ganttState.dias < 2) return null;
  const d = new Date(_ganttState.fecha + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

// (#T8.a) Candidatos: tarjetas con production_date en las fechas seleccionadas.
// Si dias=2, incluye también las del día 2.
function _ganttCandidates() {
  const fechas = new Set([_ganttState.fecha]);
  const f2 = _ganttFecha2();
  if (f2) fechas.add(f2);
  return state.cards.filter(c => c.production_date && fechas.has(c.production_date)
                              && !['entregado','cancelado'].includes(c.stage_key));
}

// (#T8.a) Carga candidatos en _ganttState.tasks sin duplicar (idempotente).
function _ganttAutoLoadCandidates() {
  let added = 0;
  for (const c of _ganttCandidates()) {
    if (_ganttState.tasks.find(t => t.id === c.id)) continue;
    _ganttState.tasks.push({
      id: c.id,
      label: c.client_name || c.id,
      operario: _ganttState.operarios[0] || '',
      tipoIdx: 0,
      estampes: (c.product_lines || []).reduce((a, l) => a + (Number(l.cantidad) || 0), 0) || 1,
      startMin: 0,
    });
    added++;
  }
  if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
  return added;
}

// (#T8.b) En modo byOp, las tareas se encolan: por cada operario, la primera
// arranca en 0, las siguientes en startMin = suma de duraciones previas.
// El orden por operario es el orden actual en _ganttState.tasks.
function _ganttRecalcAutoStart() {
  const acc = {};   // operario → próximo startMin
  for (const t of _ganttState.tasks) {
    const op = t.operario || 'Sin asignar';
    if (acc[op] == null) acc[op] = 0;
    t.startMin = acc[op];
    acc[op] += _ganttDuration(t);
  }
}

      </fieldset>

      <fieldset style="border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:0;min-width:260px">
        <legend style="font-size:11px;font-weight:700;color:var(--tinta-3);padding:0 4px">Operarios</legend>

      <fieldset style="border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:0;min-width:260px">
