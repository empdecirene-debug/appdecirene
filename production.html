<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>De Cirene · Producción</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/cirene-theme.css">
<style>
  .wrap { max-width: 100%; padding: 14px 16px 40px; }
  .hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .seg { display: inline-flex; gap: 3px; background: var(--surface-3); padding: 3px; border-radius: 9px; }
  .seg button { border: none; background: transparent; padding: 7px 14px; border-radius: 6px; font: inherit; font-size: 13px; font-weight: 600; color: var(--tinta-2); cursor: pointer; }
  .seg button.active { background: #0A0A0A; color: #fff; }
  .board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 14px; align-items: flex-start; }
  .col { flex: 0 0 260px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 8px; min-height: 120px; }
  .col.drop { border-color: #0A0A0A; box-shadow: 0 0 0 2px #0A0A0A; }
  .col h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--tinta-2); padding: 4px 6px 8px; display: flex; justify-content: space-between; }
  .col h3 .cnt { background: #0A0A0A; color: #fff; border-radius: 999px; padding: 0 7px; font-size: 11px; }
  .tk { background: #fff; border: 1px solid var(--border); border-radius: 9px; padding: 9px 10px; margin-bottom: 8px; cursor: grab; }
  .tk:hover { border-color: #0A0A0A; }
  .tk.noprice { border-left: 3px solid #A33A3A; }
  .warn { color: #A33A3A; font-weight: 700; }
  .cmt { background: var(--surface-2); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .cmt .who { font-weight: 700; font-size: 11px; } .cmt .when { color: var(--tinta-3); font-size: 10px; }
  .tk .nm { font-weight: 700; font-size: 13px; }
  .tk .ds { font-size: 11px; color: var(--tinta-3); margin: 2px 0; max-height: 28px; overflow: hidden; }
  .tk .mt { font-size: 11px; color: var(--tinta-2); display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-top: 4px; }
  .pay { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }
  .pay-NO { background: #FDECEE; color: #A33A3A; } .pay-SEÑA { background: #FAEFD6; color: #8A6D1B; } .pay-SI { background: #E1F5EE; color: #1F6B45; }
  table.grid { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table.grid th { text-align: left; padding: 9px 10px; font-size: 11px; text-transform: uppercase; color: var(--tinta-2); background: var(--surface-2); border-bottom: 1px solid var(--border); cursor: pointer; }
  table.grid td { padding: 8px 10px; border-bottom: 1px solid var(--surface-3); }
  table.grid tr:hover td { background: var(--surface-2); cursor: pointer; }
  td.num, th.num { text-align: right; }
  /* calendario */
  .calhd { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal .dow { font-size: 10px; text-transform: uppercase; color: var(--tinta-3); text-align: center; padding: 4px; font-weight: 700; }
  .cal .day { background: #fff; border: 1px solid var(--border); border-radius: 8px; min-height: 84px; padding: 4px 5px; }
  .cal .day.empty { background: transparent; border: none; }
  .cal .day .dn { font-size: 11px; color: var(--tinta-3); font-weight: 700; }
  .cal .day.today { border-color: #0A0A0A; box-shadow: 0 0 0 1px #0A0A0A; }
  .cal .ev { background: #0A0A0A; color: #fff; border-radius: 5px; padding: 2px 5px; font-size: 10px; margin-top: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal .ev.np { background: #A33A3A; }
  /* lista por secciones (Asana) */
  .sect { margin-bottom: 18px; }
  .sect-h { font-weight: 700; font-size: 13px; padding: 6px 2px; display: flex; gap: 8px; align-items: center; border-bottom: 2px solid #0A0A0A; margin-bottom: 6px; }
  .sect-h .cnt { background: var(--surface-3); color: var(--tinta-2); border-radius: 999px; padding: 0 8px; font-size: 11px; }
  /* adjuntos */
  .att { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
  .att .a { position: relative; }
  .att img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; }
  .att .file { display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; text-decoration: none; color: var(--tinta); background: #fff; }
  .att .x { position: absolute; top: -6px; right: -6px; background: #A33A3A; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; cursor: pointer; line-height: 16px; padding: 0; }
  .btn { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border-2); background: #fff; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
  .btn.primary { background: #0A0A0A; color: #fff; border-color: #0A0A0A; }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .ov { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: flex-start; justify-content: center; padding: 30px 16px; z-index: 100; overflow: auto; }
  .ov.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 540px; padding: 22px 24px; }
  .modal h2 { font-size: 16px; margin-bottom: 4px; } .modal .sub { font-size: 12px; color: var(--tinta-3); margin-bottom: 14px; }
  .fg { margin-bottom: 11px; } .fg label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--tinta-2); margin-bottom: 4px; }
  .fg input, .fg select, .fg textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font: inherit; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .lines { background: var(--surface-2); border-radius: 9px; padding: 8px 10px; font-size: 13px; margin: 6px 0 12px; }
  .lines .l { display: flex; justify-content: space-between; padding: 2px 0; }
  .mact { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .muted { color: var(--tinta-3); font-size: 12px; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0A0A0A; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="navbar-mount"></div>
<div class="wrap">
  <div class="hd">
    <h1 style="font-family:'Raleway'">Producción</h1>
    <div class="seg" id="viewSeg">
      <button data-v="kanban" class="active">Kanban</button>
      <button data-v="lista">Lista</button>
      <button data-v="cal">Calendario</button>
    </div>
  </div>
  <div id="view"></div>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script type="module">
import { renderNavbar } from './js/navbar.js?v=2';
import { requireAuth } from './js/auth.js?v=2';
import * as data from './js/cirene-data.js?v=2';
import { money, n } from './js/quote-engine.js?v=2';

const $ = s => document.querySelector(s);
const toast = m => { const t = $('#toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1900); };
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

let stages = [], cards = [], commentCounts = {};
let view = 'kanban', calMode = 'entrega', calDate = new Date();
let listSort = { k: 'client_name', dir: 1 };

$('#view').innerHTML = '<div class="muted" style="padding:30px 6px">Cargando producción…</div>';
document.querySelectorAll('#viewSeg button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#viewSeg button').forEach(x => x.classList.toggle('active', x === b));
  view = b.dataset.v; render();
});
await requireAuth();
renderNavbar('production');
try {
  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('La carga está demorando demasiado (timeout). Puede ser la conexión o el proyecto Supabase. Probá Reintentar.')), 15000));
  [stages, cards] = await Promise.race([Promise.all([data.listStages(), data.listProductionCards()]), timeout]);
  stages = stages.filter(s => ['produccion', 'finalizado', 'cancelado'].includes(s.category));
} catch (e) {
  $('#view').innerHTML = `<div class="card" style="color:#A33A3A;padding:18px">No se pudo cargar Producción.<br><span class="muted">${esc(e.message || e)}</span><br><button class="btn" style="margin-top:10px" onclick="location.reload()">Reintentar</button></div>`;
  throw e;
}
render();
// conteo de comentarios en segundo plano (no bloquea el tablero)
data.countCommentsByCard().then(m => { commentCounts = m; render(); }).catch(() => {});
const cid = new URLSearchParams(location.search).get('card');
if (cid && cards.find(c => c.id === cid)) openCard(cid);

function render() {
  try { ({ kanban: renderKanban, lista: renderLista, cal: renderCal }[view] || renderKanban)(); }
  catch (e) { $('#view').innerHTML = `<div class="card" style="color:#A33A3A;padding:18px">Error al mostrar el tablero: ${esc(e.message || e)}<br><button class="btn" style="margin-top:10px" onclick="location.reload()">Reintentar</button></div>`; console.error(e); }
}
const noPrice = c => !n(c.total_venta);

/* ── KANBAN ── */
function renderKanban() {
  $('#view').innerHTML = `<div class="board">${stages.map(st => {
    const cs = cards.filter(c => (c.stage_key || 'procesar') === st.key);
    return `<div class="col" data-stage="${st.key}"><h3><span>${esc(st.label)}</span><span class="cnt">${cs.length}</span></h3><div>${cs.map(tkHtml).join('')}</div></div>`;
  }).join('')}</div>`;
  bindKanban();
}
function tkHtml(c) {
  const resumen = (c.product_lines || []).map(l => l.producto).filter(Boolean).join(', ');
  return `<div class="tk ${noPrice(c) ? 'noprice' : ''}" draggable="true" data-id="${c.id}">
    <div class="nm">${esc(c.client_name || 'Sin cliente')}</div>
    <div class="ds">${esc(resumen || c.description || '')}</div>
    <div class="mt"><span>${noPrice(c) ? '<span class="warn">⚠ sin precio</span>' : money(c.total_venta)}</span>
      <span class="pay pay-${c.estado_pago || 'NO'}">${c.estado_pago || 'NO'}</span></div>
    <div class="mt"><span>${c.due_date ? '📅 ' + c.due_date : ''} ${esc(c.entrega || '')}</span><span>${commentCounts[c.id] ? '💬 ' + commentCounts[c.id] : ''}</span></div>
  </div>`;
}
function bindKanban() {
  let dragId = null;
  $('#view').querySelectorAll('.tk').forEach(el => { el.ondragstart = e => { dragId = el.dataset.id; e.dataTransfer.effectAllowed = 'move'; }; el.onclick = () => openCard(el.dataset.id); });
  $('#view').querySelectorAll('.col').forEach(col => {
    col.ondragover = e => { e.preventDefault(); col.classList.add('drop'); };
    col.ondragleave = () => col.classList.remove('drop');
    col.ondrop = async e => {
      e.preventDefault(); col.classList.remove('drop');
      const id = dragId, stage = col.dataset.stage; if (!id) return;
      const c = cards.find(x => x.id === id); if (!c || c.stage_key === stage) return;
      c.stage_key = stage; renderKanban();
      try { await data.moveProductionStage(id, stage); } catch { toast('Error al mover'); }
    };
  });
}

/* ── LISTA ── */
function renderLista() {
  const rowHtml = c => `<tr data-id="${c.id}">
    <td><b>${esc(c.client_name || '—')}</b></td>
    <td>${esc((c.product_lines || []).map(l => l.producto).filter(Boolean).join(', ') || c.description || '')}</td>
    <td class="num">${noPrice(c) ? '<span class="warn">⚠ sin precio</span>' : money(c.total_venta)}</td>
    <td><span class="pay pay-${c.estado_pago || 'NO'}">${c.estado_pago || 'NO'}</span></td>
    <td>${c.due_date || ''} ${esc(c.entrega || '')}</td>
    <td>${(c.attachments || []).length ? '📎' + (c.attachments || []).length : ''} ${commentCounts[c.id] ? '💬' + commentCounts[c.id] : ''}</td></tr>`;
  let html = '';
  for (const st of stages) {
    const cs = cards.filter(c => (c.stage_key || 'procesar') === st.key);
    if (!cs.length) continue;
    html += `<div class="sect"><div class="sect-h">${esc(st.label)} <span class="cnt">${cs.length}</span></div>
      <table class="grid"><thead><tr><th>Cliente</th><th>Producto</th><th class="num">Total</th><th>Pago</th><th>Entrega</th><th></th></tr></thead>
      <tbody>${cs.map(rowHtml).join('')}</tbody></table></div>`;
  }
  $('#view').innerHTML = html || '<p class="muted">Sin trabajos.</p>';
  $('#view').querySelectorAll('tbody tr').forEach(tr => tr.onclick = () => openCard(tr.dataset.id));
}

/* ── CALENDARIO (Entrega / Producción) ── */
function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const first = new Date(y, m, 1), startDow = (first.getDay() + 6) % 7; // lunes=0
  const days = new Date(y, m + 1, 0).getDate();
  const dateField = calMode === 'entrega' ? 'due_date' : 'production_date';
  const todayStr = new Date().toISOString().slice(0, 10);
  const byDay = {};
  cards.forEach(c => { const d = c[dateField]; if (d && d.slice(0, 7) === `${y}-${String(m + 1).padStart(2, '0')}`) (byDay[+d.slice(8, 10)] = byDay[+d.slice(8, 10)] || []).push(c); });
  const dows = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
  let cells = dows.map(d => `<div class="dow">${d}</div>`).join('');
  for (let i = 0; i < startDow; i++) cells += '<div class="day empty"></div>';
  for (let d = 1; d <= days; d++) {
    const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const evs = (byDay[d] || []).map(c => `<div class="ev ${noPrice(c) ? 'np' : ''}" data-id="${c.id}" title="${esc(c.client_name)}">${esc(c.client_name || '—')}</div>`).join('');
    cells += `<div class="day ${ds === todayStr ? 'today' : ''}"><div class="dn">${d}</div>${evs}</div>`;
  }
  const monthName = calDate.toLocaleDateString('es-UY', { month: 'long', year: 'numeric' });
  $('#view').innerHTML = `
    <div class="calhd">
      <div class="seg"><button id="cm-ent" class="${calMode === 'entrega' ? 'active' : ''}">Entrega</button><button id="cm-pro" class="${calMode === 'produccion' ? 'active' : ''}">Producción</button></div>
      <button class="btn sm" id="cprev">‹</button><b style="min-width:150px;text-align:center;text-transform:capitalize">${monthName}</b><button class="btn sm" id="cnext">›</button>
      <span class="muted">Mostrando fecha de <b>${calMode === 'entrega' ? 'entrega' : 'producción'}</b></span>
    </div>
    <div class="cal">${cells}</div>`;
  $('#cm-ent').onclick = () => { calMode = 'entrega'; renderCal(); };
  $('#cm-pro').onclick = () => { calMode = 'produccion'; renderCal(); };
  $('#cprev').onclick = () => { calDate = new Date(y, m - 1, 1); renderCal(); };
  $('#cnext').onclick = () => { calDate = new Date(y, m + 1, 1); renderCal(); };
  $('#view').querySelectorAll('.ev').forEach(e => e.onclick = () => openCard(e.dataset.id));
}

/* ── MODAL ── */
function openCard(id) {
  const c = cards.find(x => x.id === id); if (!c) return;
  const lines = c.product_lines || [];
  $('#modal').innerHTML = `<h2>${esc(c.client_name || 'Trabajo')}</h2><div class="sub">${esc(c.id)} ${c.quote_id ? '· ' + esc(c.quote_id) : ''} · ${esc(c.vendor || '')}</div>
    ${noPrice(c) ? '<div class="fg"><div class="warn" style="font-size:13px">⚠ Esta tarea no tiene precio cargado.</div></div>' : ''}
    <div class="lines">${lines.map(l => `<div class="l"><span>${esc(l.producto)} ${l.cantidad > 1 ? '×' + l.cantidad : ''}</span><span>${l.precio ? money(l.precio * (l.cantidad || 1)) : '—'}</span></div>`).join('') || '<div class="muted" style="font-size:12px">Sin ítems</div>'}</div>
    <div class="row2">
      <div class="fg"><label>Total del trabajo $</label><input id="e-total" type="number" value="${n(c.total_venta)}"></div>
      <div class="fg"><label>Estado de pago</label><select id="e-pago">
        <option value="NO" ${c.estado_pago === 'NO' ? 'selected' : ''}>Sin pagar</option>
        <option value="SEÑA" ${c.estado_pago === 'SEÑA' ? 'selected' : ''}>Seña</option>
        <option value="SI" ${c.estado_pago === 'SI' ? 'selected' : ''}>Pagado</option></select></div>
    </div>
    <div class="fg"><label>Descripción / notas</label><textarea id="e-desc">${esc(c.description)}</textarea></div>
    <div class="row2">
      <div class="fg"><label>Teléfono</label><input id="e-tel" value="${esc(c.client_phone_e164)}"></div>
      <div class="fg"><label>Dirección</label><input id="e-dir" value="${esc(c.direccion)}"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Entrega</label><input id="e-ent" list="entregas" value="${esc(c.entrega)}"><datalist id="entregas"><option>RETIRO SE</option><option>Flete</option><option>Instalación</option></datalist></div>
      <div class="fg"><label>Etapa</label><select id="e-stage">${stages.map(s => `<option value="${s.key}" ${c.stage_key === s.key ? 'selected' : ''}>${esc(s.label)}</option>`).join('')}</select></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Fecha de entrega</label><input id="e-due" type="date" value="${esc(c.due_date)}"></div>
      <div class="fg"><label>Fecha de producción</label><input id="e-prod" type="date" value="${esc(c.production_date)}"></div>
    </div>
    <div class="mact"><button class="btn primary" id="e-save">Guardar</button><button class="btn sm" id="e-close" style="margin-left:auto">Cerrar</button></div>
    <div style="border-top:1px solid var(--border);margin-top:16px;padding-top:12px">
      <label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--tinta-2)">Adjuntos</label>
      <div class="att" id="attList"></div>
      <input type="file" id="attInput" multiple style="display:none">
      <button class="btn sm" id="attAdd">📎 Adjuntar archivo</button>
    </div>
    <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:12px">
      <label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--tinta-2)">Comentarios</label>
      <div id="comments" class="muted" style="margin:8px 0">Cargando…</div>
      <div style="display:flex;gap:8px"><input id="cmt-input" placeholder="Escribir un comentario…" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font:inherit"><button class="btn" id="cmt-add">Enviar</button></div>
    </div>`;
  $('#ov').classList.add('show');
  $('#e-close').onclick = () => $('#ov').classList.remove('show');
  $('#e-save').onclick = async () => {
    const patch = { id, total_venta: n($('#e-total').value), estado_pago: $('#e-pago').value, description: $('#e-desc').value || null, client_phone_e164: $('#e-tel').value || null, direccion: $('#e-dir').value || null, entrega: $('#e-ent').value || null, due_date: $('#e-due').value || null, production_date: $('#e-prod').value || null, stage_key: $('#e-stage').value };
    Object.assign(c, patch);
    try { await data.saveProductionCard(patch); $('#ov').classList.remove('show'); render(); toast('Guardado'); } catch (e) { toast('Error: ' + (e.message || e)); }
  };
  loadComments(id);
  $('#cmt-add').onclick = async () => {
    const txt = $('#cmt-input').value.trim(); if (!txt) return;
    try { await data.addComment(id, txt); $('#cmt-input').value = ''; commentCounts[id] = (commentCounts[id] || 0) + 1; loadComments(id); } catch (e) { toast('Error: ' + (e.message || e)); }
  };
  // adjuntos
  const attHtml = () => (c.attachments || []).map((f, i) => {
    const isImg = (f.type || '').startsWith('image/');
    const inner = isImg ? `<a href="${esc(f.url)}" target="_blank"><img src="${esc(f.url)}" alt=""></a>` : `<a class="file" href="${esc(f.url)}" target="_blank">📄 ${esc((f.name || 'archivo').slice(0, 16))}</a>`;
    return `<div class="a">${inner}<button class="x" data-att="${i}" title="Quitar">×</button></div>`;
  }).join('') || '<span class="muted" style="font-size:12px">Sin adjuntos.</span>';
  const paintAtt = () => {
    $('#attList').innerHTML = attHtml();
    $('#attList').querySelectorAll('[data-att]').forEach(b => b.onclick = async () => {
      const i = +b.dataset.att, f = c.attachments[i];
      c.attachments.splice(i, 1);
      try { await data.saveProductionCard({ id, attachments: c.attachments }); if (f?.path) data.deleteAttachment(f.path); paintAtt(); render(); } catch (e) { toast('Error: ' + (e.message || e)); }
    });
  };
  paintAtt();
  $('#attAdd').onclick = () => $('#attInput').click();
  $('#attInput').onchange = async e => {
    const files = [...e.target.files]; if (!files.length) return;
    toast('Subiendo…');
    try {
      for (const f of files) { const meta = await data.uploadAttachment(f, id); c.attachments = [...(c.attachments || []), meta]; }
      await data.saveProductionCard({ id, attachments: c.attachments });
      paintAtt(); render(); toast('Adjuntado');
    } catch (err) { toast('Error: ' + (err.message || err)); }
  };
}
async function loadComments(id) {
  try {
    const cs = await data.listComments(id);
    $('#comments').innerHTML = cs.length ? cs.map(c => `<div class="cmt"><div class="who">${esc(c.user_label || 'Usuario')} <span class="when">${(c.occurred_at || '').slice(0, 16).replace('T', ' ')}</span></div>${esc(c.notes)}</div>`).join('') : '<span class="muted">Sin comentarios.</span>';
  } catch { $('#comments').innerHTML = '<span class="muted">No se pudieron cargar.</span>'; }
}
$('#ov').onclick = e => { if (e.target === $('#ov')) $('#ov').classList.remove('show'); };
</script>
