      sheetState.mockupIdx = (sheetState.mockupIdx === idx) ? -1 : idx;
      renderSheetModal();
    };
  });
  // Click en miniatura de diseño adjunto → selecciona ese índice y limpia el
  // upload directo (no se pueden tener dos diseños a la vez).
  document.querySelectorAll('[data-sh-design-att]').forEach(el => {
    el.onclick = () => {
      const idx = +el.dataset.shDesignAtt;
      if (sheetState.designAttIdx === idx) {
        sheetState.designAttIdx = -1;
      } else {
        sheetState.designAttIdx = idx;
        sheetState.designDataUrl = null;
        sheetState.designName = null;
        sheetState.designMime = null;
      }
      renderSheetModal();
    };
  });
  // (#1) Tiles "+ Subir nuevo" — el input file vive adentro de un <label>, así
  // que clickear el tile dispara el dialog sin necesidad de wire extra.
  document.querySelectorAll('[data-sh-upload]').forEach(label => {
    const kind = label.dataset.shUpload;     // 'mockup' | 'design'
    const input = label.querySelector('input[type=file]');
    if (!input) return;
    input.onchange = async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      input.value = '';
      try {
        const dataUrl = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        const mime = file.type || (file.name.toLowerCase().endsWith('.svg') ? 'image/svg+xml' : 'application/octet-stream');
        const isPhoto = mime.startsWith('image/');
        if (kind === 'mockup') {
          // Solo aceptamos imágenes como mockup.
          if (!isPhoto) { showError('El mockup tiene que ser una imagen.'); return; }
        }
        // Subir como adjunto de la tarea. Misma lógica que el botón "+ Agregar"
        // del modal de tarea: persistimos en c.attachments y refrescamos memoria.
        const c = sheetState.card;
        const newAtt = { kind: isPhoto ? 'photo' : 'file', url: dataUrl, name: file.name, mime };
        const newAttachments = [...(c.attachments || []), newAtt];
        await updateCardFields(c, { attachments: newAttachments });
        c.attachments = newAttachments;
        const cIdx = state.cards.findIndex(x => x.id === c.id);
        if (cIdx >= 0) state.cards[cIdx].attachments = newAttachments;
        const newIdx = newAttachments.length - 1;
        if (kind === 'mockup') {
          sheetState.mockupIdx = newIdx;
        } else {
          sheetState.designAttIdx = newIdx;
          sheetState.designDataUrl = null;
          sheetState.designName = null;
          sheetState.designMime = null;
        }
        renderSheetModal();
        showOk('Archivo agregado a la tarea y seleccionado');
      } catch (err) { showError('No se pudo subir el archivo: ' + err.message); }
    };
  });
  const rm = $('shDesignRm');
  if (rm) rm.onclick = () => {
    sheetState.designDataUrl = null;
    sheetState.designName = null;
    sheetState.designMime = null;
    renderSheetModal();
  };
  $('shGenerate').onclick = generateSheetPdf;
}

// Cache del logo De Cirene (blanco, PNG) para embedar en PDFs.
// jsPDF con Helvetica WinAnsi no soporta el lockup tipográfico exacto, así que en
// vez de dibujar "De Cirene" como texto inserto la imagen oficial /assets/logo.png.
let _cireneLogoDataUrl = null;
async function getCireneLogo() {
  if (_cireneLogoDataUrl) return _cireneLogoDataUrl;
  try {
    const resp = await fetch('/assets/logo.png');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    _cireneLogoDataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(blob);
    });
    return _cireneLogoDataUrl;
  } catch (e) {
    console.warn('No se pudo cargar /assets/logo.png:', e.message);
    return null;
  }
}

// SVG → PNG vía canvas para que jsPDF lo pueda embedar grande sin pixelar.
async function svgToPngDataUrl(svgDataUrl, maxSize = 1800) {
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = svgDataUrl;
  });
  let { naturalWidth: w, naturalHeight: h } = img;
  if (!w || !h) { w = maxSize; h = maxSize; }
  const ratio = Math.min(maxSize / Math.max(w, h), 1);
  const cw = Math.max(1, Math.round(w * ratio));
  const ch = Math.max(1, Math.round(h * ratio));
  const canvas = document.createElement('canvas');
  canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, cw, ch);
  ctx.drawImage(img, 0, 0, cw, ch);
  return canvas.toDataURL('image/png');
}

// Embed de imagen respetando aspect ratio dentro de un box (maxW × maxH).
// Devuelve la posición/tamaño finales por si el caller necesita seguir dibujando.
async function addImageFitted(doc, dataUrl, fmt, boxX, boxY, maxW, maxH) {
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = dataUrl;
  });
  const naturalW = img.naturalWidth || 1;
  const naturalH = img.naturalHeight || 1;
  const aspect = naturalW / naturalH;
  let w = maxW, h = maxW / aspect;
  if (h > maxH) { h = maxH; w = maxH * aspect; }
  const x = boxX + (maxW - w) / 2;
  const y = boxY + (maxH - h) / 2;
  doc.addImage(dataUrl, fmt, x, y, w, h, undefined, 'FAST');
  return { x, y, w, h };
}

async function generateSheetPdf() {
  const { jsPDF } = window.jspdf || {};
  if (!jsPDF) { showError('jsPDF no se cargó'); return; }
  const c = sheetState.card;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  // Colores de marca
  const AZUL    = [0, 0, 0];
  const CELESTE = [93, 224, 230];
  const TINTA   = [0, 0, 0];
  const FONDO   = [222, 248, 249];   // celeste muy clarito (var(--celeste) al 12%)
  const FONDO_2 = [244, 250, 253];

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ HEADER GRANDE (banner celeste arriba + bloque azul con el tipo)     ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  doc.setFillColor(...CELESTE);
  doc.rect(0, 0, 210, 6, 'F');                            // franja celeste superior
  doc.setFillColor(...AZUL);
  doc.rect(0, 6, 210, 36, 'F');                            // banner azul principal

  // Logo De Cirene como imagen (no como texto: jsPDF/Helvetica no respeta el lockup
  // con la E reflejada). Fallback a texto si fetch falla.
  const logo = await getCireneLogo();
  if (logo) {
    await addImageFitted(doc, logo, 'PNG', 14, 13, 46, 22);
  } else {
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(26);
    doc.text('De Cirene', 14, 28);
  }
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  doc.text('Ficha de produccion', 14, 39);

  // Chip del tipo (grande, a la derecha)
  doc.setFillColor(255, 255, 255);
  doc.roundedRect(140, 14, 60, 20, 4, 4, 'F');
  doc.setTextColor(...AZUL);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.text(sheetState.type.toUpperCase(), 170, 27, { align: 'center' });

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ BLOQUE PEDIDO + FECHA                                               ║
  // ║ El título usa descripción del pedido (preferido) o el nombre del    ║
  // ║ producto principal. NO usa el nombre del cliente — la ficha va al   ║
  // ║ taller y el cliente no debe aparecer.                                ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  let y = 52;
  doc.setFillColor(...FONDO);
  doc.roundedRect(10, y - 4, 190, 22, 3, 3, 'F');
  doc.setTextColor(...TINTA);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  const fichaTitle = c.descripcion_pedido || sheetState.producto || 'Pedido';
  doc.text(fichaTitle, 14, y + 5);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(74, 122, 149);
  doc.text(`Tarea ${c.id}`, 14, y + 12);
  if (sheetState.fechaEntrega) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(...AZUL);
    doc.text(`ENTREGA: ${sheetState.fechaEntrega}`, 196, y + 8, { align: 'right' });
  }
  y += 26;

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ BLOQUE 1: DATOS DEL PRODUCTO (3 columnas)                           ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  const sectionTitle = (txt, atY) => {
    doc.setFillColor(...AZUL);
    doc.roundedRect(10, atY - 4, 190, 7, 1.5, 1.5, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(txt, 14, atY + 1);
  };

  sectionTitle('PRODUCTO', y);
  y += 7;
  doc.setFillColor(...FONDO_2);
  doc.roundedRect(10, y, 190, 26, 3, 3, 'F');

  const dataCol = (label, val, x, atY) => {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(74, 122, 149);
    doc.text(label.toUpperCase(), x, atY);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.setTextColor(...TINTA);
    const wrapped = doc.splitTextToSize(val || '—', 56);
    doc.text(wrapped, x, atY + 7);
  };
  dataCol('Producto', sheetState.producto, 14, y + 8);
  dataCol('Color',    sheetState.color,    78, y + 8);
  dataCol('Talle',    sheetState.talle,    144, y + 8);
  y += 32;

  // Si hay más de una línea seleccionada, las listamos como tabla.
  const selIdxs = [...(sheetState.selectedLineIdxs || [])].sort((a, b) => a - b);
  const selLines = selIdxs.map(i => (c.product_lines || [])[i]).filter(Boolean);
  if (selLines.length > 1) {
    sectionTitle('LÍNEAS INCLUIDAS EN ESTA FICHA', y);
    y += 7;
    const tblH = 8 + selLines.length * 7;
    doc.setFillColor(...FONDO_2);
    doc.roundedRect(10, y, 190, tblH, 3, 3, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(74, 122, 149);
    doc.text('PRODUCTO', 14, y + 5);
    doc.text('COLOR', 80, y + 5);
    doc.text('TALLE', 130, y + 5);
    doc.text('CANT.', 170, y + 5);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(...TINTA);
    selLines.forEach((l, i) => {
      const rowY = y + 12 + i * 7;
      doc.text(String(l.producto || '—').slice(0, 30), 14, rowY);
      doc.text(String(l.color || '—').slice(0, 20), 80, rowY);
      doc.text(String(l.talle || '—').slice(0, 15), 130, rowY);
      doc.text(String(l.cantidad || '?'), 170, rowY);
    });
    y += tblH + 4;
  }

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ BLOQUE 2: ESPECIFICACIONES                                          ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  const hasSpecs = sheetState.tamanoLogos || (sheetState.type === 'Bordado' && sheetState.hilos) || sheetState.notas;
  if (hasSpecs) {
    sectionTitle('ESPECIFICACIONES', y);
    y += 7;
    const specsStartY = y;
    let specsY = y + 4;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(12);
    doc.setTextColor(...TINTA);
    const specRow = (label, val) => {
      if (!val) return;
      doc.setFont('helvetica', 'bold');
      doc.text(label + ':', 14, specsY);
      doc.setFont('helvetica', 'normal');
      const wrapped = doc.splitTextToSize(String(val), 138);
      doc.text(wrapped, 56, specsY);
      specsY += Math.max(7, wrapped.length * 5.5 + 2);
    };
    specRow('Tamaño logos', sheetState.tamanoLogos);
    if (sheetState.type === 'Bordado') specRow('Hilos', sheetState.hilos);
    specRow('Notas', sheetState.notas);
    const specsH = Math.max(specsY - specsStartY + 2, 12);
    // Dibujo el fondo después de saber la altura
    doc.setFillColor(...FONDO_2);
    doc.roundedRect(10, specsStartY, 190, specsH, 3, 3, 'F');
    // Re-escribo el texto encima (porque el rect lo tapó)
    specsY = specsStartY + 4;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(12);
    doc.setTextColor(...TINTA);
    specRow('Tamaño logos', sheetState.tamanoLogos);
    if (sheetState.type === 'Bordado') specRow('Hilos', sheetState.hilos);
    specRow('Notas', sheetState.notas);
    y = specsY + 4;
  }

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ BLOQUE 3: MOCKUP                                                    ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  // (#1) mockupIdx ahora apunta al índice real en c.attachments (no en
  // photos filtrados). Mantenemos el filtro photo para descartar PDFs
  // que se hayan elegido por error.
  const allAtts = c.attachments || [];
  const mkCandidate = sheetState.mockupIdx >= 0 ? allAtts[sheetState.mockupIdx] : null;
  const mk = (mkCandidate && mkCandidate.kind === 'photo') ? mkCandidate : null;
  if (mk?.url) {
    if (y > 200) { doc.addPage(); y = 18; }
    sectionTitle('MOCKUP', y);
    y += 7;
    const boxX = 10, boxY = y, boxW = 190, boxH = 80;
    doc.setFillColor(255, 255, 255);
    doc.setDrawColor(...CELESTE);
    doc.setLineWidth(0.5);
    doc.roundedRect(boxX, boxY, boxW, boxH, 3, 3, 'FD');
    try {
      const mime = mk.mime || (mk.url.match(/^data:([^;]+)/) || [])[1] || 'image/jpeg';
      const fmt = mime.includes('png') ? 'PNG' : 'JPEG';
      // Margen interno de 4mm para que la imagen no roce el borde
      await addImageFitted(doc, mk.url, fmt, boxX + 4, boxY + 4, boxW - 8, boxH - 8);
    } catch (e) {
      doc.setFontSize(10);
      doc.setTextColor(167, 45, 45);
      doc.text('No se pudo embeber el mockup: ' + e.message, boxX + 6, boxY + 10);
    }
    y += boxH + 4;
  }

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ NOTA "¿DUDAS? CONSULTAR" (cierre página 1)                          ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  if (y > 260) { doc.addPage(); y = 18; }
  doc.setFillColor(255, 246, 220);                         // amarillo cálido
  doc.setDrawColor(245, 195, 80);
  doc.setLineWidth(0.6);
  doc.roundedRect(10, y, 190, 18, 3, 3, 'FD');
  doc.setTextColor(120, 80, 0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.text('ATENCION: ante cualquier duda, consultar al equipo de De Cirene antes de producir.', 105, y + 11, { align: 'center' });

  // Footer
  doc.setFontSize(8);
  doc.setTextColor(143, 176, 194);
  doc.text(`Generado ${new Date().toLocaleString('es-UY')} · De Cirene`, 14, 290);

  // ╔═════════════════════════════════════════════════════════════════════╗
  // ║ PÁGINA 2: DISEÑO EN GRANDE                                          ║
  // ╚═════════════════════════════════════════════════════════════════════╝
  // (#1) Dos fuentes posibles: adjunto ya en la tarea (designAttIdx >= 0) o
  // subido directo en el sheet (designDataUrl). El adjunto manda si está.
  let designSource = null;
  if (sheetState.designAttIdx >= 0) {
    const att = (c.attachments || [])[sheetState.designAttIdx];
    if (att) {
      designSource = {
        dataUrl: att.url,
        name: att.name || `adjunto ${sheetState.designAttIdx + 1}`,
        mime: att.mime || (att.kind === 'photo' ? 'image/jpeg' : 'application/octet-stream'),
      };
    }
  } else if (sheetState.designDataUrl) {
    designSource = {
      dataUrl: sheetState.designDataUrl,
      name: sheetState.designName,
      mime: sheetState.designMime || '',
    };
  }
  if (designSource) {
    doc.addPage();
    // Banner top
    doc.setFillColor(...CELESTE);
    doc.rect(0, 0, 210, 6, 'F');
    doc.setFillColor(...AZUL);
    doc.rect(0, 6, 210, 18, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text(`DISEÑO · ${(c.descripcion_pedido || sheetState.producto || '').toUpperCase()}`, 14, 18);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text(`Archivo: ${designSource.name}`, 196, 18, { align: 'right' });

    const mime = designSource.mime || '';
    const boxX = 10, boxY = 30, boxW = 190, boxH = 245;
    doc.setFillColor(255, 255, 255);
    doc.setDrawColor(...CELESTE);
    doc.setLineWidth(0.5);
    doc.roundedRect(boxX, boxY, boxW, boxH, 3, 3, 'FD');

    try {
      if (mime === 'image/svg+xml') {
        const png = await svgToPngDataUrl(designSource.dataUrl, 2000);
        await addImageFitted(doc, png, 'PNG', boxX + 6, boxY + 6, boxW - 12, boxH - 12);
      } else if (mime.startsWith('image/')) {
        const fmt = mime.includes('png') ? 'PNG' : 'JPEG';
        await addImageFitted(doc, designSource.dataUrl, fmt, boxX + 6, boxY + 6, boxW - 12, boxH - 12);
      } else if (mime === 'application/pdf') {
        doc.setTextColor(120, 53, 15);
        doc.setFontSize(13);
        doc.setFont('helvetica', 'bold');
        doc.text('El diseño está adjunto como PDF.', 105, boxY + 100, { align: 'center' });
        doc.setFontSize(11);
        doc.setFont('helvetica', 'normal');
        doc.text('Pedile al equipo el archivo original — no se puede embeber dentro de la ficha.', 105, boxY + 110, { align: 'center' });
      } else {
        doc.setFontSize(11);
        doc.text('Formato no soportado para previsualizar.', boxX + 10, boxY + 10);
      }
    } catch (e) {
      doc.setFontSize(10);
      doc.setTextColor(167, 45, 45);
      doc.text('Error al embeber el diseño: ' + e.message, boxX + 10, boxY + 10);
    }

    // Repetir nota de consulta
    doc.setFillColor(255, 246, 220);
    doc.setDrawColor(245, 195, 80);
    doc.setLineWidth(0.6);
    doc.roundedRect(10, 280, 190, 12, 2, 2, 'FD');
    doc.setTextColor(120, 80, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('Dudas con el diseno? Consultar con De Cirene antes de producir.', 105, 287, { align: 'center' });
  }

  // Filename usa descripción del pedido (preferida) o producto; nunca el cliente.
  const fileTitle = (c.descripcion_pedido || sheetState.producto || c.id).replace(/[^a-zA-Z0-9]+/g, '_').slice(0, 40);
  const filename = `Ficha_${sheetState.type}_${fileTitle}.pdf`;
  doc.save(filename);
  showOk('Ficha generada. Revisá tu carpeta de descargas.');
  closeSheetModal();
}

// Sincroniza un thumb visible (fijo al pie de la viewport) con el scroll horizontal
// del .kanban-wrap. Soporta drag con mouse y touch, y click directo en el track.
function wireCustomScrollbar() {
  const wrap = document.getElementById('kanbanWrap');
  const sb = document.getElementById('kanbanSb');
  const track = document.getElementById('kanbanSbTrack');
  const thumb = document.getElementById('kanbanSbThumb');
  if (!wrap || !sb || !track || !thumb) return;

  const updateThumb = () => {
    const ratio = wrap.clientWidth / wrap.scrollWidth;
    if (ratio >= 0.999) { sb.style.display = 'none'; return; }
    sb.style.display = 'block';
    const trackW = track.clientWidth;
    const thumbW = Math.max(80, Math.floor(trackW * ratio));
    const maxLeft = trackW - thumbW;
    const denom = wrap.scrollWidth - wrap.clientWidth;
    const scrollRatio = denom > 0 ? wrap.scrollLeft / denom : 0;
    thumb.style.width = thumbW + 'px';
    thumb.style.left = (scrollRatio * maxLeft) + 'px';
  };

  wrap.addEventListener('scroll', updateThumb, { passive: true });
  window.addEventListener('resize', updateThumb);
  // Cuando se re-renderiza el kanban (cambio de filtros, cards…) hay que recalcular.
  // Lo expongo para que `render()` lo llame al final.
  window._refreshKanbanScrollbar = updateThumb;

  // Drag del thumb (mouse + touch)
  let dragging = false;
  let startX = 0;
  let startScrollLeft = 0;
  const onDown = (clientX) => {
    dragging = true;
    startX = clientX;
    startScrollLeft = wrap.scrollLeft;
  };
  const onMove = (clientX) => {
    if (!dragging) return;
    const trackW = track.clientWidth;
    const thumbW = thumb.clientWidth;
    const denom = wrap.scrollWidth - wrap.clientWidth;
    // Conversión: dx en píxeles del thumb-track → dx equivalente del wrap (proporcional).
    const dx = clientX - startX;
    const pxPerScroll = (trackW - thumbW) / denom;
    if (pxPerScroll <= 0) return;
    wrap.scrollLeft = startScrollLeft + dx / pxPerScroll;
  };
  const onUp = () => { dragging = false; };

  thumb.addEventListener('mousedown', e => { e.preventDefault(); onDown(e.clientX); });
  window.addEventListener('mousemove', e => onMove(e.clientX));
  window.addEventListener('mouseup', onUp);
  thumb.addEventListener('touchstart', e => onDown(e.touches[0].clientX), { passive: true });
  window.addEventListener('touchmove', e => { if (dragging) { onMove(e.touches[0].clientX); } }, { passive: true });
  window.addEventListener('touchend', onUp);

  // Click en el track (fuera del thumb) → salta a esa posición
  track.addEventListener('click', e => {
    if (e.target === thumb) return;
    const rect = track.getBoundingClientRect();
    const trackW = track.clientWidth;
    const thumbW = thumb.clientWidth;
    const x = e.clientX - rect.left - thumbW / 2;
    const maxLeft = trackW - thumbW;
    const clamped = Math.max(0, Math.min(maxLeft, x));
    const ratio = maxLeft > 0 ? clamped / maxLeft : 0;
    wrap.scrollLeft = ratio * (wrap.scrollWidth - wrap.clientWidth);
  });

  updateThumb();
}

// Boot
(async () => {
  await requireAuth();
  _hydrateIcons();
  _ganttLoad();   // (#14) carga operarios + tipos de estampe de localStorage
  // Producción compartida: todo usuario autenticado puede mover/editar.
  // El check destructivo (eliminar) sigue restringido en js/production.js.
  state.canMove = true;
  // Paralelizamos: los usuarios activos no son input de render() inicial.
  // (#3) loadStageRules: best-effort, no bloquea el render. Si falla, el motor
  // usa el fallback hardcodeado en stage-rules.js.
  const [users] = await Promise.all([
    loadActiveUsers(),
    load(),
    loadStageRules().catch(e => console.warn('[stage-rules] boot:', e?.message)),
  ]);
  state.users = users;
  wireCustomScrollbar();
  // Deep-link a una tarjeta puntual: production.html?card=<id> (usado por ventas.html
  // para "Abrir en Producción"). loadCard(id) trae la tarjeta aunque no esté en la
  // vista/filtro actual, así que funciona con cualquier id (incl. archivadas).
  const _deepCardId = new URLSearchParams(location.search).get('card');
  if (_deepCardId) {
    try { await openDetail(_deepCardId); }
    catch (e) { console.warn('[deep-link card]', e?.message); }
  }
  // (#6) Catálogo unificado: refresca cirene_catalog_v3 desde Supabase catalog_v1
  // (misma fuente que el cotizador) para que el datalist de productos del modal
  // no quede viejo. No bloquea el render del tablero.
  bootstrapCatalogFromSupabase({ timeoutMs: 4000 })
    .then(() => { if (typeof buildCatalogDatalist === 'function') buildCatalogDatalist(); })
    .catch(e => console.warn('bootstrap catálogo:', e.message));
  const flash = sessionStorage.getItem('cirene_toast');
  if (flash) { sessionStorage.removeItem('cirene_toast'); showOk(flash); }
})();

// ── Auto-refresh: el board es compartido entre todos los usuarios. Para que un
// cambio de otra persona (ej: marcar urgente) se vea sin recargar a mano,
// re-leemos las tarjetas periódicamente y al volver a la pestaña. Nunca
// interrumpimos una edición/arrastre/modal en curso (se reintenta al próximo tick).
let _autoRefreshing = false;
async function silentRefresh() {
  if (_autoRefreshing) return;
  // Solo auto-refrescar las vistas del board compartido (kanban/lista/calendario).
  // Las pestañas de datos (stock/dtf/oc/métricas/gantt) NO se re-renderean solas:
  // recargarlas cada 25s pisaba la edición en curso y mostraba "Cargando…".
  if (!['kanban', 'list', 'calendar'].includes(state.view)) return;
  if (state.selectedCardId) return;          // modal de detalle abierto
  if (_dragId) return;                       // arrastrando una tarjeta
  if (typeof poState !== 'undefined' && poState.open) return; // modal OC abierto
  if (document.visibilityState === 'hidden') return;
  _autoRefreshing = true;
  try {
    const cards = await loadCards({ includeFinished: state.filter === 'all_incl' });
    state.cards = cards;
    render();
  } catch (e) {
    // silencioso — el próximo tick reintenta
  } finally {
    _autoRefreshing = false;
  }
}

setInterval(silentRefresh, 25000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') silentRefresh();
});
window.addEventListener('focus', silentRefresh);

const _btnRefresh = $('btnRefresh');
if (_btnRefresh) _btnRefresh.onclick = async () => {
  withLoading(_btnRefresh, true);
  try { await load(); showOk('Tablero actualizado'); }
  catch (e) { showError(e.message); }
  finally { withLoading(_btnRefresh, false); }
};
</script>
