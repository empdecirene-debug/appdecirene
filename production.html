        <div id="gTiposMount"></div>
      </fieldset>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <button id="gAddBtn" data-icon="plus" style="padding:6px 12px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:12px">Agregar tarea</button>
      <button id="gLoadCandidates" style="padding:6px 12px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:12px">Cargar candidatos del día (${candidates.length})</button>
      <!-- (#T8.b) Toggle layout -->
      <div style="display:inline-flex;background:var(--surface-3);border-radius:8px;padding:3px;gap:0">
        <button data-gantt-layout="flat" style="padding:5px 12px;border:none;background:${_ganttState.layoutMode==='flat'?'var(--azul)':'transparent'};color:${_ganttState.layoutMode==='flat'?'#fff':'var(--tinta-2)'};font-size:12px;font-weight:600;border-radius:6px;cursor:pointer">Vista plana</button>
        <button data-gantt-layout="byOp" style="padding:5px 12px;border:none;background:${_ganttState.layoutMode==='byOp'?'var(--azul)':'transparent'};color:${_ganttState.layoutMode==='byOp'?'#fff':'var(--tinta-2)'};font-size:12px;font-weight:600;border-radius:6px;cursor:pointer">Por operario (encolado auto)</button>
      </div>
      <span style="flex:1"></span>
      <button id="gExportConsol" data-icon="download" style="padding:6px 14px;background:var(--azul);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">PDF consolidado</button>
      <button id="gExportByOp" data-icon="download" style="padding:6px 14px;border:1px solid var(--azul);color:var(--azul);background:#fff;border-radius:6px;cursor:pointer;font-size:12px">PDF por operario</button>
    </div>

    <table style="width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--border);margin-bottom:16px">
      <thead><tr style="background:var(--surface-2)">
        <th style="text-align:left;padding:6px">Tarea</th>
        <th style="text-align:left;padding:6px">Operario</th>
        <th style="text-align:left;padding:6px">Tipo de estampe</th>
        <th style="text-align:right;padding:6px">Estampes</th>
        <th style="text-align:right;padding:6px">Inicio</th>
        <th style="text-align:right;padding:6px">Duración</th>
        <th></th>
      </tr></thead>
      <tbody id="gTasksBody"></tbody>
    </table>

    <h3 style="font-size:13px;margin:0 0 6px">Vista previa</h3>
    <div id="gPreview" style="border:1px solid var(--border);border-radius:8px;overflow:auto"></div>
  `;
  _hydrateIcons();

  $('gFecha').onchange = e => {
    _ganttState.fecha = e.target.value;
    // (#T8.a) Auto-load candidatos del nuevo día (sin duplicar)
    _ganttAutoLoadCandidates();
    renderGanttPane();
  };
  $('gStart').onchange = e => { _ganttState.startHour = Number(e.target.value) || 8; if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart(); _renderGanttPreview(); };
  $('gEnd').onchange   = e => { _ganttState.endHour = Number(e.target.value) || 18; _renderGanttPreview(); };
  $('gDias').onchange  = e => { _ganttState.dias = Number(e.target.value) === 2 ? 2 : 1; _ganttAutoLoadCandidates(); renderGanttPane(); };
  // (#T8.b) Toggle layout
  document.querySelectorAll('[data-gantt-layout]').forEach(b => b.onclick = () => {
    _ganttState.layoutMode = b.dataset.ganttLayout;
    if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
    renderGanttPane();
  });

  $('gOpAdd').onclick = () => {
    const v = $('gOpInput').value.trim();
    if (v && !_ganttState.operarios.includes(v)) {
      _ganttState.operarios.push(v);
      _ganttSaveOps();
      $('gOpInput').value = '';
      _renderGanttOps(); _renderGanttTasks();
    }
  };
  $('gOpInput').onkeydown = e => { if (e.key === 'Enter') $('gOpAdd').onclick(); };

  $('gAddBtn').onclick = () => {
    _ganttState.tasks.push({
      id: 'manual-' + Date.now(),
      label: 'Tarea',
      operario: _ganttState.operarios[0] || '',
      tipoIdx: 0,
      estampes: 10,
      startMin: 0,
    });
    if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
    _renderGanttTasks(); _renderGanttPreview();
  };
  $('gLoadCandidates').onclick = () => {
    const added = _ganttAutoLoadCandidates();
    _renderGanttTasks(); _renderGanttPreview();
    if (!added) showOk('Todos los candidatos ya estaban cargados');
  };
  $('gExportConsol').onclick = () => {
    if (!_ganttState.tasks.length) return showError('No hay tareas cargadas');
    if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
    downloadGanttPdf({
      fecha: _ganttState.fecha, startHour: _ganttState.startHour, endHour: _ganttState.endHour,
      dias: _ganttState.dias,
      tasks: _ganttTasksForPdf(), legend: _ganttLegend(),
    }, `gantt-${_ganttState.fecha}${_ganttState.dias === 2 ? '+1' : ''}.pdf`);
  };
  $('gExportByOp').onclick = () => {
    const ops = [...new Set(_ganttState.tasks.map(t => t.operario || 'Sin asignar'))];
    if (!ops.length) return showError('No hay tareas cargadas');
    if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
    for (const op of ops) {
      downloadGanttPdf({
        fecha: _ganttState.fecha, startHour: _ganttState.startHour, endHour: _ganttState.endHour,
        dias: _ganttState.dias,
        tasks: _ganttTasksForPdf(op), legend: _ganttLegend(),
        title: `Plan de ${op}`,
      }, `gantt-${_ganttState.fecha}-${op.replace(/\s+/g, '_')}.pdf`);
    }
  };

  _renderGanttOps();
  _renderGanttTipos();
  _renderGanttTasks();
  _renderGanttPreview();
}

function _renderGanttOps() {
  const mount = $('gOpsChips');
  if (!mount) return;
  mount.innerHTML = _ganttState.operarios.length
    ? _ganttState.operarios.map((op, i) => `
      <span style="display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--border);border-radius:99px;padding:3px 5px 3px 10px;font-size:12px">
        ${esc(op)}
        <button data-op-rm="${i}" title="Quitar" style="border:none;background:#e0e4ea;color:#555;border-radius:50%;width:16px;height:16px;cursor:pointer;font-size:11px;line-height:1">×</button>
      </span>`).join('')
    : '<span style="font-size:11px;color:var(--tinta-3);font-style:italic">Sin operarios. Agregá al menos uno.</span>';
  mount.querySelectorAll('[data-op-rm]').forEach(b => b.onclick = () => {
    _ganttState.operarios.splice(Number(b.dataset.opRm), 1);
    _ganttSaveOps();
    _renderGanttOps(); _renderGanttTasks(); _renderGanttPreview();
  });
}

function _renderGanttTipos() {
  const mount = $('gTiposMount');
  if (!mount) return;
  mount.innerHTML = `
    ${_ganttState.tiposEstampe.map((tp, i) => `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="width:11px;height:11px;border-radius:3px;background:${_ganttTipoColor(i)};flex:0 0 auto"></span>
        <input data-tipo-i="${i}" data-tipo-f="nombre" value="${esc(tp.nombre)}" style="flex:1;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px" />
        <input data-tipo-i="${i}" data-tipo-f="min" type="number" min="1" value="${tp.min}" style="width:54px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px;text-align:right" />
        <span style="font-size:11px;color:var(--tinta-3)">min</span>
        <button data-tipo-rm="${i}" title="Quitar" style="border:none;background:#e0e4ea;color:#555;border-radius:50%;width:16px;height:16px;cursor:pointer;font-size:11px;line-height:1">×</button>
      </div>`).join('')}
    <button id="gTipoAdd" style="margin-top:4px;padding:3px 10px;font-size:11px;border:1px dashed var(--border);background:#fff;border-radius:6px;cursor:pointer">+ Tipo de estampe</button>
  `;
  mount.querySelectorAll('[data-tipo-f]').forEach(inp => inp.onchange = () => {
    const i = Number(inp.dataset.tipoI), f = inp.dataset.tipoF;
    _ganttState.tiposEstampe[i][f] = f === 'min' ? (Number(inp.value) || 1) : inp.value;
    _ganttSaveTipos();
    _renderGanttTipos(); _renderGanttTasks(); _renderGanttPreview();
  });
  mount.querySelectorAll('[data-tipo-rm]').forEach(b => b.onclick = () => {
    if (_ganttState.tiposEstampe.length <= 1) return showError('Tiene que quedar al menos un tipo');
    _ganttState.tiposEstampe.splice(Number(b.dataset.tipoRm), 1);
    _ganttSaveTipos();
    _renderGanttTipos(); _renderGanttTasks(); _renderGanttPreview();
  });
  const addBtn = $('gTipoAdd');
  if (addBtn) addBtn.onclick = () => {
    _ganttState.tiposEstampe.push({ nombre: 'Nuevo', min: 5 });
    _ganttSaveTipos();
    _renderGanttTipos();
  };
}

function _renderGanttTasks() {
  const tbody = $('gTasksBody');
  if (!tbody) return;
  const opOpts = sel => ['', ..._ganttState.operarios]
    .map(v => `<option value="${esc(v)}" ${v === (sel || '') ? 'selected' : ''}>${v || 'Sin asignar'}</option>`).join('');
  const tipoOpts = sel => _ganttState.tiposEstampe
    .map((tp, i) => `<option value="${i}" ${i === (sel || 0) ? 'selected' : ''}>${esc(tp.nombre)} (${tp.min}m)</option>`).join('');
  const isByOp = _ganttState.layoutMode === 'byOp';
  tbody.innerHTML = _ganttState.tasks.length ? _ganttState.tasks.map((t, i) => {
    const dur = _ganttDuration(t);
    const durTxt = dur >= 60 ? `${Math.floor(dur/60)}h ${dur%60 ? (dur%60)+'m' : ''}` : `${dur}m`;
    const startTxt = _ganttMinToHHMM(t.startMin);
    // (#T8.b) En modo byOp, inicio es derivado (no editable); mostrar ↑↓ para reordenar dentro del operario
    const startCell = isByOp
      ? `<span title="Inicio calculado automático" style="color:var(--tinta-3)">${startTxt}</span>
         <button data-g-move="${i}" data-g-dir="up"   title="Subir en la cola del operario"   style="margin-left:4px;border:none;background:#eef;color:#005;border-radius:3px;cursor:pointer;font-size:11px;padding:1px 5px">↑</button>
         <button data-g-move="${i}" data-g-dir="down" title="Bajar en la cola del operario" style="border:none;background:#eef;color:#005;border-radius:3px;cursor:pointer;font-size:11px;padding:1px 5px">↓</button>`
      : `<input data-g-i="${i}" data-g-f="startHHMM" type="time" value="${startTxt}" style="border:1px solid transparent;background:transparent;padding:3px" />`;
    return `
    <tr>
      <td style="padding:4px"><input data-g-i="${i}" data-g-f="label" value="${esc(t.label)}" style="width:180px;border:1px solid transparent;background:transparent;padding:3px" /></td>
      <td style="padding:4px"><select data-g-i="${i}" data-g-f="operario">${opOpts(t.operario)}</select></td>
      <td style="padding:4px"><select data-g-i="${i}" data-g-f="tipoIdx">${tipoOpts(t.tipoIdx)}</select></td>
      <td style="padding:4px;text-align:right"><input data-g-i="${i}" data-g-f="estampes" type="number" min="0" value="${t.estampes}" style="width:60px;text-align:right;border:1px solid transparent;background:transparent;padding:3px" /></td>
      <td style="padding:4px;text-align:right">${startCell}</td>
      <td style="padding:4px;text-align:right"><strong>${durTxt}</strong></td>
      <td style="padding:4px"><button data-g-rm="${i}" title="Quitar" style="border:none;background:none;color:#c62828;cursor:pointer;font-size:14px">×</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="7" style="padding:10px;color:var(--tinta-3);font-style:italic">Sin tareas. Agregá una o cargá los candidatos del día.</td></tr>`;
  tbody.querySelectorAll('[data-g-f]').forEach(inp => {
    inp.onchange = () => {
      const i = Number(inp.dataset.gI), f = inp.dataset.gF;
      if (f === 'startHHMM') {
        // En byOp el startMin se calcula, ignorar edición manual
        if (_ganttState.layoutMode !== 'byOp') _ganttState.tasks[i].startMin = _ganttHHMMToMin(inp.value);
      } else if (f === 'estampes' || f === 'tipoIdx') {
        _ganttState.tasks[i][f] = Number(inp.value);
      } else {
        _ganttState.tasks[i][f] = inp.value;
      }
      // (#T8.b) En modo byOp, cualquier cambio que afecte duración u operario
      // requiere recalcular toda la cola.
      if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
      _renderGanttTasks(); _renderGanttPreview();
    };
  });
  tbody.querySelectorAll('[data-g-rm]').forEach(b => b.onclick = () => {
    _ganttState.tasks.splice(Number(b.dataset.gRm), 1);
    if (_ganttState.layoutMode === 'byOp') _ganttRecalcAutoStart();
    _renderGanttTasks(); _renderGanttPreview();
  });
  // (#T8.b) En modo byOp permitir reordenar dentro del operario con ↑↓
  tbody.querySelectorAll('[data-g-move]').forEach(b => b.onclick = () => {
    const i = Number(b.dataset.gMove);
    const dir = b.dataset.gDir === 'up' ? -1 : 1;
    const op = _ganttState.tasks[i]?.operario || 'Sin asignar';
    // Buscar el índice "vecino" del mismo operario en la dirección
    const arr = _ganttState.tasks;
    let j = i + dir;
    while (j >= 0 && j < arr.length && (arr[j].operario || 'Sin asignar') !== op) j += dir;
    if (j < 0 || j >= arr.length) return;
    const [t] = arr.splice(i, 1);
    arr.splice(j, 0, t);
    _ganttRecalcAutoStart();
    _renderGanttTasks(); _renderGanttPreview();
  });
}

// startMin = minutos desde startHour. Para el input <time> lo convertimos a HH:MM absoluto.
function _ganttMinToHHMM(startMin) {
  const total = _ganttState.startHour * 60 + (Number(startMin) || 0);
  const h = Math.floor(total / 60), m = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function _ganttHHMMToMin(hhmm) {
  const [h, m] = String(hhmm || '').split(':').map(Number);
  if (isNaN(h)) return 0;
  return Math.max(0, (h * 60 + (m || 0)) - _ganttState.startHour * 60);
}

// Vista previa HTML del Gantt — mismo layout que el PDF.
function _renderGanttPreview() {
  const mount = $('gPreview');
  if (!mount) return;
  const { startHour, endHour, dias } = _ganttState;
  const operarios = [...new Set(_ganttState.tasks.map(t => t.operario || 'Sin asignar'))];
  if (!operarios.length) {
    mount.innerHTML = '<div style="padding:20px;color:var(--tinta-3);font-size:12px;text-align:center">Agregá tareas para ver la previsualización.</div>';
    return;
  }
  const hours = endHour - startHour;
  const minPerDay = hours * 60;
  const totalMin = minPerDay * dias;
  const LABEL_W = 130, ROW_H = 34, HOUR_W = 78, DAY_GAP = 14;
  const dayW = hours * HOUR_W;
  const chartW = dayW * dias + DAY_GAP * (dias - 1);

  // (#T8.c) startMin → x px (con gap entre días)
  const xForMin = m => {
    const diaIdx = Math.min(dias - 1, Math.floor(m / minPerDay));
    const offMin = m - diaIdx * minPerDay;
    return diaIdx * (dayW + DAY_GAP) + (offMin / minPerDay) * dayW;
  };

  // Header de horas (con gap entre días)
  let hourColsHtml = '';
  for (let d = 0; d < dias; d++) {
    const dayLeft = d * (dayW + DAY_GAP);
    for (let h = 0; h <= hours; h++) {
      const x = dayLeft + h * HOUR_W;
      hourColsHtml += `<div style="position:absolute;left:${x}px;top:0;bottom:0;border-left:1px solid #e5e9ef">
        <span style="position:absolute;top:2px;left:3px;font-size:9px;color:#9aa3af">${startHour+h}:00</span>
      </div>`;
    }
    if (dias > 1) {
      hourColsHtml += `<div style="position:absolute;left:${dayLeft + 4}px;top:-15px;font-size:10px;font-weight:700;color:#475569">Día ${d+1}</div>`;
      if (d < dias - 1) {
        const sepX = dayLeft + dayW;
        hourColsHtml += `<div style="position:absolute;left:${sepX}px;top:0;bottom:0;width:${DAY_GAP}px;background:repeating-linear-gradient(45deg,#f1f5f9 0,#f1f5f9 4px,#fff 4px,#fff 8px)"></div>`;
      }
    }
  }

  const rows = operarios.map((op, oi) => {
    const bars = _ganttState.tasks
      .filter(t => (t.operario || 'Sin asignar') === op)
      .flatMap(t => {
        const sMin = Number(t.startMin) || 0;
        const dur = _ganttDuration(t);
        // (#T8.c) partir en segmentos si cruza el fin del día
        const segments = [];
        let cur = sMin, rem = dur;
        while (rem > 0) {
          const diaIdx = Math.floor(cur / minPerDay);
          if (diaIdx >= dias) break;
          const fin = (diaIdx + 1) * minPerDay;
          const len = Math.min(rem, fin - cur);
          segments.push({ start: cur, len });
          cur = fin; rem -= len;
        }
        const color = _ganttTipoColor(t.tipoIdx || 0);
        return segments.map((s, si) => {
          const left = xForMin(s.start);
          const right = xForMin(s.start + s.len);
          const w = Math.max(8, right - left);
          const label = si === 0 ? esc(t.label) : '↪';
          return `<div title="${esc(t.label)} · ${dur}min" style="position:absolute;left:${left}px;top:5px;width:${w}px;height:${ROW_H-10}px;background:${color};border-radius:4px;color:#fff;font-size:10px;padding:3px 5px;overflow:hidden;white-space:nowrap;box-sizing:border-box">${label}</div>`;
        });
      }).join('');
    return `
      <div style="display:flex;border-top:1px solid #eef1f5;${oi%2?'background:#f8fafc':''}">
        <div style="width:${LABEL_W}px;flex:0 0 auto;padding:8px 10px;font-size:12px;font-weight:600;border-right:1px solid #e5e9ef">${esc(op)}</div>
        <div style="position:relative;height:${ROW_H}px;width:${chartW}px">${bars}</div>
      </div>`;
  }).join('');

  mount.innerHTML = `
    <div style="display:inline-block;min-width:100%">
      <div style="display:flex;background:var(--surface-2)">
        <div style="width:${LABEL_W}px;flex:0 0 auto;padding:6px 10px;font-size:10px;font-weight:700;color:var(--tinta-3);border-right:1px solid #e5e9ef">OPERARIO</div>
        <div style="position:relative;height:${dias>1 ? 28 : 16}px;width:${chartW}px;padding-top:${dias>1 ? 12 : 0}px">${hourColsHtml}</div>
      </div>
      ${rows}
    </div>`;
}

function render() {

  document.querySelectorAll('#viewToggle [data-view]').forEach(b => b.classList.toggle('sel', b.dataset.view === state.view));

  // Helper para ocultar TODOS los wraps secundarios.

  const listWrap = $('listWrap');

  const PANES = ['paneOC','paneDTF','paneStock','paneMetrics','paneGantt'];
  const hideAll = () => {
    if (kanbanWrap) kanbanWrap.style.display = 'none';
    if (kanbanSb)   kanbanSb.style.display   = 'none';
    if (calWrap)    calWrap.style.display    = 'none';
    if (listWrap)   listWrap.style.display   = 'none';

  };

  // (#4) Vistas extra: OC, DTF, Stock, Métricas, Gantt
  if (state.view === 'oc')      { hideAll(); $('paneOC').style.display      = 'block'; renderOCPane();      return; }
  if (state.view === 'dtf')     { hideAll(); $('paneDTF').style.display     = 'block'; renderDTFPane();     return; }
  if (state.view === 'stock')   { hideAll(); $('paneStock').style.display   = 'block'; renderStockPane();   return; }
  if (state.view === 'metrics') { hideAll(); $('paneMetrics').style.display = 'block'; renderMetricsPane(); return; }
  if (state.view === 'gantt')   { hideAll(); $('paneGantt').style.display   = 'block'; renderGanttPane();   return; }

  if (state.view === 'calendar') {
    hideAll();

    return;
  }
  if (state.view === 'list') {
    hideAll();
    if (listWrap) listWrap.style.display = 'block';

  const ordered = stages.slice().sort((a, b) => {

    return ca === cb ? a.display_order - b.display_order : ca - cb;
  });

  const byStage = {};
  for (const s of ordered) byStage[s.key] = [];
  for (const c of filtered) {
    if (!byStage[c.stage_key]) byStage[c.stage_key] = [];

  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('sel', p.dataset.f === state.filter));

    <div class="col" data-stage="${esc(s.key)}">

        <span class="dot" style="background:${s.color}"></span>

  `).join('');

  // drag&drop
  if (state.canMove) {
    document.querySelectorAll('.card[draggable=true]').forEach(el => {
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragend', onDragEnd);
    });
    document.querySelectorAll('.col').forEach(col => {
      col.addEventListener('dragover', onDragOver);
      col.addEventListener('dragleave', onDragLeave);
      col.addEventListener('drop', onDrop);
    });
  }

  // click card → detail (pero solo si no se clickeó un quick-action)
  document.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', e => {
      if (el.classList.contains('dragging')) return;
      if (e.target.closest('[data-quick]')) return;
      openDetail(el.dataset.cardId);
    });
  });

  if (typeof window._refreshKanbanScrollbar === 'function') {
    requestAnimationFrame(window._refreshKanbanScrollbar);
  }

  wireQuickActions(document);

}

let _tooltipEl = null;

function _showCommentTooltip(cardId, anchor) {

function _hideCommentTooltipSoon() {

function _wireCommentTooltips(root) {

// (#16) Acciones rápidas (⚡ urgente / ✓ entregar) reutilizables: el kanban y la
// vista Lista las usan para marcar sin abrir la tarjeta.
function wireQuickActions(root) {
  root.querySelectorAll('[data-quick]').forEach(b => {

      const card = state.cards.find(c => c.id === id);
      if (!card) return;
      const action = b.dataset.quick;
      try {
        if (action === 'urgent') {
          const next = card.priority === 'urgente' ? 'normal' : 'urgente';
          await updateCardFields(card, { priority: next });
          card.priority = next;
          showOk(next === 'urgente' ? 'Marcada como urgente' : 'Urgente removido');
          render();
        } else if (action === 'deliver') {
          if (!confirm(`Marcar "${card.client_name || card.id}" como ENTREGADA?\nEsto la mueve a la columna Entregado y dispara la creación del borrador de factura en Odoo.`)) return;
          const updated = await setCardStateFields(card, { estado_stock: 'Entregado' });
          Object.assign(card, updated);
          const moveMsg = updated._invoiceResult?.moveId
            ? ` · Borrador de factura #${updated._invoiceResult.moveId}`
            : '';
          showOk('Entregada' + moveMsg);
          render();
        }
      } catch (err) {
        showError(err.message);
      }
    });

async function openDetail(id) {
  // CRÍTICO: si venía otra tarjeta abierta con cambios debounced, flushearlos
  // ANTES de cambiar selectedCard/editBuffer — sino el save pendiente leería
  // el editBuffer de la tarjeta nueva y corrompería datos.
  if (state.selectedCardId && state.selectedCardId !== id) {
    try { await flushPendingCardSaves(); } catch (e) { console.warn('[openDetail] flush:', e?.message); }
  }
  state.selectedCardId = id;
  try {
    state.selectedCard = await loadCard(id);
    state.selectedStories = await loadStories(id);
  } catch (e) {
    showError(e.message);
    return;
  }
  // (#4) El modal SIEMPRE está en modo edición con autoguardado: no hay botón
  // "Editar campos" ni "Guardar cambios". editBuffer es la copia de trabajo.
  state.editing = true;
  state.editBuffer = { ...state.selectedCard, product_lines: JSON.parse(JSON.stringify(state.selectedCard.product_lines || [])) };
  renderModal();
  if (typeof buildCatalogDatalist === 'function') buildCatalogDatalist();
}

// (#4) Debounce util + indicador "Guardado ✓".
// (#2) Integra con saveGuard universal: emite markPending/markDone para que el
// beforeunload pueda bloquear navegación y disparar flush si hay un push
// debounced sin enviar.
//
// CRÍTICO (fix pérdida de datos): `flushPendingCardSaves()` se llama al cerrar
// el modal y al cambiar de tarjeta — así ningún cambio queda atrapado en el
// debounce de 600ms. Antes, cerrar el modal antes de que el timer disparara
// perdía la edición.
const _autosaveTimers = {};
const _pendingFlushes = {};  // key → { fn, gk }
function _debouncedSave(key, fn, ms = 600) {
  const gk = 'prodcard:' + key;
  if (_autosaveTimers[key]) clearTimeout(_autosaveTimers[key]);
  // markPending apenas el usuario tipeó: aunque todavía no salió el request,
  // hay un cambio sin guardar y queremos que el guard bloquee navegación.
  saveGuard.markPending(gk);
  _pendingFlushes[key] = { fn, gk };
  _autosaveTimers[key] = setTimeout(() => { _runCardFlush(key); }, ms);
}
// Ejecuta YA el save pendiente de `key` (cancela su timer). Idempotente.
async function _runCardFlush(key) {
  const entry = _pendingFlushes[key];
  if (!entry) return;
  if (_autosaveTimers[key]) { clearTimeout(_autosaveTimers[key]); _autosaveTimers[key] = null; }
  delete _pendingFlushes[key];
  try {
    await entry.fn();
    saveGuard.markDone(entry.gk);
  } catch (e) {
    saveGuard.markError(entry.gk, e);
    console.warn('[flush]', key, e?.message);
  }
}
// Flushea TODOS los saves pendientes de tarjeta y espera a que terminen.
// Lo usan: el beforeunload del saveGuard, closeDetail y openDetail.
async function flushPendingCardSaves() {
  for (const k of Object.keys(_pendingFlushes)) {
    await _runCardFlush(k);
  }
}
saveGuard.registerFlush('production-card', flushPendingCardSaves);
function _setSaveStatus(txt, kind) {
  const el = $('saveStatus');
  // (#4) Banner prominente arriba del modal cuando hay error. Muchos usuarios
  // perdían datos sin notar el pill chiquito porque desaparecía rápido.
  const banner = $('saveBanner');
  if (banner) {
    if (kind === 'err' && txt) {
      banner.style.display = 'block';
      banner.innerHTML = `<div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">⚠</span>
        <div style="flex:1">
          <div style="font-weight:700;margin-bottom:2px">No se pudo guardar el cambio</div>
          <div style="font-weight:500;font-size:12px;color:#791F1F">${esc(txt)}</div>
          <div style="font-weight:500;font-size:11px;color:#A04A4A;margin-top:4px">Tus cambios siguen en el formulario. Probá tocar "Guardar ahora" para reintentar o reportá esto al equipo.</div>
        </div>
        <button type="button" onclick="document.getElementById('saveBanner').style.display='none'" style="background:transparent;border:none;color:#791F1F;font-size:18px;cursor:pointer;padding:0 4px">×</button>
      </div>`;
    } else if (kind === 'done' || kind === 'saving' || !kind) {
      // Limpiar banner cuando vuelve a guardar bien o se resetea.
      banner.style.display = 'none';
      banner.innerHTML = '';
    }
  }
  if (!el) return;
  if (!kind) { el.textContent = ''; el.className = ''; return; }
  const cls = kind === 'saving' ? 'saving-pill'
            : kind === 'err'    ? 'save-error-pill'
            : 'saved-pill';
  el.className = cls;
  el.textContent = txt;
}
// Persiste un set de campos "comunes" (no estado_*) sin re-render (mantiene foco).
async function _autosaveFields(fields) {
  const c = state.selectedCard;
  if (!c || !Object.keys(fields).length) return;
  const guardKey = 'production-card:fields';
  // (#8) Log explícito antes de ejecutar el update para vendor — facilita
  // debug de "Lucía/Manuel no pueden cambiar vendor". Mostrar quién, en qué
  // tarjeta, de qué a qué.
  if ('vendor' in fields) {
    console.info('[vendor-debug] cambiando vendor en card', c.id, 'de', c.vendor, '→', fields.vendor);
  }
  try {
    saveGuard.markPending(guardKey);
    _setSaveStatus('Guardando…', 'saving');
    await updateCardFields(c, fields);
    Object.assign(c, fields);
    const idx = state.cards.findIndex(x => x.id === c.id);
    if (idx >= 0) Object.assign(state.cards[idx], fields);
    saveGuard.markDone(guardKey);
    _setSaveStatus('Guardado ✓', 'done');
    // Limpiar el pill tras 2.5s, igual que el patrón de index.html.
    setTimeout(() => _setSaveStatus('', null), 2500);
    render();  // refleja el cambio en el tablero detrás (no toca el modal)
  } catch (e) {
    // (#8) Mejor logging para diagnosticar fallas de RLS o columnas inexistentes:
    // imprime code/hint/details que Supabase devuelve. Antes se perdían.
    console.error('[autosave] update falló:', {
      code: e?.code, message: e?.message, details: e?.details, hint: e?.hint,
      fields: Object.keys(fields), cardId: c.id,
    });
    saveGuard.markError(guardKey, e);
    const detail = e?.message || 'desconocido';
    _setSaveStatus('⚠ error al guardar: ' + detail, 'err');
    if (typeof showError === 'function') showError('No se pudo guardar: ' + detail);
  }
}
// (#T4) Pinta una miniatura de producto del catálogo en una línea de tarjeta.
// La URL puede ser remota (proveedor) — el navegador la carga directo, no se
// pasa por img-proxy porque es un thumb pequeño en HTML.
function _paintLineThumb(i, producto, color) {
  const edit = document.querySelector(`[data-thumb-li="${i}"]`);
  const view = document.querySelector(`[data-thumb-view-li="${i}"]`);
  const url = productThumb(producto, color);
  for (const el of [edit, view]) {

}
function _paintAllLineThumbs() {
  // Modo edición
  (state.editBuffer?.product_lines || []).forEach((l, i) => _paintLineThumb(i, l.producto, l.color));
  // Modo lectura (cuando no hay editBuffer pero hay product_lines)

// (#T2) Abrir un adjunto en pestaña nueva, robusto.
// Si la URL es data:..., la convertimos a Blob URL (Chrome bloquea data: URLs
// grandes con target=_blank). Si es http(s)/blob, abrimos directo con
// window.open(..., 'noopener,noreferrer') que evita problemas de popup blocker.
function _openAttachment(att) {
  try {
    const url = att.url || '';
    if (!url) { showError('Adjunto sin URL'); return; }
    console.info('[att-click]', att.name || '(sin nombre)', url.slice(0, 60) + (url.length > 60 ? '…' : ''));
    let openUrl = url;
    if (url.startsWith('data:')) {
      // data:<mime>;base64,<payload>  →  Blob URL
      const m = url.match(/^data:([^;,]+);base64,(.*)$/);
      if (m) {
        const mime = m[1];
        const bin = atob(m[2]);
        const len = bin.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
        openUrl = URL.createObjectURL(new Blob([bytes], { type: mime }));
        // Revocar después de 60s para liberar memoria
        setTimeout(() => URL.revokeObjectURL(openUrl), 60000);
      }
    } else if (!/^(https?|blob):/i.test(url)) {
      showError('Esquema de URL no soportado: ' + url.slice(0, 30));
      return;
    }
    const w = window.open(openUrl, '_blank', 'noopener,noreferrer');
    if (!w) showError('El navegador bloqueó la pestaña. Desactivá el bloqueador de pop-ups para este sitio.');
  } catch (e) {
    console.error('[att-open] falló:', e);
    showError('No se pudo abrir el adjunto: ' + e.message);
  }
}

async function closeDetail() {
  // CRÍTICO: flushear cualquier autosave debounced ANTES de descartar el
  // editBuffer. Si no, cerrar el modal rápido tras editar pierde el cambio.
  // Las líneas a medio cargar (sin producto aún) YA se guardan — no se descartan.
  const mount = $('modal-mount');
  if (mount) mount.style.pointerEvents = 'none';   // bloquear más edición durante el flush
  try { await flushPendingCardSaves(); }
  catch (e) { console.warn('[closeDetail] flush falló:', e?.message); }
  state.selectedCardId = null;
  state.selectedCard = null;
  state.selectedStories = [];
  state.editing = false;
  state.editBuffer = null;
  if (mount) { mount.innerHTML = ''; mount.style.pointerEvents = ''; }
  document.removeEventListener('keydown', _onModalEsc);
}
// (#3) Escape cierra el modal de detalle; cualquier otro click no.
function _onModalEsc(e) {
  if (e.key === 'Escape' && state.selectedCardId) closeDetail();
}

function buildStateOptions(grouped, current) {
  const opt = (v) => `<option value="${esc(v)}" ${v === current ? 'selected' : ''}>${esc(v)}</option>`;
  return `<option value="" ${!current ? 'selected' : ''}>—</option>` +
    grouped.map(g => `<optgroup label="${esc(g.group)}">${g.items.map(opt).join('')}</optgroup>`).join('');
}

      ${c.odoo_sale_order_id ? row('Odoo Sale', `#${c.odoo_sale_order_id}${c.invoice_mode ? ` <span style="font-size:10px;color:var(--tinta-3);margin-left:4px">(${esc(c.invoice_mode)})</span>` : ''}`) : ''}

function renderEditGrid(c) {
  const buf = state.editBuffer;
  return `
    <div class="edit-grid">
      ${EDITABLE_FIELDS.map(f => {
        const val = buf[f.key];
        const valStr = (val == null ? '' : val);
        const wide = f.wide ? ' wide' : '';
        let input;
        if (f.type === 'select') {
          // (#T3) Soporte para optionLabels: { value: 'Texto visible' }
          const lbl = f.optionLabels || {};
          input = `<select data-edit="${f.key}">${f.options.map(o => {
            const txt = (o in lbl) ? lbl[o] : (o ? o : '—');
            return `<option value="${esc(o)}" ${o === valStr ? 'selected' : ''}>${esc(txt)}</option>`;
          }).join('')}</select>`;
        } else if (f.type === 'select_dynamic') {
          const dyn = state[f.optionsKey] || [];
          // Si el valor actual no está en la lista activa, lo agregamos al inicio para no perderlo
          const opts = (valStr && !dyn.includes(valStr)) ? [valStr, ...dyn] : dyn;
          input = `<select data-edit="${f.key}">
            <option value="" ${!valStr ? 'selected' : ''}>—</option>
            ${opts.map(o => `<option value="${esc(o)}" ${o === valStr ? 'selected' : ''}>${esc(o)}</option>`).join('')}
          </select>`;
        } else if (f.type === 'select_grouped') {
          input = `<select data-edit="${f.key}">
            <option value="" ${!valStr ? 'selected' : ''}>—</option>
            ${f.groups.map(g => `<optgroup label="${esc(g.group)}">${g.items.map(it => `<option value="${esc(it)}" ${it === valStr ? 'selected' : ''}>${esc(it)}</option>`).join('')}</optgroup>`).join('')}
          </select>`;
        } else if (f.type === 'textarea') {
          input = `<textarea data-edit="${f.key}">${esc(valStr)}</textarea>`;
        } else {
          const step = f.type === 'number' ? ' step="0.01"' : '';
          input = `<input type="${f.type}"${step} data-edit="${f.key}" value="${esc(valStr)}" />`;
        }
        return `<div class="fg${wide}"><label>${f.label}</label>${input}</div>`;
      }).join('')}
    </div>
  `;
}

  // (#3) El modal de detalle ya NO se cierra al tocar el fondo. Antes

  $('modalBg').onclick = null;
  $('btnCloseModal').onclick = closeDetail;
  document.removeEventListener('keydown', _onModalEsc);
  document.addEventListener('keydown', _onModalEsc);

  // (#15) Botón "Crear OV en Odoo" — solo si la tarjeta aún no tiene odoo_sale_order_id ni invoice_mode='sin_factura'.
  const btnOV = $('btnCreateOV');
  if (btnOV) btnOV.onclick = () => openCreateOVModal(c);

  // Botón "Crear factura" — atajo directo: crea OV (si falta) + factura
  // CONFIRMADA en Odoo, con IVA 22% + cuenta 4101 + fecha = card.created_at.
  // Idempotente por ref=card.id.
  const btnInv = $('btnCreateInvoice');
  if (btnInv) btnInv.onclick = async () => {
    const lines = (c.product_lines || []);
    if (!lines.length) { showError('La tarjeta no tiene líneas de producto'); return; }
    const subtotal = lines.reduce((a, l) => a + (Number(l.cantidad) || 0) * (Number(l.precio) || 0), 0);
    const conIva = Math.round(subtotal * 1.22);
    if (!confirm(`Crear factura para "${c.client_name || c.id}"\n\n${lines.length} línea${lines.length === 1 ? '' : 's'} · subtotal $${Math.round(subtotal).toLocaleString('es-UY')}\nIVA 22% se agrega aparte → total ~ $${conIva.toLocaleString('es-UY')}\n\nLa factura se crea CONFIRMADA en Odoo (state=posted).\nFecha factura: ${(c.created_at || '').slice(0, 10) || 'hoy'}`)) return;
    try {
      btnInv.disabled = true;
      btnInv.textContent = 'Creando…';

      state.selectedCard = fresh;
      const i = state.cards.findIndex(x => x.id === c.id);
      if (i >= 0) state.cards[i] = fresh;
      renderModal();
      render();
    } catch (e) {
      console.error('[createInvoiceForCard]', e);
      showError('No se pudo crear la factura: ' + e.message);
      btnInv.disabled = false;
      btnInv.textContent = 'Crear factura';
    }
  };
  const btnOpenInv = $('btnOpenInvoice');
  if (btnOpenInv) btnOpenInv.onclick = () => {
    const moveId = btnOpenInv.dataset.moveId;
    const base = (window._ODOO_URL || '').replace(/\/+$/, '');
    if (!base) { showError('Falta ODOO_URL configurado. Abrí Odoo manualmente y buscá account.move id ' + moveId); return; }
    const url = `${base}/odoo/action-account.action_move_out_invoice_type/${moveId}`;
    window.open(url, '_blank', 'noopener,noreferrer');
  };

  async function onStateChange(field, value) {
    try {
      const updated = await setCardStateFields(c, { [field]: value });
      state.selectedCard = updated;
      const idx = state.cards.findIndex(x => x.id === c.id);
      if (idx >= 0) Object.assign(state.cards[idx], updated);
      state.selectedStories = await loadStories(c.id);
      renderModal();
      render();
      const moved = updated.stage_key !== c.stage_key;
      showOk(moved
        ? `Estado actualizado · Movida automáticamente a ${state.stages.find(s => s.key === updated.stage_key)?.label || updated.stage_key}`
        : 'Estado actualizado');
    } catch (e) { showError(e.message); }
  }
  $('selStock').onchange  = e => onStateChange('estado_stock',  e.target.value);
  $('selInsumo').onchange = e => onStateChange('estado_insumo', e.target.value);

  // Upload de archivos / mockups
  const btnAddFile = $('btnAddFile');
  const fileInputModal = $('fileInputModal');
  if (btnAddFile && fileInputModal) {
    btnAddFile.onclick = () => fileInputModal.click();
    fileInputModal.onchange = async () => {
      const files = Array.from(fileInputModal.files);
      fileInputModal.value = '';
      if (!files.length) return;
      btnAddFile.textContent = 'Subiendo…';
      btnAddFile.disabled = true;
      try {
        const newAttachments = [...(c.attachments || [])];
        for (const file of files) {
          const dataUrl = await new Promise((res, rej) => {
            const fr = new FileReader();
            fr.onload = () => res(fr.result);
            fr.onerror = rej;
            fr.readAsDataURL(file);
          });
          newAttachments.push({
            kind: file.type.startsWith('image/') ? 'photo' : 'file',
            url: dataUrl, name: file.name, mime: file.type,
          });
        }
        await updateCardFields(c, { attachments: newAttachments });
        c.attachments = newAttachments;
        const idx = state.cards.findIndex(x => x.id === c.id);
        if (idx >= 0) state.cards[idx].attachments = newAttachments;
        renderModal();
        showOk(`${files.length} archivo(s) agregado(s)`);
      } catch (err) { showError(err.message); btnAddFile.textContent = '+ Agregar'; btnAddFile.disabled = false; }
    };
  }

  // (#T2) Cablear apertura de adjuntos vía Blob URL (Chrome bloquea data: URLs
  // grandes en target="_blank") + botón × para eliminar.
  document.querySelectorAll('[data-att-open]').forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      const idx = Number(a.dataset.attOpen);
      const att = (c.attachments || [])[idx];
      if (!att || !att.url) { showError('Adjunto sin URL'); return; }
      _openAttachment(att);
    };
  });
  document.querySelectorAll('[data-att-rm]').forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault(); e.stopPropagation();
      const idx = Number(btn.dataset.attRm);
      const att = (c.attachments || [])[idx];
      if (!att) return;
      if (!confirm(`¿Eliminar el adjunto "${att.name || 'archivo'}"? Esto no se puede deshacer.`)) return;
      try {
        const newAttachments = c.attachments.filter((_, j) => j !== idx);
        await updateCardFields(c, { attachments: newAttachments });
        c.attachments = newAttachments;
        const i = state.cards.findIndex(x => x.id === c.id);
        if (i >= 0) state.cards[i].attachments = newAttachments;
        renderModal();
        showOk('Adjunto eliminado');
      } catch (err) { showError('No se pudo eliminar: ' + err.message); }
    };
  });

  const btnSheet = $('btnSheet');
  if (btnSheet) btnSheet.onclick = () => openSheetModal(c);

  // (#4) Autoguardado por campo (debounced). Sin botones Guardar/Cancelar
  // pero CON botones "Guardar ahora" / "Guardar líneas" para forzar flush.
  {
    // product_lines: persiste el buffer (filtra líneas sin producto).
    // El filtro causaba pérdida de datos silenciosa: si una línea tenía
    // cantidad+precio pero todavía no producto, se descartaba al guardar.
    // Ahora logueamos las descartadas y marcamos las filas en ámbar.
    const _autosaveLines = () => {
      const allBuf = state.editBuffer.product_lines || [];
      // (FIX) Guardar TODA línea con algún dato — antes se filtraba por
      // `l.producto` y se perdían líneas a medio escribir (bug "puse guardar y
      // la línea quedó entrecortada / no se guardó"). Solo se descartan las
      // líneas completamente vacías (la fila en blanco de "+ Agregar línea").
      const isEmpty = l => !l.producto && !l.color && !l.talle
        && (l.cantidad == null || l.cantidad === '') && (l.precio == null || l.precio === '');
      const bufLines = allBuf.filter(l => !isEmpty(l));
      const origSer = JSON.stringify((c.product_lines && c.product_lines.length) ? c.product_lines : []);
      const bufSer  = JSON.stringify(bufLines);
      if (bufSer === origSer) return;
      const conProducto = bufLines.filter(l => l.producto);
      if (conProducto.length) trackProdUsage(conProducto);
      // return → la promesa se propaga y _forceFlush / flush la pueden esperar.
      return _autosaveFields({ product_lines: bufLines.length ? bufLines : null });
    };

    document.querySelectorAll('[data-edit]').forEach(inp => {
      const key = inp.dataset.edit;
      const ftype = EDITABLE_FIELDS.find(f => f.key === key)?.type;
      const handler = e => {
        let v = e.target.value;
        if (ftype === 'number') v = v === '' ? null : Number(v);
        v = v === '' ? null : v;
        state.editBuffer[key] = v;
        // estado_stock / estado_insumo aplican reglas de stage → camino especial.
        if (key === 'estado_stock' || key === 'estado_insumo') {
          _debouncedSave('edit_' + key, () => onStateChange(key, e.target.value), 300);
          return;
        }
        _debouncedSave('edit_' + key, () => _autosaveFields({ [key]: v }));
      };
      inp.oninput = handler;
      inp.onchange = handler;  // selects/date/month disparan change
    });

    // Editor de líneas de productos — autosave debounced.
    document.querySelectorAll('[data-lf]').forEach(inp => {
      const handler = () => {
        const i = +inp.dataset.li, f = inp.dataset.lf;
        const lines = state.editBuffer.product_lines;
        if (!Array.isArray(lines) || !lines[i]) return;
        const v = inp.value;
        lines[i][f] = (f === 'cantidad' || f === 'precio') ? (v === '' ? null : Number(v)) : (v || null);
        // (#T4) Refrescar thumb si cambió producto o color
        if (f === 'producto' || f === 'color') _paintLineThumb(i, lines[i].producto, lines[i].color);
        _debouncedSave('product_lines', _autosaveLines);
      };
      inp.oninput = handler;
      inp.onchange = handler;
    });
    // (#T4) Pintar thumbs iniciales (modo edición y modo lectura)
    _paintAllLineThumbs();
    document.querySelectorAll('[data-lrm]').forEach(btn => {
      btn.onclick = () => {
        const i = +btn.dataset.lrm;
        state.editBuffer.product_lines = (state.editBuffer.product_lines || []).filter((_, j) => j !== i);
        _autosaveLines();
        renderModal();
      };
    });
    const btnAddLn = $('btnAddLn');
    if (btnAddLn) btnAddLn.onclick = () => {
      if (!Array.isArray(state.editBuffer.product_lines)) state.editBuffer.product_lines = [];
      state.editBuffer.product_lines.push({ producto: '', color: null, talle: null, cantidad: null, precio: null });
      renderModal();  // línea vacía: no persiste hasta tener producto
    };

    // (#6) Botón 🛒 por línea → abre catalog-picker con miniaturas. Al elegir,
    // completa producto + precio (si la línea no tenía uno propio) y dispara el
    // autosave normal. Si elegimos otro producto, el precio NO se sobreescribe
    // para no pisar ediciones manuales.
    document.querySelectorAll('[data-li-pickcat]').forEach(btn => {
      btn.onclick = async () => {
        const i = +btn.dataset.liPickcat;
        const { openCatalogPicker } = await import('./js/catalog-picker.js');
        openCatalogPicker({
          initialQuery: state.editBuffer?.product_lines?.[i]?.producto || '',
          onPick: ({ n, c }) => {
            if (!Array.isArray(state.editBuffer.product_lines)) state.editBuffer.product_lines = [];
            const line = state.editBuffer.product_lines[i] || (state.editBuffer.product_lines[i] = { producto: '', color: null, talle: null, cantidad: null, precio: null });
            line.producto = n;
            if (c > 0 && (line.precio == null || line.precio === '')) line.precio = c;
            renderModal();
            // Fire autosave del set actualizado (sin esperar el debounce).
            _autosaveLines();
          },
        });
      };
    });

    // (#4 / FIX) "Guardar líneas" / "Guardar ahora": fuerza flush de todo lo
    // pendiente y ESPERA a que el write termine antes de avisar "guardado".
    // Antes _autosaveLines() era fire-and-forget → el botón decía "guardado"
    // con el request todavía en vuelo y, si te ibas, se cortaba.
    const _forceFlush = async (label) => {
      _setSaveStatus('Guardando…', 'saving');
      try {
        await _autosaveLines();           // guarda las líneas (incl. a medio cargar) y espera
        await flushPendingCardSaves();    // resto de campos con debounce pendiente
        showOk(label + ': guardado');
        _setSaveStatus('Guardado ✓', 'done');
        setTimeout(() => _setSaveStatus('', null), 2500);
      } catch (e) {
        _setSaveStatus('⚠ error al guardar', 'err');
        showError('No se pudo guardar: ' + (e?.message || e));
      }
    };
    const btnSaveLines = $('btnSaveLines');
    if (btnSaveLines) btnSaveLines.onclick = () => _forceFlush('Líneas');
    const btnSaveNow = $('btnSaveNow');
    if (btnSaveNow) btnSaveNow.onclick = () => _forceFlush('Cambios');

    // Client picker — autocomplete Odoo + creación inline. Autosave inmediato.
    const cliInput = document.querySelector('[data-edit="client_name"]');
    if (cliInput) {
      import('./js/client-picker.js').then(({ mountClientPicker }) => {
        mountClientPicker(cliInput, {
          kind: 'customer',
          initialPartnerId: c.odoo_partner_id || null,
          initialName: c.client_name || '',
          onSelect: (sel) => {
            state.editBuffer.client_name = sel.name || '';
            state.editBuffer.odoo_partner_id = sel.partnerId || null;
            const patch = { client_name: sel.name || '', odoo_partner_id: sel.partnerId || null };
            if (sel.phone) {
              state.editBuffer.client_phone_e164 = sel.phone;
              const telInput = document.querySelector('[data-edit="client_phone_e164"]');
              if (telInput) telInput.value = sel.phone;
              patch.client_phone_e164 = sel.phone;
            }
            _autosaveFields(patch);
          },
        });
      }).catch(e => console.warn('[client-picker] no disponible:', e.message));
    }
  }

  document.querySelectorAll('#stageSelect button').forEach(b => {
    b.onclick = async () => {
      if (b.disabled) return;
      const newStage = b.dataset.stg;
      if (newStage === c.stage_key) return;
      try {
        withLoading(b, true);
        const updated = await moveCardToStage(c, newStage);
        state.selectedCard = updated;
        const idx = state.cards.findIndex(x => x.id === c.id);
        if (idx >= 0) Object.assign(state.cards[idx], updated);
        state.selectedStories = await loadStories(c.id);
        renderModal();
        render();
        if (updated._invoiceResult?.moveId) {
          showOk(`Movida · Borrador de factura #${updated._invoiceResult.moveId} creado en Odoo`);
        } else {
          showOk('Movida');
        }
      } catch (e) {
        showError(e.message);
      } finally {
        withLoading(b, false);
      }
    };
  });

  // (#T7) Comentarios: enviar + auto-marcar como leídos
  const commentInput = $('commentInput');
  const btnAddComment = $('btnAddComment');
  const _sendComment = async () => {
    const txt = commentInput.value.trim();
    if (!txt) return;
    try {
      btnAddComment.disabled = true;
      commentInput.disabled = true;
      await addComment(c.id, txt);
      commentInput.value = '';
      // Refresh stories en el modal
      state.selectedStories = await loadStories(c.id);
      // Refresh contadores globales (el badge del kanban actualiza)
      try { state.unreadComments = await loadUnreadCommentCounts(state.cards.map(x => x.id)); } catch {}
      renderModal();
      render();
    } catch (e) { showError('No se pudo enviar el comentario: ' + e.message); }
    finally { btnAddComment.disabled = false; commentInput.disabled = false; }
  };
  if (btnAddComment) btnAddComment.onclick = _sendComment;
  if (commentInput) commentInput.onkeydown = (e) => { if (e.key === 'Enter') _sendComment(); };
  // Marcar como leídos todos los comments visibles ahora — el badge del kanban
  // se actualiza solo al próximo load(), pero el state local refleja ya.
  const commentIdsHere = (state.selectedStories || [])
    .filter(s => s.type === 'comment')
    .map(s => s.id);
  if (commentIdsHere.length) {
    markCommentsRead(commentIdsHere)
      .then(() => loadUnreadCommentCounts(state.cards.map(x => x.id)))
      .then(counts => { state.unreadComments = counts; render(); })
      .catch(e => console.warn('[markCommentsRead]', e?.message));
  }

  // (#T1) Duplicar / crear reposición
  const btnDup = $('btnDuplicateCard');
  const btnRep = $('btnReposeCard');
  const _doDuplicate = async (reposicion) => {
    const verbo = reposicion ? 'crear reposición de' : 'duplicar';
    if (!confirm(`¿${verbo[0].toUpperCase() + verbo.slice(1)} "${c.client_name || c.id}"?\n\nSe crea una nueva tarea en Borrador con los mismos datos${reposicion ? ' pero TODOS los precios en $0' : ''}.\nLos adjuntos no se copian.`)) return;
    try {
      const newId = await duplicateCard(c, { reposicion });
      await closeDetail();
      await load();
      await openDetail(newId);
      showOk(reposicion ? 'Reposición creada' : 'Tarea duplicada');
    } catch (err) {
      showError('No se pudo ' + verbo + ': ' + err.message);
    }
  };
  if (btnDup) btnDup.onclick = () => _doDuplicate(false);
  if (btnRep) btnRep.onclick = () => _doDuplicate(true);

  // Archivar / desarchivar
  const btnArch = $('btnArchiveCard');
  if (btnArch) btnArch.onclick = async () => {
    const archiving = !c.archived_at;
    try {
      withLoading(btnArch, true);
      const updated = await setCardArchived(c, archiving);
      // La tarjeta archivada sale de la vista activa (y al revés).
      state.cards = state.cards.filter(x => x.id !== c.id);
      closeDetail();
      render();
      showOk(archiving ? 'Tarea archivada' : 'Tarea desarchivada');
    } catch (err) {
      showError('No se pudo ' + (archiving ? 'archivar' : 'desarchivar') + ': ' + err.message);
      withLoading(btnArch, false);
    }
  };

  // Eliminar tarea (admin solamente)
  const btnDel = $('btnDeleteCard');
  if (btnDel) btnDel.onclick = async () => {
    const confirm1 = confirm(`¿Eliminar la tarea de "${c.client_name || c.id}"?\n\nEsto la borra permanentemente de De Cirene. Si ya hay un sale.order en Odoo, queda allá (lo cancelás manualmente).`);
    if (!confirm1) return;
    const confirm2 = prompt(`Para confirmar, escribí ELIMINAR (en mayúsculas):`);
    if (confirm2 !== 'ELIMINAR') { showError('Cancelado — no escribiste ELIMINAR'); return; }
    try {
      withLoading(btnDel, true);
      await deleteCard(c);
      state.cards = state.cards.filter(x => x.id !== c.id);
      closeDetail();
      render();
      showOk('Tarea eliminada');
    } catch (err) {
      showError('No se pudo eliminar: ' + err.message);
      withLoading(btnDel, false);
    }
  };
}

// ── (#3) Modal de reglas de stage ───────────────────────────────────────
function openStageRulesModal() {
  // Asegurar cache cargada antes de listar
  loadStageRules({ force: true }).finally(() => _renderStageRulesModal());
  _renderStageRulesModal();
}
function _renderStageRulesModal(editId = null, simIn = null) {
  const rules = (listStageRules() || []).slice().sort((a, b) => (a.priority ?? 999) - (b.priority ?? 999));
  const stages = state.stages || [];
  const stageOpts = `<option value="">— no mover —</option>` +
    stages.map(s => `<option value="${esc(s.key)}">${esc(s.label)}</option>`).join('');
  const editing = editId != null ? rules.find(r => r.id === editId) || rules.find(r => r._tmpId === editId) : null;
  const simulation = simIn ? computeTargetStage({ estado_stock: simIn.stock, estado_insumo: simIn.insumo }) : null;
  const simStage = simulation ? (stages.find(s => s.key === simulation)?.label || simulation) : '— no mueve —';

  const rowsHtml = rules.map(r => {
    const target = stages.find(s => s.key === r.target_stage_key);
    return `
      <tr data-rule-id="${esc(r.id || '')}">
        <td>${r.priority ?? 999}</td>
        <td><code>${esc(r.estado_stock_pattern || '*')}</code></td>
        <td><code>${esc(r.estado_insumo_pattern || '*')}</code></td>
        <td>${target ? esc(target.label) : (r.target_stage_key ? esc(r.target_stage_key) : '<i>(no mover)</i>')}</td>
        <td style="font-size:11px;color:var(--tinta-3)">${esc(r.description || '')}</td>
        <td>${r.enabled === false ? '⛔' : '✓'}</td>
        <td style="white-space:nowrap">
          <button data-rule-edit="${esc(r.id || '')}" style="font-size:11px;padding:3px 8px;cursor:pointer">Editar</button>
          ${r.id ? `<button data-rule-del="${esc(r.id)}" style="font-size:11px;padding:3px 8px;cursor:pointer;color:#c00;margin-left:4px">Eliminar</button>` : '<span style="font-size:10px;color:var(--tinta-3);margin-left:4px">(fallback)</span>'}
        </td>
      </tr>`;
  }).join('');

  const editorHtml = editing ? `
    <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px">
      <h4 style="margin:0 0 8px">${editing.id ? 'Editar' : 'Nueva'} regla</h4>
      <div style="display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;font-size:12px">
        <label>Prioridad</label>
        <input id="ruleEdit_priority" type="number" value="${editing.priority ?? ''}" style="grid-column:span 2"/>
        <label>Stock pattern</label>
        <input id="ruleEdit_stock" type="text" value="${esc(editing.estado_stock_pattern || '')}" placeholder="vacío = wildcard; ^prefijo = regex"/>
        <input id="ruleEdit_insumo" type="text" value="${esc(editing.estado_insumo_pattern || '')}" placeholder="(estado_insumo) vacío = wildcard"/>
        <label>Destino</label>
        <select id="ruleEdit_target" style="grid-column:span 2">${stageOpts.replace(`value="${esc(editing.target_stage_key || '')}"`, `value="${esc(editing.target_stage_key || '')}" selected`)}</select>
        <label>Descripción</label>
        <input id="ruleEdit_desc" type="text" value="${esc(editing.description || '')}" style="grid-column:span 2"/>
        <label>Activa</label>
        <label style="grid-column:span 2"><input id="ruleEdit_enabled" type="checkbox" ${editing.enabled === false ? '' : 'checked'}/> sí</label>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px">
        <button id="ruleEdit_save" class="btn-primary" style="background:var(--azul);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer">Guardar</button>
        <button id="ruleEdit_cancel" style="padding:6px 14px;border-radius:6px;cursor:pointer">Cancelar</button>
      </div>
    </div>
  ` : '';

  const simHtml = `
    <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:10px">
      <h4 style="margin:0 0 6px;font-size:13px">Simular</h4>
      <div style="display:flex;gap:6px;align-items:center;font-size:12px;flex-wrap:wrap">
        <label>estado_stock <select id="simStock">${buildStateOptions(STOCK_STATES_GROUPED, simIn?.stock || '')}</select></label>
        <label>estado_insumo <select id="simInsumo">${buildStateOptions(INSUMO_STATES_GROUPED, simIn?.insumo || '')}</select></label>
        <button id="simRun" style="padding:4px 12px;cursor:pointer">Probar</button>
        ${simIn ? `<span style="margin-left:8px;background:#eef;color:#005;padding:3px 8px;border-radius:99px;font-weight:600">→ ${esc(simStage)}</span>` : ''}
      </div>
    </div>`;

  $('bigmodal-mount').innerHTML = `
    <div class="modal-bg" id="rulesModalBg" style="background:rgba(0,0,0,.5);position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:flex-start;justify-content:center;padding:24px;z-index:1000;overflow:auto">
      <div class="modal" id="rulesModalBox" style="background:#fff;border-radius:12px;padding:18px 22px;max-width:1100px;width:100%;max-height:90vh;overflow:auto" onclick="event.stopPropagation()">
        <button class="modal-close" id="btnRulesClose" style="float:right;background:none;border:none;font-size:20px;cursor:pointer">×</button>
        <h2 style="margin:0 0 4px">Reglas de stage</h2>
        <p style="font-size:12px;color:var(--tinta-3);margin:0 0 12px">Se evalúan en orden ascendente de prioridad. Patterns vacíos son wildcard; los que empiezan con <code>^</code> son regex.</p>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr style="background:var(--surface-2)">
              <th style="text-align:left;padding:6px">Prio</th>
              <th style="text-align:left;padding:6px">Stock</th>
              <th style="text-align:left;padding:6px">Insumo</th>
              <th style="text-align:left;padding:6px">→ Destino</th>
              <th style="text-align:left;padding:6px">Descripción</th>
              <th style="text-align:left;padding:6px">On</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        <div style="margin-top:10px">
          <button id="btnRuleAdd" style="background:var(--surface-2);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer">+ Nueva regla</button>
        </div>
        ${editorHtml}
        ${simHtml}
      </div>
    </div>`;

  $('btnRulesClose').onclick = () => { $('bigmodal-mount').innerHTML = ''; };
  $('rulesModalBg').onclick = (e) => { if (e.target.id === 'rulesModalBg') $('bigmodal-mount').innerHTML = ''; };
  $('btnRuleAdd').onclick = () => {
    // Marcar una "fila virtual" para edición sin id
    const tmp = { _tmpId: '__new__', priority: 500, enabled: true };
    listStageRules().push(tmp);  // se descarta si cancelan
    _renderStageRulesModal('__new__');
  };
  document.querySelectorAll('[data-rule-edit]').forEach(b => b.onclick = () => _renderStageRulesModal(b.dataset.ruleEdit || null));
  document.querySelectorAll('[data-rule-del]').forEach(b => b.onclick = async () => {
    if (!confirm('¿Eliminar esta regla?')) return;
    try { await deleteStageRule(b.dataset.ruleDel); _renderStageRulesModal(); }
    catch (e) { alert('Error al eliminar: ' + e.message); }
  });
  if (editing) {

// ── Orden de Compra (OC): selección múltiple → agrupado por proveedor → PDFs ─
// Estado del flujo OC. Se mantiene aparte de `state` global para que abrir/cerrar
// el modal grande no toque el render del kanban.
const poState = {
  open: false,
  selectedCardIds: new Set(),
  // Líneas finales editables (después de aplicar la inferencia de proveedor).
  // Cada item: { producto, color, talle, cantidad, cardId, clientName, supplier }
  lines: [],
  // (#OC) Sugerencia de descuento de stock por línea. Keyed por _poLineKey →
  // { options:[{id,sku,color,talle,qty_available}], stockItemId, sku, take, accepted }
  stock: {},
};

function openPOModal() {
  poState.open = true;
  _poCatalogIndex = null;   // refrescar el índice nombre→id del catálogo
  poState.stock = {};
  // Pre-seleccionar todas las tareas "A Pedir Insumos" (son las que necesitan OC)
  poState.selectedCardIds = new Set(
    state.cards.filter(c => c.stage_key === 'a_pedir_insumos').map(c => c.id)
  );
  poState.lines = [];
  rebuildPOLines();
  renderPOModal();

  poState.open = false;

// Recalcula `poState.lines` a partir de las cards seleccionadas. Conserva los
// proveedores que ya hayas editado a mano (matching por cardId+producto+color+talle).
function rebuildPOLines() {
  const prevOverrides = new Map();
  for (const l of poState.lines) {
    const key = `${l.cardId}|${l.producto}|${l.color}|${l.talle}`;
    if (l.supplier) prevOverrides.set(key, l.supplier);
  }
  const out = [];
  for (const c of state.cards) {
    if (!poState.selectedCardIds.has(c.id)) continue;
    for (const pl of (c.product_lines || [])) {
      const producto = pl.producto || '';
      const color = pl.color || '';
      const talle = pl.talle || '';
      const key = `${c.id}|${producto}|${color}|${talle}`;
      const supplier = prevOverrides.get(key) || inferSupplierFromProductName(producto);
      out.push({
        producto, color, talle,
        cantidad: pl.cantidad ?? '',
        cardId: c.id,
        clientName: c.client_name || '',
        supplier,
      });
    }
  }
  poState.lines = out;
}

// (#OC) Clave estable de línea para mapear sugerencias de stock.
function _poLineKey(l) { return `${l.cardId}|${l.producto}|${l.color}|${l.talle}`; }

// Índice nombre(catálogo) → id, para resolver el producto de catálogo de una línea.
let _poCatalogIndex = null;
function _poCatalogId(producto) {
  if (!producto) return null;
  if (!_poCatalogIndex) {
    _poCatalogIndex = new Map();
    try {
      for (const p of (loadCatalog().productos || [])) {
        if (p && p.n) _poCatalogIndex.set(String(p.n).trim().toLowerCase(), p.id);
      }
    } catch (e) { console.warn('[poCatalog]', e?.message); }
  }
  return _poCatalogIndex.get(String(producto).trim().toLowerCase()) || null;
}

// Para cada línea con producto vinculado al catálogo, busca variantes de stock
// disponibles y arma la sugerencia de descuento. Async → re-renderiza al terminar.
async function _recomputePOStock() {
  const next = {};
  const seen = new Set();
  for (const l of poState.lines) {
    const key = _poLineKey(l);
    if (seen.has(key)) continue;
    seen.add(key);
    const catId = _poCatalogId(l.producto);
    if (!catId) continue;
    let opts = [];
    try { opts = await findStockForLine({ catalogProductId: catId, color: l.color, talle: l.talle }); }
    catch (e) { console.warn('[poStock]', e?.message); }
    if (!opts.length) continue;
    const prev = poState.stock[key];
    const top = opts[0];
    const want = Math.min(Number(top.qty_available) || 0, parseFloat(l.cantidad) || 0) || (Number(top.qty_available) || 0);
    next[key] = {
      options: opts,
      stockItemId: prev?.stockItemId || top.id,
      sku:         prev?.sku || top.sku,
      take:        prev?.take != null ? prev.take : want,
      accepted:    prev?.accepted || false,
    };
  }
  poState.stock = next;
  if (poState.open) renderPOModal();
}

// Genera un PDF por proveedor con la lista de productos. Usa jsPDF cargado por CDN.
async function onGeneratePOPdfs() {
  const { jsPDF } = window.jspdf || {};
  if (!jsPDF) { showError('jsPDF no se cargó (revisar conexión a CDN)'); return; }
  const today = new Date().toISOString().slice(0, 10);

  // (#OC) Aplicar los descuentos de stock aceptados ANTES de armar los PDFs, para
  // que la OC refleje solo lo que falta comprar. Resta qty_on_hand + registra el
  // movimiento (tipo 'salida'). Nunca corre solo: solo lo aceptado por el usuario.
  const consume = [];
  for (let idx = 0; idx < poState.lines.length; idx++) {
    const l = poState.lines[idx];
    const s = poState.stock[_poLineKey(l)];
    if (!s || !s.accepted) continue;
    const take = Math.min(Number(s.take) || 0, parseFloat(l.cantidad) || 0);
    if (take > 0) consume.push({ id: s.stockItemId, sku: s.sku, cantidad: take, lineIdx: idx });
  }
  if (consume.length) {
    try {
      await applyStockConsumption(
        consume.map(c => ({ id: c.id, sku: c.sku, cantidad: c.cantidad })),
        { motivo: `OC ${today} · descuento de stock` }
      );
      for (const c of consume) {
        const l = poState.lines[c.lineIdx];
        l.cantidad = Math.max(0, (parseFloat(l.cantidad) || 0) - c.cantidad);
        l._tomadoDeStock = (l._tomadoDeStock || 0) + c.cantidad;
      }
      showOk(`Se descontaron ${consume.reduce((a, c) => a + c.cantidad, 0)} u. de stock y se registró el movimiento.`);
    } catch (e) { showError('No se pudo descontar stock: ' + e.message); return; }
  }

  // Solo van al PDF/OC las líneas con cantidad > 0 (lo cubierto por stock se omite).
  const drawLines = poState.lines.filter(l => (parseFloat(l.cantidad) || 0) > 0);
  if (!drawLines.length) {
    showOk('Todo el pedido quedó cubierto con stock. No se generaron OCs.');
    closePOModal();
    return;
  }

  const grouped = {};
  for (const l of drawLines) (grouped[l.supplier] ||= []).push(l);
  const logo = await getCireneLogo();

  let generated = 0;
  const poRecords = [];
  for (const [supplier, lines] of Object.entries(grouped)) {
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    // Header con banner azul + logo embebido
    doc.setFillColor(0, 0, 0);
    doc.rect(0, 0, 210, 26, 'F');
    if (logo) {
      await addImageFitted(doc, logo, 'PNG', 14, 5, 40, 16);
    } else {
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(20);
      doc.setFont('helvetica', 'bold');
      doc.text('De Cirene', 14, 17);
    }
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(13);
    doc.setFont('helvetica', 'normal');
    doc.text('Orden de Compra', 196, 17, { align: 'right' });

    // Info
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text(`Proveedor: ${supplier}`, 14, 38);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(`Fecha: ${today}`, 14, 45);
    doc.text(`Líneas: ${lines.length}`, 60, 45);
    const totalQty = lines.reduce((a, l) => a + (parseFloat(l.cantidad) || 0), 0);
    doc.text(`Cantidad total: ${totalQty}`, 100, 45);

    // Tabla
    let y = 56;
    doc.setFillColor(247, 251, 253);
    doc.rect(14, y - 5, 182, 8, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('Producto', 16, y);
    doc.text('Color', 100, y);
    doc.text('Talle', 138, y);
    doc.text('Cant.', 188, y, { align: 'right' });
    y += 6;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    for (const l of lines) {
      if (y > 280) { doc.addPage(); y = 20; }
      const productoTxt = doc.splitTextToSize(l.producto || '—', 80);
      doc.text(productoTxt, 16, y);
      doc.text(l.color || '—', 100, y);
      doc.text(l.talle || '—', 138, y);
      doc.text(String(l.cantidad || '—'), 188, y, { align: 'right' });
      doc.text(String(l.cardId || ''), 16, y + 4);
      doc.setTextColor(143, 176, 194);
      doc.setFontSize(8);
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(10);
      y += Math.max(8, productoTxt.length * 4 + 4);
      doc.setDrawColor(232, 241, 246);
      doc.line(14, y - 2, 196, y - 2);
    }

    // Footer
    doc.setFontSize(9);
    doc.setTextColor(143, 176, 194);
    doc.text(`Generado el ${new Date().toLocaleString('es-UY')} desde De Cirene`, 14, 290);

    doc.save(`OC_${supplier.replace(/\s+/g, '_')}_${today}.pdf`);
    generated++;

    // (#13) Persistir la OC en purchase_orders para el historial por proveedor.
    const tomado = lines.reduce((a, l) => a + (l._tomadoDeStock || 0), 0);
    const stockNote = tomado ? ` · ${tomado} u. tomadas de stock` : '';
    poRecords.push({
      id: `oc_${Date.now()}_${generated}`,
      production_card_id: lines[0]?.cardId || null,
      status: 'borrador',
      total: lines.reduce((a, l) => a + (parseFloat(l.cantidad) || 0) * (parseFloat(l.unit_price) || 0), 0),
      notes: `Proveedor: ${supplier} · ${lines.length} línea(s) · ${today}${stockNote}`,
      lines: lines.map(l => ({
        description: [l.producto, l.color, l.talle].filter(Boolean).join(' · ') || 'Producto',
        quantity: parseFloat(l.cantidad) || 0,
        unit_price: parseFloat(l.unit_price) || 0,
        supplier, color: l.color || '', talle: l.talle || '',
        producto: l.producto || '', cardId: l.cardId || '', clientName: l.clientName || '',
      })),
    });
  }
  // Guardar el historial (no bloquea la generación de PDFs si falla).
  try {
    const supa = getSupa();
    const { data: { user } } = await supa.auth.getUser();
    const rows = poRecords.map(r => ({ ...r, created_by: user?.id || null }));
    if (rows.length) {
      const { error } = await supa.from('purchase_orders').insert(rows);
      if (error) console.warn('[OC] no se pudo guardar en historial:', error.message);
    }
  } catch (e) { console.warn('[OC] historial:', e.message); }

  showOk(`${generated} PDF(s) generado(s) y guardado(s) en el historial. Revisá tu carpeta de descargas.`);
  closePOModal();
}

      sheetState.color = firstSel.color || '';
      sheetState.talle = firstSel.talle || '';

    };
  });
  // (#1) Click en miniatura de mockup existente → selecciona ese índice.
