<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>De Cirene · CRM</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/cirene-theme.css">
<style>
  .wrap { max-width: 100%; margin: 0; padding: 14px 16px 40px; }
  .hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 14px; align-items: flex-start; }
  .col { flex: 0 0 250px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 8px; min-height: 120px; }
  .col.drop { border-color: #0A0A0A; box-shadow: 0 0 0 2px #0A0A0A; }
  .col h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--tinta-2); padding: 4px 6px 8px; display: flex; justify-content: space-between; }
  .col h3 .cnt { background: #0A0A0A; color: #fff; border-radius: 999px; padding: 0 7px; font-size: 11px; }
  .lead { background: #fff; border: 1px solid var(--border); border-radius: 9px; padding: 9px 10px; margin-bottom: 8px; cursor: grab; }
  .lead:hover { border-color: #0A0A0A; }
  .lead .nm { font-weight: 700; font-size: 13px; }
  .lead .ds { font-size: 11px; color: var(--tinta-3); margin: 2px 0; line-height: 1.35; max-height: 28px; overflow: hidden; }
  .lead .mt { font-size: 11px; color: var(--tinta-2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .u-baja { background: #9AA0A6; } .u-normal { background: #3A6EA5; } .u-alta { background: #C9A227; } .u-urgente { background: #A33A3A; }
  .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-2); background: #fff; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
  .btn.primary { background: #0A0A0A; color: #fff; border-color: #0A0A0A; }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  /* modal */
  .ov { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: flex-start; justify-content: center; padding: 30px 16px; z-index: 100; overflow: auto; }
  .ov.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 480px; padding: 22px 24px; }
  .modal h2 { font-size: 16px; margin-bottom: 14px; }
  .fg { margin-bottom: 11px; } .fg label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--tinta-2); margin-bottom: 4px; }
  .fg input, .fg select, .fg textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font: inherit; }
  .fg textarea { min-height: 64px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mact { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0A0A0A; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="navbar-mount"></div>
<div class="wrap">
  <div class="hd">
    <h1 style="font-family:'Raleway'">CRM · Consultas</h1>
    <button class="btn primary" id="btnNew">+ Nueva consulta</button>
  </div>
  <div class="board" id="board"></div>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script type="module">
import { renderNavbar } from './js/navbar.js';
import { requireAuth } from './js/auth.js';
import * as data from './js/cirene-data.js';
import { money } from './js/quote-engine.js';

const $ = s => document.querySelector(s);
const toast = m => { const t = $('#toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1900); };
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

let stages = [], cards = [];
$('#board').innerHTML = '<div class="muted" style="padding:30px 6px">Cargando consultas…</div>';
await requireAuth();
renderNavbar('intake');
try {
  [stages, cards] = await Promise.all([data.listStages('comercial'), data.listIntakeCards()]);
} catch (e) {
  $('#board').innerHTML = `<div style="color:#A33A3A;padding:18px">No se pudo cargar el CRM.<br><span class="muted">${esc(e.message || e)}</span><br><button class="btn" style="margin-top:10px" onclick="location.reload()">Reintentar</button></div>`;
  throw e;
}
// el lead aceptado sale del board (pasó a producción)
stages = stages.filter(s => s.key !== 'aceptado');
render();

function render() {
  const visible = cards.filter(c => c.status !== 'aceptada');
  $('#board').innerHTML = stages.map(st => {
    const cs = visible.filter(c => (c.stage_key || 'mensaje_entrante') === st.key);
    return `<div class="col" data-stage="${st.key}">
      <h3><span>${esc(st.label)}</span><span class="cnt">${cs.length}</span></h3>
      <div class="drop-zone">${cs.map(leadHtml).join('')}</div>
    </div>`;
  }).join('');
  bind();
}
function leadHtml(c) {
  return `<div class="lead" draggable="true" data-id="${c.id}">
    <div class="nm">${esc(c.client_query)}</div>
    <div class="ds">${esc(c.description || '')}</div>
    <div class="mt"><span class="dot u-${c.urgency || 'normal'}"></span>${esc(c.client_phone_e164 || '')} ${c.target_date ? '· ' + c.target_date : ''}</div>
  </div>`;
}
function bind() {
  let dragId = null;
  $('#board').querySelectorAll('.lead').forEach(el => {
    el.ondragstart = e => { dragId = el.dataset.id; e.dataTransfer.effectAllowed = 'move'; };
    el.onclick = () => openLead(el.dataset.id);
  });
  $('#board').querySelectorAll('.col').forEach(col => {
    col.ondragover = e => { e.preventDefault(); col.classList.add('drop'); };
    col.ondragleave = () => col.classList.remove('drop');
    col.ondrop = async e => {
      e.preventDefault(); col.classList.remove('drop');
      const id = dragId, stage = col.dataset.stage; if (!id) return;
      const c = cards.find(x => x.id === id); if (!c || c.stage_key === stage) return;
      c.stage_key = stage; render();
      try { await data.saveIntakeCard({ id, stage_key: stage }); } catch (err) { toast('Error al mover'); }
    };
  });
}

/* Nueva consulta */
$('#btnNew').onclick = () => {
  $('#modal').innerHTML = `<h2>Nueva consulta</h2>
    <div class="fg"><label>Cliente / empresa</label><input id="f-cli" placeholder="Nombre"></div>
    <div class="row2">
      <div class="fg"><label>Teléfono</label><input id="f-tel" placeholder="097…"></div>
      <div class="fg"><label>Email</label><input id="f-mail"></div>
    </div>
    <div class="fg"><label>Producto / detalle</label><textarea id="f-desc" placeholder="Producto, medidas, color, terminación, lugar de instalación…"></textarea></div>
    <div class="row2">
      <div class="fg"><label>Fecha objetivo</label><input id="f-fecha" type="date"></div>
      <div class="fg"><label>Urgencia</label><select id="f-urg"><option value="baja">Baja</option><option value="normal" selected>Normal</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select></div>
    </div>
    <div class="mact"><button class="btn primary" id="f-save">Crear</button><button class="btn" id="f-cancel">Cancelar</button></div>`;
  showModal();
  $('#f-cancel').onclick = hideModal;
  $('#f-save').onclick = async () => {
    const cli = $('#f-cli').value.trim();
    if (!cli) { toast('Falta el cliente'); return; }
    try {
      const card = await data.createIntakeCard({
        client_query: cli, client_phone_e164: $('#f-tel').value || null, client_email: $('#f-mail').value || null,
        description: $('#f-desc').value || null, target_date: $('#f-fecha').value || null, urgency: $('#f-urg').value,
      });
      cards.unshift(card); hideModal(); render(); toast('Consulta creada');
    } catch (e) { toast('Error: ' + (e.message || e)); }
  };
};

/* Detalle del lead */
async function openLead(id) {
  const c = cards.find(x => x.id === id); if (!c) return;
  const quote = await data.getQuoteByIntake(id);
  $('#modal').innerHTML = `<h2>${esc(c.client_query)}</h2>
    <div class="row2">
      <div class="fg"><label>Teléfono</label><input id="e-tel" value="${esc(c.client_phone_e164)}"></div>
      <div class="fg"><label>Email</label><input id="e-mail" value="${esc(c.client_email)}"></div>
    </div>
    <div class="fg"><label>Producto / detalle</label><textarea id="e-desc">${esc(c.description)}</textarea></div>
    <div class="row2">
      <div class="fg"><label>Fecha objetivo</label><input id="e-fecha" type="date" value="${esc(c.target_date)}"></div>
      <div class="fg"><label>Etapa</label><select id="e-stage">${stages.concat([{key:'aceptado',label:'Aceptado'},{key:'rechazado',label:'Rechazado'}]).map(s => `<option value="${s.key}" ${c.stage_key === s.key ? 'selected' : ''}>${esc(s.label)}</option>`).join('')}</select></div>
    </div>
    <div style="font-size:12px;color:var(--tinta-2);margin:4px 0">${quote ? `📄 Cotización <b>${quote.id}</b> · ${money(quote.precio_venta)}` : 'Sin cotización todavía.'}</div>
    <div class="mact">
      <button class="btn primary" id="e-cot">${quote ? 'Ver/editar cotización' : 'Cotizar'}</button>
      <button class="btn" id="e-save">Guardar</button>
      <button class="btn" id="e-accept" style="background:#2E7D46;color:#fff;border-color:#2E7D46">Aceptar → Producción</button>
      <button class="btn sm" id="e-close" style="margin-left:auto">Cerrar</button>
    </div>`;
  showModal();
  $('#e-close').onclick = hideModal;
  $('#e-cot').onclick = () => { location.href = `/index.html?intake=${id}${quote ? '&quote=' + quote.id : ''}`; };
  $('#e-save').onclick = async () => {
    const patch = { id, client_phone_e164: $('#e-tel').value || null, client_email: $('#e-mail').value || null, description: $('#e-desc').value || null, target_date: $('#e-fecha').value || null, stage_key: $('#e-stage').value };
    Object.assign(c, patch);
    try { await data.saveIntakeCard(patch); hideModal(); render(); toast('Guardado'); } catch (e) { toast('Error: ' + (e.message || e)); }
  };
  $('#e-accept').onclick = async () => {
    if (!quote && !confirm('No hay cotización para este lead. ¿Pasarlo a Producción igual (sin total)?')) return;
    try {
      const pc = await data.createProductionFromIntake(c, quote);
      c.status = 'aceptada'; hideModal(); render();
      toast('Pasó a Producción: ' + pc.id);
    } catch (e) { toast('Error: ' + (e.message || e)); }
  };
}

function showModal() { $('#ov').classList.add('show'); }
function hideModal() { $('#ov').classList.remove('show'); }
$('#ov').onclick = e => { if (e.target === $('#ov')) hideModal(); };
</script>
</body>
</html>
